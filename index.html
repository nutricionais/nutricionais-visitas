window.handleReportChange = function(campo, valor) {
  ReportState.pendingChanges[campo] = valor;
  if (ReportState.visita) ReportState.visita[campo] = valor;

  // Atualiza aviso de margem se for horário
  if (campo === 'horario_inicio' || campo === 'horario_termino') {
    updateTimeWarning();
  }

  scheduleAutoSave();
};

function updateTimeWarning() {
  const v = ReportState.visita;
  if (!v || !v.checkin_timestamp) return;

  const warnEl = document.getElementById('timeWarning');
  const textEl = document.getElementById('timeWarningText');
  if (!warnEl || !textEl) return;

  const hi = v.horario_inicio;
  if (!hi) {
    warnEl.style.display = 'none';
    return;
  }

  const checkinTs = new Date(v.checkin_timestamp);
  const [h, m] = hi.split(':');
  const declaradoInicio = new Date(checkinTs);
  declaradoInicio.setHours(parseInt(h), parseInt(m), 0, 0);
  const diffMin = Math.abs((declaradoInicio - checkinTs) / 60000);

  const margemMin = getConfigSync('margem_horario_minutos', 90);
  if (diffMin > margemMin) {
    warnEl.style.display = 'flex';
    textEl.textContent = `Horário declarado está ${Math.round(diffMin)}min fora do check-in (>${margemMin}min). Vai ser marcado com flag pra revisão.`;
  } else {
    warnEl.style.display = 'none';
  }
}

// Auto-save com debounce de 2s
function scheduleAutoSave() {
  if (ReportState.autoSaveTimer) clearTimeout(ReportState.autoSaveTimer);
  setSaveIndicator('saving', 'Digitando...');
  ReportState.autoSaveTimer = setTimeout(() => {
    executeAutoSave();
  }, 2000);
}

async function executeAutoSave() {
  if (Object.keys(ReportState.pendingChanges).length === 0) {
    setSaveIndicator('saved', 'Pronto');
    return;
  }
  setSaveIndicator('saving', 'Salvando...');
  try {
    const changes = { ...ReportState.pendingChanges };
    ReportState.pendingChanges = {};
    await atualizarRelatorio(ReportState.visitaId, changes);
    ReportState.lastSavedAt = new Date();
    ReportState.saveCounter++;
    setSaveIndicator('saved', 'Salvo');
  } catch (err) {
    console.error('[AutoSave] Erro:', err);
    // Recoloca mudanças em pending pra retry
    Object.assign(ReportState.pendingChanges, { _failedOnce: true });
    setSaveIndicator('error', 'Erro');
  }
}

// Sync profissionais (timer separado pro N:N)
function scheduleSyncProfissionais() {
  if (ReportState._profTimer) clearTimeout(ReportState._profTimer);
  setSaveIndicator('saving', 'Atualizando...');
  ReportState._profTimer = setTimeout(async () => {
    try {
      await syncProfissionaisVisita(
        ReportState.visitaId,
        ReportState.profissionaisSelecionados.map(p => p.id)
      );
      setSaveIndicator('saved', 'Salvo');
    } catch (err) {
      setSaveIndicator('error', 'Erro');
    }
  }, 800);
}

function scheduleSyncObjetivos() {
  if (ReportState._objTimer) clearTimeout(ReportState._objTimer);
  setSaveIndicator('saving', 'Atualizando...');
  ReportState._objTimer = setTimeout(async () => {
    try {
      await syncObjetivosVisita(
        ReportState.visitaId,
        Array.from(ReportState.objetivosSelecionados)
      );
      setSaveIndicator('saved', 'Salvo');
    } catch (err) {
      setSaveIndicator('error', 'Erro');
    }
  }, 500);
}

function setSaveIndicator(state, text) {
  const el = document.getElementById('saveIndicator');
  if (!el) return;
  el.classList.remove('save-indicator--saving', 'save-indicator--saved', 'save-indicator--error');
  if (state === 'saving') el.classList.add('save-indicator--saving');
  else if (state === 'saved') el.classList.add('save-indicator--saved');
  else if (state === 'error') el.classList.add('save-indicator--error');

  const icon = state === 'saving' ? 'sync' : state === 'error' ? 'cloud_off' : 'cloud_done';
  el.innerHTML = `
    <span class="material-symbols-rounded">${icon}</span>
    <span id="saveIndicatorText">${text}</span>
  `;
}

window.handleFinalizarRelatorio = async function() {
  const btn = document.getElementById('btnFinalizar');

  // Força o auto-save antes de finalizar
  if (ReportState.autoSaveTimer) {
    clearTimeout(ReportState.autoSaveTimer);
    await executeAutoSave();
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:24px">hourglass_empty</span> Finalizando...';

  const v = ReportState.visita;
  const dados = {
    horario_inicio: document.getElementById('fHoraInicio')?.value || v.horario_inicio,
    horario_termino: document.getElementById('fHoraTermino')?.value || v.horario_termino,
    visita_realizada: v.visita_realizada,
    motivo_nao_realizada: document.getElementById('fMotivo')?.value,
    resumo: document.getElementById('fResumo')?.value,
    proximos_passos: document.getElementById('fProximos')?.value,
    proxima_visita_programada: document.getElementById('fProxData')?.value || null,
    profissionais_ids: ReportState.profissionaisSelecionados.map(p => p.id),
    objetivos_ids: Array.from(ReportState.objetivosSelecionados),
    checkin_timestamp: v.checkin_timestamp,
    // Sinaliza que a visita está sendo refinalizada após devolução do admin
    foiDevolvida: v.status === 'rascunho' && !!v.revisao_solicitada_em,
  };

  const eraCompleta = v.status === 'completa';

  try {
    await finalizarRelatorio(ReportState.visitaId, dados);
    setFlash('success', eraCompleta ? 'Alterações salvas!' : 'Relatório finalizado com sucesso!');

    // Sprint 7 Mini 3 — sugestão automática de agendamento
    // Se o profissional preencheu "próxima visita programada" E a data é futura E
    // não é refinalização de visita devolvida, oferece criar agendamento automático.
    const proxData = dados.proxima_visita_programada;
    if (proxData && !dados.foiDevolvida && !eraCompleta) {
      // Confere se é futura (compara como YYYY-MM-DD pra evitar fuso horário)
      const hojeStr = (() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      })();
      if (proxData > hojeStr) {
        // Fire-and-forget: não bloqueia o redirect se o user fechar o modal
        setTimeout(() => oferecerAgendarProximaVisita(v, proxData), 400);
      }
    }

    window.location.hash = '#/visitas';
  } catch (err) {
    alert(err.message);
    btn.disabled = false;
    btn.innerHTML = eraCompleta
      ? '<span class="material-symbols-rounded" style="font-size:24px">save</span> Salvar alterações'
      : '<span class="material-symbols-rounded" style="font-size:24px">check_circle</span> Finalizar relatório';
  }
};

// Oferece criar agendamento automático baseado no campo "próxima visita programada"
// da visita que acabou de ser finalizada. (Sprint 7 Mini 3)
async function oferecerAgendarProximaVisita(visita, dataProxima) {
  const instNome = visita.instituicoes?.nome || 'mesma instituição';
  // Formata data pra exibição BR
  const [y, m, d] = String(dataProxima).split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const diasSemana = ['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const dataBonita = `${diasSemana[dt.getDay()]}, ${dt.getDate()} de ${meses[dt.getMonth()]}`;

  const ok = await showModalConfirmacao({
    icone: 'event_available',
    iconeCor: 'success',
    titulo: 'Agendar próxima visita?',
    subtitulo: `Você planejou voltar em ${instNome.replace(/"/g,'&quot;')} na ${dataBonita}. Quer adicionar na sua agenda agora?`,
    btnConfirmar: 'Sim, agendar',
    btnCancelar: 'Agora não',
  });
  if (!ok) return;

  try {
    await criarAgendamento({
      instituicao_id: visita.instituicao_id,
      data: dataProxima,
      hora: null,  // profissional ajusta na hora se quiser
      objetivo_id: null,
      observacao: 'Agendamento criado automaticamente a partir de visita anterior.',
    });
    setFlash('success', 'Adicionado à agenda! Confira em "Agenda".');
  } catch (err) {
    // Não é crítico — só loga pra não atrapalhar o fluxo
    console.warn('[sugestao agendamento]', err.message);
    setFlash('info', 'Não foi possível criar o agendamento automaticamente. Você pode criar manualmente na Agenda.');
  }
}

// Excluir visita (só permitido pra rascunhos que nunca foram concluídos nem devolvidos)
window.handleExcluirVisita = async function() {
  const v = ReportState.visita;
  if (!v) return;
  // Barreira de segurança (dupla): só rascunho sem motivo de revisão
  if (v.status !== 'rascunho' || v.revisao_motivo) {
    await showModalConfirmacao({
      icone: 'block',
      iconeCor: 'danger',
      titulo: 'Não é possível excluir',
      subtitulo: 'Esta visita já foi finalizada ou passou por revisão. Visitas com histórico não podem ser apagadas.',
      btnConfirmar: 'OK',
      btnCancelar: '',
    });
    return;
  }
  const ok = await showModalConfirmacao({
    icone: 'delete_forever',
    iconeCor: 'danger',
    titulo: 'Excluir visita?',
    subtitulo: 'Todos os dados preenchidos serão perdidos. Esta ação não pode ser desfeita. Use apenas se foi um teste ou erro.',
    btnConfirmar: 'Sim, excluir',
    btnCancelar: 'Cancelar',
  });
  if (!ok) return;
  try {
    // Limpa os relacionamentos antes de apagar a visita
    await db.from('visitas_objetivos').delete().eq('visita_id', v.id);
    await db.from('visitas_profissionais').delete().eq('visita_id', v.id);
    const { error } = await db.from('visitas').delete().eq('id', v.id);
    if (error) throw new Error(error.message);
    setFlash('info', 'Visita excluída.');
    window.location.hash = '#/visitas';
  } catch (err) {
    await showModalConfirmacao({
      icone: 'error',
      iconeCor: 'danger',
      titulo: 'Erro ao excluir',
      subtitulo: err.message || 'Tente novamente em instantes.',
      btnConfirmar: 'OK',
      btnCancelar: '',
    });
  }
};

async function contarNotificacoesPorStatus() {
  if (!db) return { todas: 0, nao_lidas: 0, lidas: 0 };
  const user = getCurrentUser();
  if (!user) return { todas: 0, nao_lidas: 0, lidas: 0 };
  const [all, nao, lid] = await Promise.all([
    db.from('notificacoes').select('*', { count: 'exact', head: true }).eq('user_id', user.id),
    db.from('notificacoes').select('*', { count: 'exact', head: true }).eq('user_id', user.id).eq('lida', false),
    db.from('notificacoes').select('*', { count: 'exact', head: true }).eq('user_id', user.id).eq('lida', true),
  ]);
  return { todas: all.count || 0, nao_lidas: nao.count || 0, lidas: lid.count || 0 };
}

async function carregarListaNotificacoes() {
  const listEl = document.getElementById('notifPageList');
  if (!listEl) return;

  const cnts = await contarNotificacoesPorStatus();
  const setCnt = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  setCnt('cntNotifTodas', cnts.todas);
  setCnt('cntNotifNaoLidas', cnts.nao_lidas);
  setCnt('cntNotifLidas', cnts.lidas);

  const btnMarcar = document.getElementById('btnMarcarTodasNotif');
  if (btnMarcar) btnMarcar.style.display = cnts.nao_lidas > 0 ? '' : 'none';

  const filtro = window._notifFilter || 'todas';
  const page = window._notifPage || 0;
  const size = window._notifPageSize || 30;
  const from = page * size;
  const to = from + size - 1;

  const user = getCurrentUser();
  if (!user) { listEl.innerHTML = ''; return; }
  let query = db.from('notificacoes')
    .select('id, tipo, titulo, mensagem, link, objeto_id, lida, criado_em, lida_em')
    .eq('user_id', user.id);
  if (filtro === 'nao_lidas') query = query.eq('lida', false);
  else if (filtro === 'lidas') query = query.eq('lida', true);
  query = query.order('criado_em', { ascending: false }).range(from, to);

  const { data, error } = await query;
  if (error) {
    listEl.innerHTML = `<div style="padding:20px;color:var(--status-danger);">Erro: ${error.message}</div>`;
    return;
  }
  const items = data || [];
  const totalNessaAba = filtro === 'todas' ? cnts.todas : (filtro === 'nao_lidas' ? cnts.nao_lidas : cnts.lidas);

  if (items.length === 0) {
    const emptyMsg = filtro === 'nao_lidas'
      ? { icon: 'check_circle', titulo: 'Nenhuma não lida', desc: 'Você está em dia com todas as suas notificações.' }
      : filtro === 'lidas'
      ? { icon: 'inbox', titulo: 'Nenhuma lida ainda', desc: 'Quando você ler notificações, elas aparecerão aqui.' }
      : { icon: 'notifications_none', titulo: 'Nenhuma notificação', desc: 'Você não tem notificações no momento. Quando houver novidades, aparecerão aqui.' };
    listEl.innerHTML = `
      <div class="empty-state" style="margin:0;">
        <div class="empty-state__icon"><span class="material-symbols-rounded">${emptyMsg.icon}</span></div>
        <div class="empty-state__title">${emptyMsg.titulo}</div>
        <div class="empty-state__desc">${emptyMsg.desc}</div>
      </div>
    `;
    document.getElementById('notifPagerControls').style.display = 'none';
    return;
  }

  listEl.innerHTML = items.map(n => {
    const ic = iconeNotificacao(n.tipo);
    const dataCompleta = n.criado_em ? new Date(n.criado_em).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    return `
      <div class="notif-page-card ${n.lida ? '' : 'notif-page-card--unread'}">
        <div class="notif-page-card__icon" style="background:${ic.cor}20;color:${ic.cor};">
          <span class="material-symbols-rounded" style="font-size:20px;">${ic.icon}</span>
        </div>
        <div class="notif-page-card__body">
          <div class="notif-page-card__title">${(n.titulo || '').replace(/"/g,'&quot;')}</div>
          ${n.mensagem ? `<div class="notif-page-card__msg">${n.mensagem.replace(/"/g,'&quot;')}</div>` : ''}
          <div class="notif-page-card__time">${dataCompleta} · ${formatarTempoCurto(n.criado_em)} atrás${n.lida_em ? ` · lida em ${new Date(n.lida_em).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })}` : ''}</div>
          <div class="notif-page-card__actions">
            ${n.link ? `<button onclick="abrirNotifPagina('${n.id}', '${(n.link || '').replace(/'/g,"\\'")}')" class="notif-page-btn notif-page-btn--primary">
              <span class="material-symbols-rounded" style="font-size:15px;">arrow_forward</span>
              Abrir
            </button>` : ''}
            ${n.lida
              ? `<button onclick="marcarNotifNaoLida('${n.id}')" class="notif-page-btn">
                   <span class="material-symbols-rounded" style="font-size:15px;">mark_email_unread</span>
                   Marcar não lida
                 </button>`
              : `<button onclick="marcarNotifLida('${n.id}')" class="notif-page-btn">
                   <span class="material-symbols-rounded" style="font-size:15px;">mark_email_read</span>
                   Marcar lida
                 </button>`
            }
            <button onclick="excluirNotif('${n.id}')" class="notif-page-btn notif-page-btn--danger">
              <span class="material-symbols-rounded" style="font-size:15px;">delete</span>
              Excluir
            </button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // Paginação
  const pager = document.getElementById('notifPagerControls');
  const prevBtn = document.getElementById('notifPrevBtn');
  const nextBtn = document.getElementById('notifNextBtn');
  const totalPages = Math.ceil(totalNessaAba / size);
  if (totalPages > 1) {
    pager.style.display = 'flex';
    prevBtn.disabled = page === 0;
    nextBtn.disabled = page >= totalPages - 1;
    prevBtn.style.opacity = page === 0 ? '0.4' : '1';
    nextBtn.style.opacity = page >= totalPages - 1 ? '0.4' : '1';
    prevBtn.style.pointerEvents = page === 0 ? 'none' : '';
    nextBtn.style.pointerEvents = page >= totalPages - 1 ? 'none' : '';
  } else {
    pager.style.display = 'none';
  }
}

// Classifica uma data ISO ("YYYY-MM-DD") em um bucket: 'hoje' | 'amanha' | 'semana' | 'futuro' | 'atrasado'
function bucketDoAgendamento(dataStr) {
  if (!dataStr) return 'futuro';
  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0);
  const [y, m, d] = String(dataStr).split('-').map(Number);
  const data = new Date(y, (m || 1) - 1, d || 1);
  data.setHours(0, 0, 0, 0);
  const diffDias = Math.round((data - hoje) / 86400000);
  if (diffDias < 0) return 'atrasado';
  if (diffDias === 0) return 'hoje';
  if (diffDias === 1) return 'amanha';
  if (diffDias <= 7) return 'semana';
  return 'futuro';
}

async function carregarAgenda() {
  const listaEl = document.getElementById('agendaLista');
  if (!listaEl) return;

  const ags = await listarAgendamentosDoUser();

  if (ags.length === 0) {
    listaEl.innerHTML = `
      <div class="empty-state" style="margin:20px 0;">
        <div class="empty-state__icon"><span class="material-symbols-rounded">calendar_add_on</span></div>
        <div class="empty-state__title">Sua agenda está vazia</div>
        <div class="empty-state__desc">Toque no botão <strong>+</strong> no canto da tela pra planejar sua próxima visita.</div>
      </div>
    `;
    return;
  }

  // Separa sugestões pendentes (top priority) das agendadas normais
  const sugeridas = ags.filter(a => a.status === 'sugerida');
  const agendadas = ags.filter(a => a.status === 'agendada');

  // Agrupa as agendadas por bucket de data
  const grupos = { atrasado: [], hoje: [], amanha: [], semana: [], futuro: [] };
  agendadas.forEach(a => {
    const b = bucketDoAgendamento(a.data_visita);
    grupos[b].push(a);
  });

  const ordem = ['atrasado', 'hoje', 'amanha', 'semana', 'futuro'];
  const titulos = {
    atrasado: 'Atrasados',
    hoje:     'Hoje',
    amanha:   'Amanhã',
    semana:   'Esta semana',
    futuro:   'Mais adiante',
  };
  const cores = {
    atrasado: 'var(--status-danger)',
    hoje:     'var(--brand-lime)',
    amanha:   'var(--status-info)',
    semana:   'var(--brand-navy)',
    futuro:   'var(--neutral-500)',
  };

  let html = '';

  // Bucket especial: sugestões pendentes (sempre no topo, cor âmbar)
  if (sugeridas.length > 0) {
    html += `
      <div style="margin-bottom:20px;padding:12px;background:#FEF4E1;border:1.5px solid rgba(245,158,11,0.3);border-radius:12px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span class="material-symbols-rounded" style="font-size:18px;color:var(--status-warning);">pending_actions</span>
          <div style="font-family:var(--font-display);font-weight:700;color:#92400E;font-size:13px;text-transform:uppercase;letter-spacing:.5px;">Aguardando seu aceite</div>
          <div style="background:var(--status-warning);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">${sugeridas.length}</div>
        </div>
        <div style="font-size:11.5px;color:#92400E;margin-bottom:10px;">O admin sugeriu essas visitas pra você. Aceite ou recuse.</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${sugeridas.map(a => cardSugestao(a)).join('')}
        </div>
      </div>
    `;
  }

  // Buckets normais (agendamentos confirmados)
  ordem.forEach(b => {
    if (grupos[b].length === 0) return;
    html += `
      <div style="margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${cores[b]};"></div>
          <div style="font-family:var(--font-display);font-weight:700;color:var(--brand-navy);font-size:13px;text-transform:uppercase;letter-spacing:.5px;">${titulos[b]}</div>
          <div style="background:var(--neutral-100);color:var(--neutral-600);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">${grupos[b].length}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${grupos[b].map(a => cardAgendamento(a, b)).join('')}
        </div>
      </div>
    `;
  });
  listaEl.innerHTML = html;
}

// Card compacto pra sugestões pendentes — foco nos botões Aceitar/Recusar

    if (!ag.data_visita) return '';
    const [y, m, d] = String(ag.data_visita).split('-').map(Number);

    const diasSemana = ['dom','seg','ter','qua','qui','sex','sáb'];
    return `${diasSemana[dt.getDay()]}, ${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;

  const objs = (ag.objetivos || []).map(o => o.nome).join(' · ');

window.handleNovoAgendamento = async function() {
  // Carrega instituições e objetivos pra os selects
  const [insts, objs] = await Promise.all([
    listarInstituicoes(),
    listarObjetivos(),
  ]);
  const instsAtivas = (insts || []).filter(i => i.ativo !== false);
  const objsAtivos = (objs || []).filter(o => o.ativo !== false && !o.pendente_aprovacao);

  if (instsAtivas.length === 0) {
    alert('Não há instituições cadastradas ainda. Cadastre uma antes de agendar.');
    return;
  }

  const hojeStr = (() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  const dados = await showModalAgendamento({ instituicoes: instsAtivas, objetivos: objsAtivos, hojeStr });
  if (!dados) return;

  try {
    await criarAgendamento(dados);
    setFlash('success', 'Agendamento criado!');
    await carregarAgenda();
  } catch (err) {
    alert('Erro ao criar agendamento: ' + err.message);
  }
};

window.handleEditarAgendamento = async function(id) {
  // Busca dados atuais + listas de suporte em paralelo
  const [ags, insts, objs] = await Promise.all([
    listarAgendamentosDoUser(),
    listarInstituicoes(),
    listarObjetivos(),
  ]);
  const ag = (ags || []).find(a => String(a.id) === String(id));
  if (!ag) {
    alert('Agendamento não encontrado. Pode já ter sido iniciado ou cancelado.');
    await carregarAgenda();
    return;
  }
  const instsAtivas = (insts || []).filter(i => i.ativo !== false);
  const objsAtivos = (objs || []).filter(o => o.ativo !== false && !o.pendente_aprovacao);

  const hojeStr = (() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  const dados = await showModalAgendamento({
    instituicoes: instsAtivas,
    objetivos: objsAtivos,
    hojeStr,
    agendamento: ag,
  });
  if (!dados) return;

  try {
    await atualizarAgendamento(id, dados);
    setFlash('success', 'Agendamento atualizado!');
    await carregarAgenda();
  } catch (err) {
    alert('Erro ao atualizar: ' + err.message);
  }
};

// Modal dedicado — reusa padrão visual dos outros modais do sistema
function showModalAgendamento({ instituicoes, objetivos, hojeStr, agendamento = null }) {
  return new Promise((resolve) => {
    const isEdit = !!agendamento;
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    // Em modo editar, permite escolher data atual do agendamento mesmo se for passada (raro mas possível)
    const minData = isEdit && agendamento.data_visita < hojeStr ? agendamento.data_visita : hojeStr;
    const instOpts = instituicoes.map(i => {
      const sel = isEdit && String(agendamento.instituicao_id) === String(i.id) ? ' selected' : '';
      return `<option value="${i.id}"${sel}>${(i.nome || '').replace(/"/g,'&quot;')}</option>`;
    }).join('');
    const objSelId = isEdit && agendamento.objetivos?.[0]?.id;
    const objOpts = objetivos.map(o => {
      const sel = objSelId && String(objSelId) === String(o.id) ? ' selected' : '';
      return `<option value="${o.id}"${sel}>${(o.nome || '').replace(/"/g,'&quot;')}</option>`;
    }).join('');
    const valorHora = isEdit && agendamento.horario_inicio
      ? String(agendamento.horario_inicio).substring(0, 5)
      : '';
    const valorObs = isEdit && agendamento.resumo ? agendamento.resumo : '';
    const valorData = isEdit ? agendamento.data_visita : hojeStr;

    backdrop.innerHTML = `
      <div class="modal-card" style="max-width:440px;">
        <div class="modal-card__header">
          <div class="modal-card__icon" style="background:var(--status-info-bg,#E4ECFD);color:var(--status-info);">
            <span class="material-symbols-rounded">${isEdit ? 'edit_calendar' : 'event_available'}</span>
          </div>
          <div class="modal-card__title">${isEdit ? 'Editar agendamento' : 'Novo agendamento'}</div>
          <div class="modal-card__subtitle">${isEdit ? 'Ajuste os detalhes da sua próxima visita.' : 'Planeje uma visita futura. Você pode editar tudo ao iniciar.'}</div>
        </div>
        <div class="modal-card__body" style="padding:16px;">
          <div class="report-field" style="margin-bottom:12px;">
            <label for="agInst">Instituição <span style="color:var(--status-danger);">*</span></label>
            <select id="agInst" style="width:100%;padding:10px;border:1.5px solid var(--neutral-300);border-radius:8px;font-family:inherit;font-size:14px;">
              <option value="">Selecione...</option>
              ${instOpts}
            </select>
          </div>
          <div class="report-field" style="margin-bottom:12px;">
            <label for="agData">Data <span style="color:var(--status-danger);">*</span></label>
            <input type="date" id="agData" min="${minData}" value="${valorData}" style="width:100%;padding:10px;border:1.5px solid var(--neutral-300);border-radius:8px;font-family:inherit;font-size:14px;" />
          </div>
          <div class="report-field" style="margin-bottom:12px;">
            <label for="agHora">Hora (opcional)</label>
            <input type="time" id="agHora" value="${valorHora}" style="width:100%;padding:10px;border:1.5px solid var(--neutral-300);border-radius:8px;font-family:inherit;font-size:14px;" />
          </div>
          <div class="report-field" style="margin-bottom:12px;">
            <label for="agObj">Objetivo (opcional)</label>
            <select id="agObj" style="width:100%;padding:10px;border:1.5px solid var(--neutral-300);border-radius:8px;font-family:inherit;font-size:14px;">
              <option value="">—</option>
              ${objOpts}
            </select>
          </div>
          <div class="report-field">
            <label for="agObs">Observações (opcional)</label>
            <textarea id="agObs" placeholder="Ex: apresentar kit novo, conversar com Dra. X..." style="width:100%;padding:10px;border:1.5px solid var(--neutral-300);border-radius:8px;font-family:inherit;font-size:14px;min-height:60px;resize:vertical;">${valorObs.replace(/</g,'&lt;')}</textarea>
          </div>
        </div>
        <div class="modal-card__footer">
          <button class="modal-btn modal-btn--primary" id="agOk">${isEdit ? 'Salvar alterações' : 'Agendar'}</button>
          <button class="modal-btn modal-btn--secondary" id="agCancel">Cancelar</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);
    const cleanup = () => backdrop.remove();
    document.getElementById('agCancel').onclick = () => { cleanup(); resolve(null); };
    document.getElementById('agOk').onclick = () => {
      const instituicao_id = document.getElementById('agInst').value;
      const data = document.getElementById('agData').value;
      const hora = document.getElementById('agHora').value;
      const objetivo_id = document.getElementById('agObj').value || null;
      const observacao = document.getElementById('agObs').value.trim() || null;
      if (!instituicao_id) { alert('Selecione uma instituição.'); return; }
      if (!data) { alert('Escolha uma data.'); return; }
      cleanup();
      resolve({ instituicao_id, data, hora, objetivo_id, observacao });
    };
  });
}

window.handleIniciarAgendamento = async function(id) {
  const ok = await showModalConfirmacao({
    icone: 'play_circle',
    iconeCor: 'success',
    titulo: 'Iniciar visita?',
    subtitulo: 'Vamos pegar sua localização atual e começar o check-in. Você pode editar a hora no relatório depois.',
    btnConfirmar: 'Iniciar agora',
    btnCancelar: 'Cancelar',
  });
  if (!ok) return;

  let userPos = null;
  try {
    userPos = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error('GPS não suportado'));
      navigator.geolocation.getCurrentPosition(
        p => resolve({ lat: p.coords.latitude, lng: p.coords.longitude, accuracy: p.coords.accuracy }),
        () => resolve(null),  // se negar GPS, segue sem (vira check-in manual)
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
      );
    });
  } catch { userPos = null; }

  try {
    await iniciarVisitaAgendada(id, userPos);
    setFlash('success', 'Visita iniciada!');
    window.location.hash = '#/checkin/ativo';
  } catch (err) {
    alert('Erro ao iniciar: ' + err.message);
  }
};

// Carrega todos os dados pro relatório
async function carregarRelatorio(periodo, user) {
  if (!db) return;
  const dataInicio = calcularDataInicio(periodo);

  // Busca visitas do período
  let query = db.from('visitas').select(`
    id, status, data_visita, checkin_timestamp, checkout_timestamp,
    checkin_manual, flag_gps_divergente, flag_horario_fora_margem,
    flag_sem_checkin, flag_sem_checkout,
    visita_realizada, revisao_motivo,
    nutricionista_id, instituicao_id,
    usuarios:nutricionista_id(nome),
    instituicoes(nome)
  `);
  if (dataInicio) query = query.gte('checkin_timestamp', dataInicio);
  query = query.order('checkin_timestamp', { ascending: false });
  const { data: visitas = [] } = await query;

  // Pendências
  const [instPendRes, objPendRes, equipePendRes] = await Promise.all([
    db.from('instituicoes').select('*', { count: 'exact', head: true }).eq('pendente_aprovacao', true).eq('ativo', true),
    db.from('objetivos_visita').select('*', { count: 'exact', head: true }).eq('pendente_aprovacao', true),
    db.from('usuarios').select('*', { count: 'exact', head: true }).eq('status', 'pendente').neq('perfil', 'admin'),
  ]);
  const pendInst = instPendRes.count || 0;
  const pendObj = objPendRes.count || 0;
  const pendProf = equipePendRes.count || 0;
  const pendTotal = pendInst + pendObj + pendProf;

  // ============ KPIs ============
  const total = visitas.length;
  const realizadas = visitas.filter(v => v.visita_realizada === true).length;
  const canceladas = visitas.filter(v => v.visita_realizada === false).length;
  const taxaRealiz = total > 0 ? Math.round((realizadas / total) * 100) : 0;
  const divergentes = visitas.filter(v => v.flag_gps_divergente === true).length;
  const manuais = visitas.filter(v => v.checkin_manual === true).length;
  const comGps = visitas.filter(v => !v.checkin_manual).length;
  const gpsValidos = comGps - divergentes;
  const qualidadeGps = total > 0 ? Math.round((gpsValidos / total) * 100) : 0;

  const set = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
  set('relKpiTotal', total);
  set('relKpiTotalHint', total > 0 ? `${realizadas} ${realizadas === 1 ? 'realizada' : 'realizadas'} · ${canceladas} ${canceladas === 1 ? 'cancelada' : 'canceladas'}` : 'sem dados');
  set('relKpiTaxa', total > 0 ? `${taxaRealiz}%` : '—');
  set('relKpiTaxaHint', total > 0 ? `${realizadas} de ${total}` : 'sem dados');
  set('relKpiGps', total > 0 ? `${qualidadeGps}%` : '—');
  set('relKpiGpsHint', total > 0 ? `${divergentes} ${divergentes === 1 ? 'divergente' : 'divergentes'} · ${manuais} ${manuais === 1 ? 'manual' : 'manuais'}` : 'sem dados');
  set('relKpiPend', pendTotal);
  set('relKpiPendHint', pendTotal === 0 ? 'nenhuma' : `${pendInst} inst · ${pendObj} obj · ${pendProf} prof`);

  // ============ Prosa ============
  const labelPeriodo = {
    '7': 'nos últimos 7 dias',
    '30': 'nos últimos 30 dias',
    'mes': 'no mês corrente',
    'tri': 'no trimestre corrente',
    'all': 'em todo o histórico disponível',
  }[periodo] || 'no período selecionado';

  // Top profissional
  const contagemProf = {};
  const nomesProf = {};
  visitas.forEach(v => {
    if (!v.nutricionista_id) return;
    contagemProf[v.nutricionista_id] = (contagemProf[v.nutricionista_id] || 0) + 1;
    if (v.usuarios?.nome) nomesProf[v.nutricionista_id] = v.usuarios.nome;
  });
  const topProfEntries = Object.entries(contagemProf).sort((a, b) => b[1] - a[1]);
  const topProf = topProfEntries[0] ? { nome: nomesProf[topProfEntries[0][0]] || '—', total: topProfEntries[0][1] } : null;

  // Partes da prosa
  const partes = [];
  if (total === 0) {
    partes.push(`<p>Não há visitas registradas ${labelPeriodo}. Se esperava ver dados aqui, verifique se houve check-ins no período ou escolha um intervalo maior.</p>`);
  } else {
    // Só fala em "destaque" se há pelo menos 3 profissionais ativos no período — com 1 ou 2 a frase soa vazia
    const quantosProfAtivos = topProfEntries.length;
    const mostraDestaque = quantosProfAtivos >= 3 && topProf;
    partes.push(`<p>${labelPeriodo.charAt(0).toUpperCase() + labelPeriodo.slice(1)}, a equipe registrou <strong>${total} ${total === 1 ? 'visita' : 'visitas'}</strong>${mostraDestaque ? `, com destaque para <strong>${topProf.nome}</strong> (${topProf.total} ${topProf.total === 1 ? 'visita' : 'visitas'})` : quantosProfAtivos === 1 && topProf ? `, todas registradas por <strong>${topProf.nome}</strong>` : ''}.</p>`);
    if (realizadas + canceladas > 0) {
      partes.push(`<p>A taxa de realização foi de <strong>${taxaRealiz}%</strong> — ${realizadas} ${realizadas === 1 ? 'visita realizada' : 'visitas realizadas'} e ${canceladas} ${canceladas === 1 ? 'cancelada' : 'canceladas'}.</p>`);
    }
    if (total > 0) {
      const qualidadeFrase = qualidadeGps >= 80
        ? `A qualidade dos check-ins foi <strong>boa</strong>, com ${qualidadeGps}% dos registros confirmados por GPS dentro do raio das instituições.`
        : qualidadeGps >= 60
        ? `A qualidade dos check-ins foi <strong>aceitável</strong>, com ${qualidadeGps}% confirmados por GPS. Há ${divergentes + manuais} ${divergentes + manuais === 1 ? 'ocorrência' : 'ocorrências'} que merecem atenção.`
        : `A qualidade dos check-ins merece <strong>atenção</strong>: apenas ${qualidadeGps}% foram confirmados por GPS. Há ${divergentes} ${divergentes === 1 ? 'divergência de localização' : 'divergências de localização'} e ${manuais} ${manuais === 1 ? 'check-in manual' : 'check-ins manuais'}.`;
      partes.push(`<p>${qualidadeFrase}</p>`);
    }
    if (pendTotal > 0) {
      const itensPend = [];
      if (pendProf > 0) itensPend.push(`<strong>${pendProf}</strong> ${pendProf === 1 ? 'cadastro de profissional' : 'cadastros de profissionais'}`);
      if (pendInst > 0) itensPend.push(`<strong>${pendInst}</strong> ${pendInst === 1 ? 'instituição' : 'instituições'}`);
      if (pendObj > 0) itensPend.push(`<strong>${pendObj}</strong> ${pendObj === 1 ? 'objetivo' : 'objetivos'}`);
      partes.push(`<p>No momento da geração deste relatório, há ${itensPend.join(' · ')} aguardando aprovação administrativa.</p>`);
    }
  }
  set('relProsa', partes.join(''));

  // ============ Gráfico de linha ============
  // Injeta no container do relatório (reusa a função existente fazendo swap do id temporariamente)
  const chartEl = document.getElementById('relChartLine');
  if (chartEl) {
    chartEl.id = 'dashChartLine';
    renderDashChartLine(visitas, dataInicio);
    chartEl.id = 'relChartLine';
  }

  // ============ Rankings ============
  renderRankRelatorio('relRankProf', visitas, 'nutricionista_id', 'usuarios', 8);
  renderRankRelatorio('relRankInst', visitas, 'instituicao_id', 'instituicoes', 8);

  // ============ Pizzas ============
  // Swap de IDs pra reusar renderDashPieStatus / renderDashPieCheckin
  const swapIds = [
    ['relPieStatus', 'dashPieStatus', () => renderDashPieStatus(visitas)],
    ['relPieCheckin', 'dashPieCheckin', () => renderDashPieCheckin(visitas)],
    ['relBarsObj', 'dashPieObj', () => renderDashBarsObjetivos(dataInicio)],
  ];
  for (const [originalId, tempId, fn] of swapIds) {
    const el = document.getElementById(originalId);
    if (!el) continue;
    el.id = tempId;
    await Promise.resolve(fn());
    el.id = originalId;
  }

  // ============ Lista completa de visitas ============
  renderListaVisitasRelatorio(visitas);
}

// Ranking sem animações de barra (melhor pra impressão)
function renderRankRelatorio(containerId, visitas, foreignKey, joinKey, topN) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const contagem = {};
  const nomes = {};
  visitas.forEach(v => {
    const id = v[foreignKey];
    if (!id) return;
    contagem[id] = (contagem[id] || 0) + 1;
    if (v[joinKey]?.nome) nomes[id] = v[joinKey].nome;
  });
  const ranked = Object.entries(contagem)
    .map(([id, count]) => ({ id, count, nome: nomes[id] || '(sem nome)' }))
    .sort((a, b) => b.count - a.count)
    .slice(0, topN);
  if (ranked.length === 0) {
    container.innerHTML = '<div style="padding:10px;color:#999;font-size:12px;">Sem dados</div>';
    return;
  }
  const maxCount = ranked[0].count;
  container.innerHTML = `
    <table class="relatorio-table">
      <thead><tr><th style="width:30px;">#</th><th>Nome</th><th style="width:50px;text-align:right;">Visitas</th></tr></thead>
      <tbody>
        ${ranked.map((r, i) => `
          <tr>
            <td style="color:#999;font-family:var(--font-mono);">${i + 1}</td>
            <td>${r.nome}
              <div style="height:4px;background:#EEE;border-radius:2px;margin-top:3px;overflow:hidden;">
                <div style="height:100%;width:${(r.count / maxCount * 100).toFixed(1)}%;background:#8BC63F;"></div>
              </div>
            </td>
            <td style="text-align:right;font-family:var(--font-mono);font-weight:700;">${r.count}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// Lista completa de visitas (tabela bem densa pra caber na página)
function renderListaVisitasRelatorio(visitas) {
  const el = document.getElementById('relListaVisitas');
  if (!el) return;
  if (visitas.length === 0) {
    el.innerHTML = '<div style="padding:20px;color:#999;text-align:center;">Sem visitas no período.</div>';
    return;
  }
  const fmtData = (iso) => {
    if (!iso) return '—';
    const d = new Date(iso);
    return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth()+1).toString().padStart(2, '0')}/${d.getFullYear()} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
  };
  const statusLabel = (v) => {
    if (v.status === 'completa') return 'Completa';
    if (v.status === 'aprovada_pos_revisao') return 'Aprovada pós-rev.';
    if (v.status === 'rascunho' && v.revisao_motivo) return 'Devolvida p/ revisão';
    if (v.status === 'rascunho') return 'Rascunho';
    return v.status || '—';
  };
  const realizadaLabel = (v) => {
    if (v.visita_realizada === true) return '✓ Realizada';
    if (v.visita_realizada === false) return '✗ Cancelada';
    return '—';
  };
  el.innerHTML = `
    <table class="relatorio-table relatorio-table--compact">
      <thead>
        <tr>
          <th>Data/hora</th>
          <th>Profissional</th>
          <th>Instituição</th>
          <th>Status</th>
          <th>Resultado</th>
          <th style="width:50px;">GPS</th>
        </tr>
      </thead>
      <tbody>
        ${visitas.map(v => `
          <tr>
            <td style="font-family:var(--font-mono);font-size:11px;white-space:nowrap;">${fmtData(v.checkin_timestamp)}</td>
            <td>${(v.usuarios?.nome || '—').replace(/"/g,'&quot;')}</td>
            <td>${(v.instituicoes?.nome || '—').replace(/"/g,'&quot;')}</td>
            <td>${statusLabel(v)}</td>
            <td>${realizadaLabel(v)}</td>
            <td style="text-align:center;">${v.checkin_manual ? '🅼' : v.flag_gps_divergente ? '⚠' : '✓'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    <div style="font-size:10px;color:#888;margin-top:6px;">
      🅼 = check-in manual · ⚠ = GPS divergente · ✓ = GPS validado
    </div>
  `;
}

   Modal tela cheia com input, debounce 300ms, 3 seções de resultados.
   Clique em resultado leva pra tela correspondente.

/* ==========================================================================
   Helpers pra destaque de item vindo de busca global (?id=X)
   Usado pelas telas de destino após navegação vinda da busca.
   ========================================================================== */

// Lê o parâmetro ?id= do hash atual (ex: #/admin/visitas?id=abc → "abc")
function getIdDaURL(paramName = 'id') {
  const h = window.location.hash || '';
  const q = h.indexOf('?');
  if (q === -1) return null;
  const params = new URLSearchParams(h.substring(q + 1));
  return params.get(paramName);
}

// Scrolla e destaca um card identificado por data-id. Chama após o render da lista.
// `seletorBase` deve usar `[data-id="..."]` pra funcionar (ex: '.my-card[data-id="%ID%"]')
function destacarItemDaURL(seletorComPlaceholder, paramName = 'id') {
  const id = getIdDaURL(paramName);
  if (!id) return;
  // Pequeno delay pra garantir que DOM renderizou
  setTimeout(() => {
    const seletor = seletorComPlaceholder.replace('%ID%', CSS.escape(id));
    const el = document.querySelector(seletor);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('busca-destaque');
    // Remove a classe depois do pulse pra poder reaplicar se voltar
    setTimeout(() => el.classList.remove('busca-destaque'), 2400);
  }, 200);
}

window.abrirBuscaGlobal = function() {
  // Evita abrir dois
  if (document.getElementById('buscaGlobalModal')) return;

  const user = getCurrentUser();
  const ehAdmin = !!user && user.perfil === 'admin';
  const placeholder = ehAdmin
    ? 'Buscar visitas, instituições, profissionais...'

  const overlay = document.createElement('div');
  overlay.id = 'buscaGlobalModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,31,92,0.6);backdrop-filter:blur(4px);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding-top:8vh;';

  overlay.innerHTML = `
    <div style="background:var(--neutral-0);width:100%;max-width:560px;margin:0 16px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;display:flex;flex-direction:column;max-height:80vh;">

          Digite ao menos 2 caracteres pra começar a buscar.
        </div>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  // Fecha ao clicar fora do modal interno
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) fecharBuscaGlobal();
  });

  // Fecha com ESC
  const escHandler = (e) => {
    if (e.key === 'Escape') fecharBuscaGlobal();
  };
  document.addEventListener('keydown', escHandler);
  overlay._escHandler = escHandler;

  // Foca o input e hooka no debounce
  const input = document.getElementById('buscaGlobalInput');
  setTimeout(() => input?.focus(), 50);

  let timer = null;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value;
    if (q.trim().length < 2) {
      document.getElementById('buscaGlobalResultados').innerHTML = `
        <div style="padding:40px 20px;text-align:center;color:var(--neutral-500);font-size:13px;">

        </div>

    document.getElementById('buscaGlobalResultados').innerHTML = `

        <div style="margin-top:6px;">Buscando...</div>
      </div>
    `;
    timer = setTimeout(() => executarBuscaGlobal(q), 300);
  });
};

window.fecharBuscaGlobal = function() {
  const overlay = document.getElementById('buscaGlobalModal');
  if (!overlay) return;
  if (overlay._escHandler) document.removeEventListener('keydown', overlay._escHandler);

};

async function executarBuscaGlobal(query) {
  const resEl = document.getElementById('buscaGlobalResultados');
  if (!resEl) return;

  const resultados = await buscarGlobal(query);
  const total = resultados.visitas.length + resultados.instituicoes.length + resultados.profissionais.length;

  if (total === 0) {
    resEl.innerHTML = `
      <div style="padding:40px 20px;text-align:center;color:var(--neutral-500);">
        <span class="material-symbols-rounded" style="font-size:36px;opacity:.5;">search_off</span>
        <div style="margin-top:8px;font-size:14px;font-weight:600;color:var(--brand-navy);">Nenhum resultado</div>
        <div style="margin-top:4px;font-size:12.5px;">Tente outras palavras ou cheque a grafia.</div>
      </div>
    `;
    return;
  }

  let html = '';

  // Seção: Instituições
  if (resultados.instituicoes.length > 0) {
    html += renderBuscaSecao('Instituições', 'apartment', resultados.instituicoes.map(i => {
      const inativo = i.ativo === false ? '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--neutral-200);color:var(--neutral-600);margin-left:6px;">INATIVA</span>' : '';
      const cidade = i.cidade ? `${i.cidade}${i.estado ? '/' + i.estado : ''}` : '—';
      return `
        <div onclick="buscaIrInstituicao('${i.id}')" class="busca-item" style="padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 140ms;" onmouseover="this.style.background='var(--neutral-50)'" onmouseout="this.style.background='transparent'">
          <span class="material-symbols-rounded" style="font-size:20px;color:var(--brand-navy);">apartment</span>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;color:var(--brand-navy);font-size:13.5px;line-height:1.3;">
              ${(i.nome || '').replace(/</g,'&lt;')}${inativo}
            </div>
            <div style="font-size:11.5px;color:var(--neutral-600);margin-top:1px;">${cidade}</div>
          </div>
        </div>
      `;
    }).join(''));
  }

  // Seção: Profissionais
  if (resultados.profissionais.length > 0) {
    html += renderBuscaSecao('Profissionais', 'group', resultados.profissionais.map(p => {
      const perfilLabel = p.perfil === 'admin' ? 'Administrador' : (p.categorias_profissionais?.nome || 'Profissional');
      const statusBadge = p.status !== 'ativo'
        ? `<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--neutral-200);color:var(--neutral-600);margin-left:6px;">${String(p.status).toUpperCase()}</span>`
        : '';
      return `
        <div onclick="buscaIrProfissional('${p.id}')" class="busca-item" style="padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 140ms;" onmouseover="this.style.background='var(--neutral-50)'" onmouseout="this.style.background='transparent'">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--brand-navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;font-family:var(--font-display);flex-shrink:0;">${iniciais(p.nome || '?')}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;color:var(--brand-navy);font-size:13.5px;line-height:1.3;">
              ${(p.nome || '').replace(/</g,'&lt;')}${statusBadge}
            </div>
            <div style="font-size:11.5px;color:var(--neutral-600);margin-top:1px;">${perfilLabel}</div>
          </div>
        </div>
      `;
    }).join(''));
  }

  // Seção: Visitas
  if (resultados.visitas.length > 0) {
    html += renderBuscaSecao('Visitas', 'description', resultados.visitas.map(v => {
      const inst = v.instituicoes?.nome || 'Instituição';
      const prof = v.usuarios?.nome || 'Profissional';
      const dt = (() => {
        if (!v.data_visita) return '';
        const [y, m, d] = String(v.data_visita).split('-').map(Number);
        return `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`;
      })();
      const trechoResumo = v.resumo ? `"${v.resumo.substring(0, 80)}${v.resumo.length > 80 ? '...' : ''}"` : '';
      const statusMap = {
        completa:'Completa', rascunho:'Rascunho', em_revisao:'Em revisão',
        aprovada_pos_revisao:'Aprovada', agendada:'Agendada', sugerida:'Sugerida',
      };
      const statusLabel = statusMap[v.status] || v.status;
      return `
        <div onclick="buscaIrVisita('${v.id}')" class="busca-item" style="padding:10px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:background 140ms;" onmouseover="this.style.background='var(--neutral-50)'" onmouseout="this.style.background='transparent'">
          <span class="material-symbols-rounded" style="font-size:20px;color:var(--brand-navy);margin-top:1px;">description</span>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;color:var(--brand-navy);font-size:13.5px;line-height:1.3;">
              ${(inst).replace(/</g,'&lt;')} · ${dt}
              <span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--neutral-100);color:var(--neutral-700);margin-left:6px;">${statusLabel}</span>
            </div>
            <div style="font-size:11.5px;color:var(--neutral-600);margin-top:1px;">${(prof).replace(/</g,'&lt;')}</div>
            ${trechoResumo ? `<div style="font-size:11.5px;color:var(--neutral-500);margin-top:3px;font-style:italic;">${trechoResumo.replace(/</g,'&lt;')}</div>` : ''}
          </div>
        </div>
      `;
    }).join(''));
  }

  resEl.innerHTML = html;
}

window.irParaPendenciasInteligente = async function() {
  // Faz uma mini consulta rápida pra decidir o destino
  const [instRes, objRes, equipeRes] = await Promise.all([
    db.from('instituicoes').select('*', { count: 'exact', head: true }).eq('pendente_aprovacao', true).eq('ativo', true),
    db.from('objetivos_visita').select('*', { count: 'exact', head: true }).eq('pendente_aprovacao', true),
    db.from('usuarios').select('*', { count: 'exact', head: true }).eq('status', 'pendente').neq('perfil', 'admin'),
  ]);
  const pendInst = instRes.count || 0;
  const pendObj = objRes.count || 0;
  const pendProf = equipeRes.count || 0;

  // Regra: se tem pendências de dados (inst/obj), vai pra Pendentes. Se só tem prof, vai pra Equipe.
  // Se tem os dois, vai pra Pendentes que é mais comum; banner separado já cobre equipe.
  if (pendInst + pendObj + pendProf === 0) {
    // Sem pendências → vai mesmo assim pra Pendentes (tela vazia é melhor que nada)
    window.location.hash = '#/admin/pendentes';
  } else if (pendInst + pendObj > 0) {
    window.location.hash = '#/admin/pendentes';
  } else {
    // Só profissionais pendentes
    window.location.hash = '#/admin/equipe?filtro=pendentes';
  }
};

async function carregarFilaRevisao() {
  const listEl = document.getElementById('reviewList');
  if (!listEl) return;

  try {
    // Carrega counts + lista em paralelo
    const [counts, visitas] = await Promise.all([
      contarVisitasPorFiltro(),
      listarVisitasAdmin(window._reviewFilter || 'com_flags'),
    ]);

    // Atualiza counts dos tabs
    if (document.getElementById('cntComFlags')) document.getElementById('cntComFlags').textContent = counts.com_flags;
    if (document.getElementById('cntEmRevisao')) document.getElementById('cntEmRevisao').textContent = counts.em_revisao;
    if (document.getElementById('cntResolvidas')) document.getElementById('cntResolvidas').textContent = counts.resolvidas;
    if (document.getElementById('cntTodas')) document.getElementById('cntTodas').textContent = counts.todas;

    if (visitas.length === 0) {
      const msgs = {
        com_flags: { icon: 'verified', title: 'Nenhuma visita com divergência', desc: 'Todas as visitas estão dentro dos parâmetros.' },
        em_revisao: { icon: 'inbox', title: 'Nenhuma visita em revisão', desc: 'A fila está limpa.' },
        resolvidas: { icon: 'task_alt', title: 'Nenhuma visita resolvida ainda', desc: 'Visitas que você aprovar após revisão aparecerão aqui.' },
        todas: { icon: 'assignment', title: 'Nenhuma visita cadastrada', desc: 'Aguardando primeiras visitas dos nutricionistas.' },
      };
      const m = msgs[window._reviewFilter] || msgs.com_flags;
      listEl.innerHTML = `
        <div class="empty-state" style="margin:0;">
          <div class="empty-state__icon">
            <span class="material-symbols-rounded">${m.icon}</span>
          </div>
          <div class="empty-state__title">${m.title}</div>
          <div class="empty-state__desc">${m.desc}</div>
        </div>
      `;
      return;
    }

    // Ordena: mais flags críticas primeiro
    visitas.forEach(v => {
      v._flags = getFlagsAtivas(v);
      v._nivel = getNivelCritico(v._flags);
      v._peso = (v._flags.filter(f => f.nivel === 'critical').length * 100)
              + (v._flags.filter(f => f.nivel === 'warning').length * 10)
              + v._flags.length;
    });
    visitas.sort((a, b) => b._peso - a._peso);

    listEl.innerHTML = visitas.map(v => {
      const nivel = v._nivel || 'info';
      // Classe especial pra visitas com revisão solicitada (devolvidas pro profissional),
      // independente do status (rascunho novo padrão ou em_revisao legado)
      const emRevisao = v.status === 'em_revisao' || (v.status === 'rascunho' && v.revisao_motivo && !v.revisao_resolvida_em);
      const cardClass = emRevisao ? 'review-card--in-review' : `review-card--${nivel}`;
      const dataFmt = v.checkin_timestamp ? formatarTempoRelativo(v.checkin_timestamp) : (v.data_visita || '—');
      const nutriNome = v.usuarios?.nome || v.nutricionista?.nome || '—';
      const flagsHtml = v._flags.slice(0, 3).map(f => `
        <span class="review-flag review-flag--${f.nivel}">
          <span class="material-symbols-rounded">${f.icone}</span>
          ${f.titulo}
        </span>
      `).join('');
      const maisFlags = v._flags.length > 3 ? `<span class="review-flag review-flag--info">+${v._flags.length - 3}</span>` : '';
      const flagCountClass = nivel === 'critical' ? 'review-card__flag-count--critical' : 'review-card__flag-count--warning';

      return `
        <a href="#/admin/revisao/detalhe?id=${v.id}" class="review-card ${cardClass}">
          <div class="review-card__header">
            <div class="review-card__icon">
              <span class="material-symbols-rounded">local_hospital</span>
            </div>
            <div class="review-card__info">
              <div class="review-card__inst">${(v.instituicoes?.nome || 'Instituição').replace(/"/g,'&quot;')}</div>
              <div class="review-card__meta">
                <span class="review-card__meta-item">
                  <span class="material-symbols-rounded">person</span>${nutriNome.split(' ')[0]}
                </span>
                <span class="review-card__meta-item">
                  <span class="material-symbols-rounded">schedule</span>${dataFmt}
                </span>
                ${sbadgeForStatus(v)}
              </div>
            </div>
            ${v._flags.length > 0 ? `
              <div class="review-card__flag-count ${flagCountClass}">
                <span class="material-symbols-rounded" style="font-size:14px">flag</span>${v._flags.length}
              </div>
            ` : ''}
          </div>
          ${v._flags.length > 0 ? `<div class="review-flags">${flagsHtml}${maisFlags}</div>` : ''}
        </a>
      `;
    }).join('');
  } catch (err) {
    listEl.innerHTML = `
      <div class="empty-state" style="margin:0;">
        <div class="empty-state__icon" style="background:var(--status-danger-bg);color:var(--status-danger);">
          <span class="material-symbols-rounded">error</span>
        </div>
        <div class="empty-state__title">Erro ao carregar</div>
        <div class="empty-state__desc">${err.message}</div>
      </div>
    `;
  }
}

async function popularFiltrosVisitas() {
  const selProf = document.getElementById('avFiltroProfissional');
  const selInst = document.getElementById('avFiltroInstituicao');
  if (!selProf || !selInst) return;

  const [{ data: profs }, { data: insts }] = await Promise.all([
    db.from('usuarios').select('id, nome').eq('perfil', 'nutricionista').eq('status', 'ativo').order('nome'),
    db.from('instituicoes').select('id, nome').eq('ativo', true).order('nome'),
  ]);
  const f = window._visitasFilter;
  selProf.innerHTML = '<option value="todos">Todos</option>' +
    (profs || []).map(p => `<option value="${p.id}"${f.profissional_id === p.id ? ' selected' : ''}>${(p.nome || '').replace(/"/g,'&quot;')}</option>`).join('');
  selInst.innerHTML = '<option value="todos">Todas</option>' +
    (insts || []).map(i => `<option value="${i.id}"${f.instituicao_id === i.id ? ' selected' : ''}>${(i.nome || '').replace(/"/g,'&quot;')}</option>`).join('');

  // Liga handlers
  document.querySelectorAll('#avPeriodSelector .dash-period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#avPeriodSelector .dash-period-btn').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      window._visitasFilter.periodo = btn.dataset.val;
      carregarListaVisitas();
    });
  });
  document.getElementById('avFiltroStatus').addEventListener('change', (e) => {
    window._visitasFilter.status = e.target.value;
    carregarListaVisitas();
  });
  selProf.addEventListener('change', (e) => {
    window._visitasFilter.profissional_id = e.target.value;
    carregarListaVisitas();
  });
  selInst.addEventListener('change', (e) => {
    window._visitasFilter.instituicao_id = e.target.value;
    carregarListaVisitas();
  });
  const selGps = document.getElementById('avFiltroGps');
  if (selGps) {
    selGps.addEventListener('change', (e) => {
      window._visitasFilter.gps = e.target.value;
      carregarListaVisitas();
    });
  }
}

window.limparFiltrosVisitas = function() {
  window._visitasFilter = { periodo: '30', status: 'todos', profissional_id: 'todos', instituicao_id: 'todos', gps: 'todos' };

  document.querySelectorAll('#avPeriodSelector .dash-period-btn').forEach(b => {

async function carregarListaVisitas() {
  const listEl = document.getElementById('avList');
  const cntEl = document.getElementById('avCount');
  if (!listEl) return;
  listEl.innerHTML = `<div style="padding:30px;text-align:center;color:var(--neutral-400);font-size:12px;">Carregando...</div>`;

  const f = window._visitasFilter;
  const dataInicio = calcularDataInicio(f.periodo);

  let query = db.from('visitas').select(`
    id, status, data_visita, checkin_timestamp, checkout_timestamp,
    checkin_manual, flag_gps_divergente, flag_horario_fora_margem,
    flag_sem_checkin, flag_sem_checkout,
    visita_realizada, revisao_motivo, revisao_resolvida_em,
    nutricionista_id, instituicao_id,
    usuarios:nutricionista_id(nome),
    instituicoes(nome)
  `);
  if (dataInicio) query = query.gte('checkin_timestamp', dataInicio);

  // Filtros adicionais (aplica os que forem != 'todos')
  if (f.profissional_id !== 'todos') query = query.eq('nutricionista_id', f.profissional_id);
  if (f.instituicao_id !== 'todos') query = query.eq('instituicao_id', f.instituicao_id);

  // Status tem casos especiais:
  //  - 'realizada' e 'cancelada' usam a coluna visita_realizada
  //  - 'em_revisao' na UI = rascunho devolvido pelo admin (status='rascunho' + revisao_motivo preenchido)
  //  - outros valores vão direto pra coluna status
  if (f.status === 'realizada') query = query.eq('visita_realizada', true);
  else if (f.status === 'cancelada') query = query.eq('visita_realizada', false);
  else if (f.status === 'em_revisao') {
    query = query.eq('status', 'rascunho').not('revisao_motivo', 'is', null);
  } else if (f.status === 'rascunho') {
    // Se filtrar "rascunho puro", exclui os devolvidos (que são rascunho+motivo)
    query = query.eq('status', 'rascunho').is('revisao_motivo', null);
  } else if (f.status !== 'todos') {
    query = query.eq('status', f.status);
  }

  // Filtro de qualidade GPS
  //  - 'validado': sem flag de divergência E não é manual
  //  - 'problema': tem flag_gps_divergente = true OR checkin_manual = true
  //  - 'divergente': só as com flag_gps_divergente = true
  //  - 'manual': só as com checkin_manual = true
  if (f.gps === 'validado') {
    query = query.eq('checkin_manual', false).eq('flag_gps_divergente', false);
  } else if (f.gps === 'problema') {
    query = query.or('flag_gps_divergente.eq.true,checkin_manual.eq.true');
  } else if (f.gps === 'divergente') {
    query = query.eq('flag_gps_divergente', true);
  } else if (f.gps === 'manual') {
    query = query.eq('checkin_manual', true);
  }

  // Ordena do mais recente pro mais antigo
  query = query.order('checkin_timestamp', { ascending: false, nullsFirst: false });

  const { data, error } = await query;
  if (error) {
    listEl.innerHTML = `<div style="padding:20px;color:var(--status-danger);">Erro: ${error.message}</div>`;
    return;
  }
  const visitas = data || [];

  // Atualiza contagem
  if (cntEl) {
    cntEl.innerHTML = `<strong>${visitas.length}</strong> ${visitas.length === 1 ? 'visita encontrada' : 'visitas encontradas'}`;
  }

  if (visitas.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state" style="margin:0;">
        <div class="empty-state__icon"><span class="material-symbols-rounded">search_off</span></div>
        <div class="empty-state__title">Nenhuma visita encontrada</div>
        <div class="empty-state__desc">Ajuste os filtros ou mude o período para ver mais resultados.</div>
      </div>
    `;
    return;
  }

  // Renderiza cards reutilizando o visual da review-card (que já é bem polido)
  listEl.innerHTML = visitas.map(v => {
    const flags = getFlagsAtivas(v);
    const nivel = flags.some(f => f.nivel === 'critical') ? 'critical' : flags.length > 0 ? 'warning' : 'ok';
    const dataFmt = v.checkin_timestamp ? formatarTempoRelativo(v.checkin_timestamp) : (v.data_visita || '—');
    const nutriNome = v.usuarios?.nome || '—';
    const flagsHtml = flags.slice(0, 3).map(fl => `
      <span class="review-flag review-flag--${fl.nivel}">
        <span class="material-symbols-rounded">${fl.icone}</span>
        ${fl.titulo}
      </span>
    `).join('');
    const maisFlags = flags.length > 3 ? `<span class="review-flag review-flag--info">+${flags.length - 3}</span>` : '';
    const flagCountClass = nivel === 'critical' ? 'review-card__flag-count--critical' : 'review-card__flag-count--warning';
    const cardClass = nivel === 'critical' ? 'review-card--critical' : nivel === 'warning' ? 'review-card--warning' : '';

    return `
      <a href="#/admin/revisao/detalhe?id=${v.id}" data-id="${v.id}" class="review-card ${cardClass}">
        <div class="review-card__header">
          <div class="review-card__icon">
            <span class="material-symbols-rounded">local_hospital</span>
          </div>
          <div class="review-card__info">
            <div class="review-card__inst">${(v.instituicoes?.nome || 'Instituição').replace(/"/g,'&quot;')}</div>
            <div class="review-card__meta">
              <span class="review-card__meta-item">
                <span class="material-symbols-rounded">person</span>${(nutriNome || '').split(' ')[0] || '—'}
              </span>
              <span class="review-card__meta-item">
                <span class="material-symbols-rounded">schedule</span>${dataFmt}
              </span>
              ${sbadgeForStatus(v)}
            </div>
          </div>
          ${flags.length > 0 ? `
            <div class="review-card__flag-count ${flagCountClass}">
              <span class="material-symbols-rounded" style="font-size:14px">flag</span>${flags.length}
            </div>
          ` : ''}
        </div>
        ${flags.length > 0 ? `<div class="review-flags">${flagsHtml}${maisFlags}</div>` : ''}
      </a>
    `;
  }).join('');
  // Destaca item vindo de busca global
  destacarItemDaURL('.review-card[data-id="%ID%"]');
}

/* ==========================================================================
   Exportar CSV da tela /admin/visitas (Sprint 5 Mini 3)
   - Respeita os mesmos filtros aplicados em carregarListaVisitas()
   - Paginação de 1000 em 1000 pra trazer tudo (Supabase limita em 1000/req)
   - Separador ";" + BOM UTF-8 pra abrir certo no Excel PT-BR
   - Feedback visual no botão
   ========================================================================== */

// Escape de campo CSV: envolve em aspas se tiver separador, quebra de linha ou aspas.
// Duplica aspas internas conforme RFC 4180.
function _csvField(value) {
  if (value === null || value === undefined) return '';
  const s = String(value);
  if (s === '') return '';
  const precisaEscape = /[;,"\r\n]/.test(s);
  if (!precisaEscape) return s;
  return '"' + s.replace(/"/g, '""') + '"';
}

// Formata ISO timestamp pra "DD/MM/AAAA HH:MM" em hora local (America/Sao_Paulo do navegador do user)
function _fmtDateTimeBR(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// Formata só a data (YYYY-MM-DD vindo do DB) pra "DD/MM/AAAA"
function _fmtDataBR(dataStr) {
  if (!dataStr) return '';
  // aceita "2026-04-20" ou "2026-04-20T..." 
  const m = String(dataStr).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return dataStr;
  return `${m[3]}/${m[2]}/${m[1]}`;
}

// "HH:MM:SS" -> "HH:MM" (horario_inicio / horario_termino vêm assim no banco)
function _fmtHoraBR(h) {
  if (!h) return '';
  const m = String(h).match(/^(\d{2}:\d{2})/);
  return m ? m[1] : h;
}

// Status legível pro CSV (mesma lógica do sbadgeForStatus)
function _labelStatusCsv(v) {
  if (v.status === 'rascunho' && v.revisao_motivo && v.revisao_solicitada_em && !v.revisao_resolvida_em) {
    return 'Revisão solicitada';
  }
  const map = {
    'rascunho': 'Rascunho',
    'completa': 'Concluída',
    'em_revisao': 'Em revisão',
    'aprovada_pos_revisao': 'Aprovada pós-revisão',
  };
  return map[v.status] || (v.status || '');
}

function _labelResultado(v) {
  if (v.visita_realizada === true) return 'Realizada';
  if (v.visita_realizada === false) return 'Cancelada';
  return '';
}

// Converte período em slug curto pra nome do arquivo
function _periodoSlug(p) {
  switch (p) {
    case '7':   return '7dias';
    case '30':  return '30dias';
    case 'mes': return 'mes-atual';
    case 'tri': return 'trimestre';
    case 'all': return 'tudo';
    default:    return String(p || 'periodo');
  }
}

// Aplica os filtros de window._visitasFilter numa query Supabase (mantém em sincronia com carregarListaVisitas)
function _aplicarFiltrosVisitas(query, f) {
  const dataInicio = calcularDataInicio(f.periodo);
  if (dataInicio) query = query.gte('checkin_timestamp', dataInicio);
  if (f.profissional_id !== 'todos') query = query.eq('nutricionista_id', f.profissional_id);
  if (f.instituicao_id !== 'todos') query = query.eq('instituicao_id', f.instituicao_id);

  if (f.status === 'realizada') query = query.eq('visita_realizada', true);
  else if (f.status === 'cancelada') query = query.eq('visita_realizada', false);
  else if (f.status === 'em_revisao') {
    query = query.eq('status', 'rascunho').not('revisao_motivo', 'is', null);
  } else if (f.status === 'rascunho') {
    query = query.eq('status', 'rascunho').is('revisao_motivo', null);
  } else if (f.status !== 'todos') {
    query = query.eq('status', f.status);
  }

  if (f.gps === 'validado') {
    query = query.eq('checkin_manual', false).eq('flag_gps_divergente', false);
  } else if (f.gps === 'problema') {
    query = query.or('flag_gps_divergente.eq.true,checkin_manual.eq.true');
  } else if (f.gps === 'divergente') {
    query = query.eq('flag_gps_divergente', true);
  } else if (f.gps === 'manual') {
    query = query.eq('checkin_manual', true);
  }

  return query;
}

window.exportarVisitasCSV = async function() {
  const btn = document.getElementById('avBtnExport');
  if (!btn) return;
  if (!db) { alert('Banco não conectado.'); return; }

  const textoOriginal = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Exportando...';

  try {
    const f = window._visitasFilter || { periodo: '30', status: 'todos', profissional_id: 'todos', instituicao_id: 'todos', gps: 'todos' };

    // Select expandido: mais campos úteis pra análise offline
    const SELECT = `
      id, status, data_visita, horario_inicio, horario_termino,
      checkin_timestamp, checkout_timestamp, checkin_manual,
      flag_gps_divergente, flag_horario_fora_margem, flag_sem_checkin, flag_sem_checkout,
      visita_realizada, revisao_motivo, revisao_solicitada_em, revisao_resolvida_em,
      resumo,
      nutricionista_id, instituicao_id,
      usuarios:nutricionista_id(nome, email, cpf),
      instituicoes(nome, cidade, estado)
    `;

    // Paginação: 1000 por página até esgotar
    const PAGE = 1000;
    const MAX_PAGES = 20; // hard cap 20.000 linhas pra segurança
    let from = 0;
    const todas = [];

    for (let pag = 0; pag < MAX_PAGES; pag++) {
      let q = db.from('visitas').select(SELECT);
      q = _aplicarFiltrosVisitas(q, f);
      q = q.order('checkin_timestamp', { ascending: false, nullsFirst: false }).range(from, from + PAGE - 1);

      const { data, error } = await q;
      if (error) throw new Error(error.message);
      if (!data || data.length === 0) break;
      todas.push(...data);
      if (data.length < PAGE) break;
      from += PAGE;
    }

    if (todas.length === 0) {
      alert('Nenhuma visita pra exportar com os filtros atuais.');
      return;
    }

    // Monta cabeçalho + linhas
    const cabecalho = [
      'ID', 'Data da visita', 'Hora início', 'Hora fim',
      'Check-in', 'Check-out', 'Duração (min)',
      'Profissional', 'E-mail', 'CPF',
      'Instituição', 'Cidade', 'UF',
      'Status', 'Resultado',
      'Check-in manual', 'GPS divergente', 'Horário fora da margem',
      'Sem check-in', 'Sem check-out',
      'Motivo da revisão', 'Revisão solicitada em', 'Revisão resolvida em',
      'Relatório'
    ];

    const sim = v => v === true ? 'Sim' : v === false ? 'Não' : '';
    const duracao = (ci, co) => {
      if (!ci || !co) return '';
      const diff = new Date(co).getTime() - new Date(ci).getTime();
      if (isNaN(diff) || diff < 0) return '';
      return String(Math.round(diff / 60000));
    };

    const linhas = todas.map(v => [
      v.id || '',
      _fmtDataBR(v.data_visita),
      _fmtHoraBR(v.horario_inicio),
      _fmtHoraBR(v.horario_termino),
      _fmtDateTimeBR(v.checkin_timestamp),
      _fmtDateTimeBR(v.checkout_timestamp),
      duracao(v.checkin_timestamp, v.checkout_timestamp),
      v.usuarios?.nome || '',
      v.usuarios?.email || '',
      v.usuarios?.cpf || '',
      v.instituicoes?.nome || '',
      v.instituicoes?.cidade || '',
      v.instituicoes?.estado || '',
      _labelStatusCsv(v),
      _labelResultado(v),
      sim(v.checkin_manual),
      sim(v.flag_gps_divergente),
      sim(v.flag_horario_fora_margem),
      sim(v.flag_sem_checkin),
      sim(v.flag_sem_checkout),
      v.revisao_motivo || '',
      _fmtDateTimeBR(v.revisao_solicitada_em),
      _fmtDateTimeBR(v.revisao_resolvida_em),
      v.resumo || ''
    ].map(_csvField).join(';'));

    const conteudoCsv = cabecalho.map(_csvField).join(';') + '\r\n' + linhas.join('\r\n') + '\r\n';

    // BOM UTF-8 pra Excel reconhecer acentos
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + conteudoCsv], { type: 'text/csv;charset=utf-8;' });

    // Nome do arquivo: visitas_YYYY-MM-DD_<periodo>[_filtrado].csv
    const hoje = new Date();
    const dataStr = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
    const periodoSlug = _periodoSlug(f.periodo);
    const temFiltroExtra = f.status !== 'todos' || f.profissional_id !== 'todos' || f.instituicao_id !== 'todos' || f.gps !== 'todos';
    const sufixo = temFiltroExtra ? '_filtrado' : '';
    const nomeArquivo = `visitas_${dataStr}_${periodoSlug}${sufixo}.csv`;

    // Dispara download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = nomeArquivo;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);

    console.log(`[export CSV] ${todas.length} visitas exportadas -> ${nomeArquivo}`);
  } catch (err) {
    console.error('[exportarVisitasCSV] erro:', err);
    alert('Erro ao exportar CSV: ' + (err.message || err));
  } finally {
    btn.disabled = false;
    btn.innerHTML = textoOriginal;
  }
};

// Formata timestamp completo (data + hora)
// Renderiza mini mapa SVG ilustrativo com os pinos check-in / check-out / instituição
// + link pro Google Maps com rota completa.
function renderMiniMapaVisita(v) {
  const inst = v.instituicoes || {};
  const temInst = inst.latitude !== null && inst.latitude !== undefined;
  const temCheckin = v.checkin_latitude !== null && v.checkin_latitude !== undefined;
  const temCheckout = v.checkout_latitude !== null && v.checkout_latitude !== undefined;

  // Se não tem nenhuma coord, não renderiza nada
  if (!temInst && !temCheckin && !temCheckout) return '';

  // Coleta pontos com lat/lng pra calcular bounds
  const pontos = [];
  if (temInst) pontos.push({ tipo: 'inst', lat: inst.latitude, lng: inst.longitude, cor: 'var(--brand-lime)', label: 'Local' });
  if (temCheckin) pontos.push({ tipo: 'in', lat: v.checkin_latitude, lng: v.checkin_longitude, cor: 'var(--status-info)', label: 'Check-in' });
  if (temCheckout) pontos.push({ tipo: 'out', lat: v.checkout_latitude, lng: v.checkout_longitude, cor: 'var(--status-warning)', label: 'Check-out' });

  // Bounds
  const lats = pontos.map(p => p.lat);
  const lngs = pontos.map(p => p.lng);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const dLat = Math.max(maxLat - minLat, 0.001);
  const dLng = Math.max(maxLng - minLng, 0.001);
  // Padding nos bounds (15% de margem)
  const padLat = dLat * 0.2, padLng = dLng * 0.2;

  // Mapeia para coords de tela (SVG 100x50 viewBox)
  const W = 100, H = 50;
  const toXY = (lat, lng) => {
    const x = ((lng - (minLng - padLng)) / (dLng + 2 * padLng)) * W;
    // inverte Y (lat maior = mais ao norte = topo)
    const y = H - ((lat - (minLat - padLat)) / (dLat + 2 * padLat)) * H;
    return { x, y };
  };

  // Calcula distância aproximada entre check-in e instituição (pra mostrar no label)
  let distStr = '';
  if (temCheckin && temInst) {
    const d = calcularDistanciaMetros(v.checkin_latitude, v.checkin_longitude, inst.latitude, inst.longitude);
    distStr = d < 1000 ? `${Math.round(d)}m do local` : `${(d / 1000).toFixed(1)}km do local`;
  }

  // Monta URL do Google Maps com todos os pinos
  const mapUrl = pontos.length > 1
    ? `https://www.google.com/maps/dir/${pontos.map(p => `${p.lat},${p.lng}`).join('/')}`
    : `https://www.google.com/maps?q=${pontos[0].lat},${pontos[0].lng}`;

  // Linha ligando check-in -> check-out (se ambos existem)
  let linhaPath = '';
  if (temCheckin && temCheckout) {
    const a = toXY(v.checkin_latitude, v.checkin_longitude);
    const b = toXY(v.checkout_latitude, v.checkout_longitude);
    linhaPath = `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="var(--neutral-300)" stroke-width="0.5" stroke-dasharray="1.5 1.5" />`;
  }

  // Pinos
  const pinsSvg = pontos.map(p => {
    const { x, y } = toXY(p.lat, p.lng);
    return `
      <circle cx="${x}" cy="${y}" r="4" fill="${p.cor}" opacity="0.25" />
      <circle cx="${x}" cy="${y}" r="2" fill="${p.cor}" />
    `;
  }).join('');

  // Legenda
  const legenda = pontos.map(p => `
    <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--neutral-600);">
      <span style="width:8px;height:8px;border-radius:50%;background:${p.cor};"></span>${p.label}
    </span>
  `).join('<span style="color:var(--neutral-300);">·</span>');

  return `
    <div style="margin-top:12px;padding:12px;background:var(--neutral-50);border-radius:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">${legenda}</div>
        <a href="${mapUrl}" target="_blank" rel="noopener" style="color:var(--status-info);text-decoration:none;display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;">
          Ver no Google Maps
          <span class="material-symbols-rounded" style="font-size:14px;">open_in_new</span>
        </a>
      </div>
      <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:120px;display:block;background:var(--neutral-0);border-radius:6px;border:1px solid var(--neutral-200);">
        ${linhaPath}
        ${pinsSvg}
      </svg>
      ${distStr ? `<div style="margin-top:6px;font-size:11px;color:var(--neutral-500);text-align:center;">Check-in a aprox. <strong>${distStr}</strong></div>` : ''}
    </div>
  `;
}

function formatarDataCompleta(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

window.handleAprovarVisita = async function() {
  const v = window._currentReviewVisita;
  if (!v) return;

  const ok = await showModalConfirmacao({
    icone: 'verified',
    iconeCor: 'success',
    titulo: 'Aprovar visita',
    subtitulo: 'A visita ficará imutável após a aprovação — não será mais possível editar nem devolver.',
    btnConfirmar: 'Sim, aprovar',
    btnCancelar: 'Cancelar',
  });
  if (!ok) return;

  const user = getCurrentUser();
  try {
    const { data, error, status } = await db.from('visitas').update({
      status: 'aprovada_pos_revisao',
      revisao_resolvida_por: user.id,
      revisao_resolvida_em: new Date().toISOString(),
      atualizado_em: new Date().toISOString(),
    }).eq('id', v.id).select();
    if (error) throw new Error(error.message || 'Falha ao atualizar visita');
    if (!data || data.length === 0) {
      throw new Error('Update não afetou nenhum registro. Verifique as políticas RLS da tabela visitas no Supabase.');
    }
    setFlash('success', 'Visita aprovada!');
    window.location.hash = '#/admin/revisao';
  } catch (err) {
    alert('Erro ao aprovar: ' + err.message);
    console.error('[handleAprovarVisita]', err);
  }
};

function showModalConfirmacao({ icone = 'info', iconeCor = 'info', titulo, subtitulo, btnConfirmar = 'Confirmar', btnCancelar = 'Cancelar' }) {

      success: 'var(--status-success-bg);color:var(--status-success)',
      warning: '#FEF4E1;color:var(--status-warning)',
      danger: 'var(--status-danger-bg);color:var(--status-danger)',
      info: '#E4ECFD;color:var(--status-info)',
    };
    const iconeStyle = iconeBgMap[iconeCor] || iconeBgMap.info;
    const cancelHtml = btnCancelar
      ? `<button class="modal-btn modal-btn--secondary" id="mcCancel">${btnCancelar}</button>`

    backdrop.innerHTML = `
      <div class="modal-card">

          ${cancelHtml}
        </div>
      </div>
    `;

    backdrop.querySelector('#mcOk').onclick = () => { cleanup(); resolve(true); };
    const cancelBtn = backdrop.querySelector('#mcCancel');
    if (cancelBtn) cancelBtn.onclick = () => { cleanup(); resolve(false); };

  });
}

        </div>
      </div>
