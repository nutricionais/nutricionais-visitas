    const valBairro = ehEdicao && instExistente?.bairro ? instExistente.bairro : '';
    const valCidade = ehEdicao && instExistente?.cidade ? instExistente.cidade : '';
    const titulo = ehEdicao ? 'Editar dados da instituição' : 'Cadastrar nova instituição';
    const subtitulo = ehEdicao

      : 'Preencha nome e endereço. O admin completará os demais dados (CNPJ, coordenadas, etc.) ao aprovar.';
    const btnOkLabel = ehEdicao ? 'Salvar alterações' : 'Cadastrar e usar';

      <div class="modal-card" style="max-width:440px;">
        <div class="modal-card__header">
          <div class="modal-card__icon" style="background:#E4ECFD;color:var(--status-info);">

          ${gpsInfoHtml}

            <label>Nome da instituição <span style="color:var(--status-danger)">*</span></label>

          </div>
          <div class="report-field">
            <label>Endereço (rua e número) <span style="color:var(--status-danger)">*</span></label>
            <input type="text" id="mniEndereco" placeholder="Ex: Rua Frei Caneca, 1407" value="${(valEnd || '').replace(/"/g,'&quot;')}" style="width:100%;padding:10px 12px;border:1.5px solid var(--neutral-200);border-radius:10px;font-size:14px;font-family:inherit;" />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="report-field">
              <label>Bairro</label>
              <input type="text" id="mniBairro" placeholder="Ex: Pompeia" value="${(valBairro || '').replace(/"/g,'&quot;')}" style="width:100%;padding:10px 12px;border:1.5px solid var(--neutral-200);border-radius:10px;font-size:14px;font-family:inherit;" />

              <label>Cidade <span style="color:var(--status-danger)">*</span></label>

    setTimeout(() => { (valorInicialNome ? endEl : nomeEl).focus(); }, 150);
    const cleanup = () => backdrop.remove();
    const submit = () => {
      const nome = nomeEl.value.trim();

      if (!nome) { nomeEl.focus(); return; }
      if (!logradouro) { endEl.focus(); return; }

        if (e.key === 'Enter' && el === cidadeEl) { e.preventDefault(); submit(); }

function showModalInput({ icone = 'edit', iconeCor = 'info', titulo, subtitulo, label, placeholder, required = false, btnConfirmar = 'Enviar', valorInicial = '', tipo = 'textarea' }) {
  return new Promise((resolve) => {

      info: '#E4ECFD;color:var(--status-info)',
      warning: '#FEF4E1;color:var(--status-warning)',

      ? `<input type="text" id="miText" placeholder="${(placeholder || '').replace(/"/g,'&quot;')}" value="${(valorInicial || '').replace(/"/g,'&quot;')}" style="width:100%;padding:10px 12px;border:1.5px solid var(--neutral-200);border-radius:10px;font-size:14px;font-family:inherit;" />`

      <div class="modal-card">
        <div class="modal-card__header">
          <div class="modal-card__icon" style="background:${iconeStyle.split(';')[0]};color:${iconeStyle.split(';')[1].replace('color:','')};">

          </div>
          <div class="modal-card__title">${titulo}</div>
          <div class="modal-card__subtitle">${subtitulo}</div>
        </div>
        <div class="modal-card__body">
          <div class="report-field">
            <label>${label}${required ? ' <span style="color:var(--status-danger)">*</span>' : ''}</label>
            ${campoHtml}
          </div>
        </div>
        <div class="modal-card__footer">
          <button class="modal-btn modal-btn--primary" id="miOk">${btnConfirmar}</button>
          <button class="modal-btn modal-btn--secondary" id="miCancel">Cancelar</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);
    const inp = backdrop.querySelector('#miText');

      }
      cleanup();

    backdrop.querySelector('#miOk').onclick = submit;
    backdrop.querySelector('#miCancel').onclick = () => { cleanup(); resolve(null); };

    if (tipo === 'input') {
      inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); submit(); } });

}

// === Handlers: aprovar/editar/rejeitar instituição pendente ===
// Helper: executa update no Supabase e lança erro explícito se não atualizar
async function updateOrThrow(tabela, patch, id) {
  const { data, error } = await db.from(tabela).update(patch).eq('id', id).select();
  if (error) throw new Error(error.message || `Falha ao atualizar ${tabela}`);
  if (!data || data.length === 0) {
    throw new Error(`Update em ${tabela} não afetou nenhum registro. Verifique as políticas RLS no Supabase.`);
  }
  return data[0];
}

window.aprovarInstituicaoPendente = async function(id) {
  const ok = await showModalConfirmacao({
    icone: 'check_circle',
    iconeCor: 'success',
    titulo: 'Aprovar instituição?',
    subtitulo: 'A instituição ficará oficial. Lembre-se de completar os dados (endereço, CNPJ, coordenadas) na tela de Instituições.',
    btnConfirmar: 'Sim, aprovar',
    btnCancelar: 'Cancelar',
  });
  if (!ok) return;
  try {
    await updateOrThrow('instituicoes', { pendente_aprovacao: false }, id);
    setFlash('success', 'Instituição aprovada. Complete os dados agora.');
    await carregarAdminPendentes();
  } catch (err) { alert('Erro: ' + err.message); console.error(err); }
};

// Edição completa da instituição pendente: abre modal grande com todos os campos.
// Admin pode preencher tudo e aprovar de uma vez só.
window.abrirEdicaoInstituicaoPendente = async function(id) {
  // Carrega dados atuais
  const { data: inst, error } = await db.from('instituicoes').select('*').eq('id', id).single();
  if (error) { alert('Erro ao carregar: ' + error.message); return; }
  const resultado = await showModalEdicaoInstituicao(inst);
  if (!resultado) return; // cancelou
  const { dados, aprovar } = resultado;
  try {
    const payload = { ...dados };
    if (aprovar) payload.pendente_aprovacao = false;
    await updateOrThrow('instituicoes', payload, id);
    setFlash('success', aprovar ? 'Instituição aprovada e atualizada.' : 'Dados salvos (ainda pendente).');
    await carregarAdminPendentes();
  } catch (err) { alert('Erro: ' + err.message); console.error(err); }
};

            <label>Endereço (rua e número) <span style="color:var(--status-danger)">*</span></label>
            <input type="text" id="meiLogr" placeholder="Ex: Rua Frei Caneca, 1407" value="${v('logradouro')}" />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="report-field">
              <label>Bairro</label>
              <input type="text" id="meiBairro" value="${v('bairro')}" />
            </div>
            <div class="report-field">
              <label>CEP</label>
              <input type="text" id="meiCep" placeholder="00000-000" value="${v('cep')}" />
            </div>
          </div>
          <div style="display:grid;grid-template-columns:2fr 1fr;gap:12px;">
            <div class="report-field">
              <label>Cidade <span style="color:var(--status-danger)">*</span></label>
              <input type="text" id="meiCidade" value="${v('cidade')}" />
            </div>
            <div class="report-field">
              <label>UF</label>
              <input type="text" id="meiUf" maxlength="2" placeholder="SP" value="${v('estado')}" style="text-transform:uppercase;" />
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="report-field">
              <label>Latitude</label>
              <input type="number" step="any" id="meiLat" placeholder="-23.550520" value="${v('latitude')}" />
            </div>
            <div class="report-field">
              <label>Longitude</label>
              <input type="number" step="any" id="meiLng" placeholder="-46.633308" value="${v('longitude')}" />
            </div>
          </div>
          <button type="button" id="meiGeocode" style="
            width:100%;padding:10px 12px;border-radius:10px;border:1.5px dashed var(--status-info);
            background:#E4ECFD;color:#1E40AF;font-weight:700;font-size:13px;font-family:inherit;
            cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
          ">
            <span class="material-symbols-rounded" style="font-size:18px;">travel_explore</span>
            <span id="meiGeocodeLabel">Buscar coordenadas pelo endereço</span>
          </button>
          <div style="background:#E4ECFD;border-radius:8px;padding:10px;font-size:11.5px;color:#1E40AF;">
            <strong>💡 Dica:</strong> Clique no botão acima pra buscar automaticamente as coordenadas pelo endereço (OpenStreetMap). Ou, para maior precisão, abra o endereço no Google Maps, clique com o botão direito no local exato e copie as coordenadas manualmente.
          </div>
        </div>
        <div class="modal-card__footer" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <button class="modal-btn modal-btn--secondary" id="meiSalvar">Só salvar (ainda pendente)</button>
          <button class="modal-btn modal-btn--primary" id="meiAprovar" style="background:var(--status-success);">Salvar e aprovar</button>
        </div>
        <div style="padding:0 20px 14px;">
          <button class="modal-btn modal-btn--secondary" id="meiCancel" style="width:100%;background:transparent;border:none;color:var(--neutral-500);">Cancelar</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);
    const get = (id) => backdrop.querySelector(id);
    const cleanup = () => backdrop.remove();
    const coletarDados = () => {
      const nome = get('#meiNome').value.trim();
      const logradouro = get('#meiLogr').value.trim();
      const cidade = get('#meiCidade').value.trim();
      if (!nome) { alert('Nome é obrigatório'); get('#meiNome').focus(); return null; }
      if (!logradouro) { alert('Endereço é obrigatório'); get('#meiLogr').focus(); return null; }
      if (!cidade) { alert('Cidade é obrigatória'); get('#meiCidade').focus(); return null; }
      const lat = parseFloat(get('#meiLat').value);
      const lng = parseFloat(get('#meiLng').value);
      return {
        nome,
        razao_social: get('#meiRazao').value.trim() || null,
        cnpj: get('#meiCnpj').value.trim() || null,
        logradouro,
        bairro: get('#meiBairro').value.trim() || null,
        cep: get('#meiCep').value.trim() || null,
        cidade,
        estado: get('#meiUf').value.trim().toUpperCase() || null,
        latitude: isNaN(lat) ? null : lat,
        longitude: isNaN(lng) ? null : lng,
      };
    };
    get('#meiSalvar').onclick = () => { const d = coletarDados(); if (!d) return; cleanup(); resolve({ dados: d, aprovar: false }); };
    get('#meiAprovar').onclick = () => {
      const d = coletarDados();
      if (!d) return;
      // Exigir coordenadas pra aprovar (sem elas GPS não valida)
      if (d.latitude === null || d.longitude === null) {
        alert('Coordenadas são obrigatórias para aprovar (permitem validar o GPS dos check-ins). Use "Só salvar" se quiser completar depois.');
        return;
      }
      cleanup();
      resolve({ dados: d, aprovar: true });
    };
    // Geocoding via OpenStreetMap (Nominatim) — busca lat/lng pelo endereço
    get('#meiGeocode').onclick = async () => {
      const btn = get('#meiGeocode');
      const lbl = get('#meiGeocodeLabel');
      const logradouro = get('#meiLogr').value.trim();
      const bairro = get('#meiBairro').value.trim();
      const cidade = get('#meiCidade').value.trim();
      const uf = get('#meiUf').value.trim();
      if (!logradouro || !cidade) {
        alert('Preencha pelo menos Endereço e Cidade antes de buscar.');
        return;
      }
      btn.disabled = true;
      lbl.textContent = 'Buscando...';
      try {
        const partes = [logradouro, bairro, cidade, uf, 'Brasil'].filter(Boolean);
        const query = encodeURIComponent(partes.join(', '));
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${query}`;
        const resp = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
        if (!resp.ok) throw new Error('Serviço indisponível');
        const results = await resp.json();
        if (!results || results.length === 0) {
          alert('Endereço não encontrado. Tente ajustar os dados ou preencher manualmente.');
          return;
        }
        const r = results[0];
        get('#meiLat').value = parseFloat(r.lat).toFixed(6);
        get('#meiLng').value = parseFloat(r.lon).toFixed(6);
        lbl.textContent = '✓ Encontrado!';
        setTimeout(() => { lbl.textContent = 'Buscar novamente'; }, 2000);
      } catch (err) {
        alert('Erro ao buscar: ' + err.message + '\n\nPreencha manualmente usando Google Maps.');
        lbl.textContent = 'Buscar coordenadas pelo endereço';
      } finally {
        btn.disabled = false;
      }
    };
    get('#meiCancel').onclick = () => { cleanup(); resolve(null); };
    backdrop.onclick = (e) => { if (e.target === backdrop) { cleanup(); resolve(null); } };
    setTimeout(() => get('#meiRazao').focus(), 150);
  });
}

function renderAdminObjetivos() {
  const user = requireAdmin();
  if (!user) return '<div class="splash"><div class="splash__spinner"></div></div>';

  const filtroInicial = window._routeParams?.filtro || 'ativos';
  window._objFilter = filtroInicial;

  setTimeout(async () => {
    await carregarAdminObjetivos();
  }, 0);

  return `
    <div class="mobile-app">
      ${mobileTopBar({ title: 'Objetivos', showBack: true })}
      <main class="mcontent">
        <div class="review-tabs" id="objTabs" style="overflow-x:auto;scrollbar-width:none;">
          <button class="review-tab ${filtroInicial === 'ativos' ? 'is-active' : ''}" onclick="trocarObjFiltro('ativos')">
            Ativos <span class="review-tab__count" id="objCntAtivos">—</span>
          </button>
          <button class="review-tab ${filtroInicial === 'pendentes' ? 'is-active' : ''}" onclick="trocarObjFiltro('pendentes')">
            Pendentes <span class="review-tab__count" id="objCntPendentes">—</span>
          </button>
          <button class="review-tab ${filtroInicial === 'arquivados' ? 'is-active' : ''}" onclick="trocarObjFiltro('arquivados')">
            Arquivados <span class="review-tab__count" id="objCntArquivados">—</span>
          </button>
        </div>

        <button id="objBtnAdd" onclick="handleCriarObjetivoAdmin()" class="av-btn-export" style="margin:12px 0;width:100%;padding:12px;font-size:13px;">
          <span class="material-symbols-rounded">add</span>
          Novo objetivo
        </button>

        <div id="objList" style="display:flex;flex-direction:column;gap:10px;">
          <div style="padding:30px;text-align:center;color:var(--neutral-500);font-size:13px;">Carregando...</div>
        </div>
      </main>
    </div>
  `;
}

window.trocarObjFiltro = function(filtro) {
  window._objFilter = filtro;
  document.querySelectorAll('#objTabs .review-tab').forEach(t => t.classList.remove('is-active'));
  if (event && event.currentTarget) event.currentTarget.classList.add('is-active');
  carregarAdminObjetivos();
};

async function carregarAdminObjetivos() {
  const listEl = document.getElementById('objList');
  if (!listEl) return;

  // Atualiza contadores
  const cnts = await contarObjetivosPorStatus();
  const setCnt = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  setCnt('objCntAtivos', cnts.ativos);
  setCnt('objCntPendentes', cnts.pendentes);
  setCnt('objCntArquivados', cnts.arquivados);

  // O botão "Novo objetivo" só faz sentido na aba Ativos (pra criar direto)
  const btnAdd = document.getElementById('objBtnAdd');
  if (btnAdd) btnAdd.style.display = (window._objFilter === 'ativos') ? 'inline-flex' : 'none';

  // Carrega lista da aba atual
  const filtro = window._objFilter || 'ativos';
  const lista = await listarObjetivosPorFiltro(filtro);

  if (lista.length === 0) {
    listEl.innerHTML = emptyStateObjetivos(filtro);
    return;
  }

  listEl.innerHTML = lista.map((o, idx) => cardObjetivoAdmin(o, filtro, idx, lista.length)).join('');
}

function emptyStateObjetivos(filtro) {
  const map = {
    ativos:     { icon: 'flag',         titulo: 'Nenhum objetivo ativo',       desc: 'Clique em "Novo objetivo" pra começar.' },
    pendentes:  { icon: 'hourglass_top',titulo: 'Nenhum objetivo pendente',    desc: 'Quando um profissional sugerir um objetivo novo, ele aparecerá aqui pra sua revisão.' },
    arquivados: { icon: 'archive',      titulo: 'Nenhum objetivo arquivado',   desc: 'Objetivos que você arquivar (ou rejeitar) aparecerão aqui. Visitas antigas continuam com o objetivo registrado.' },
  };
  const m = map[filtro] || map.ativos;
  return `
    <div class="empty-state" style="margin:20px 0;">
      <div class="empty-state__icon"><span class="material-symbols-rounded">${m.icon}</span></div>
      <div class="empty-state__title">${m.titulo}</div>
      <div class="empty-state__desc">${m.desc}</div>
    </div>
  `;
}

function cardObjetivoAdmin(obj, filtro, idx, total) {
  const nomeSafe = obj.nome.replace(/"/g,'&quot;');
  const nomeEscaped = obj.nome.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  const autor = obj.sugerido_por_user?.nome;
  const metaParts = [];
  if (filtro === 'ativos' && obj.ordem != null) metaParts.push(`#${obj.ordem}`);
  if (autor) metaParts.push(`sugerido por ${autor.replace(/"/g,'&quot;')}`);
  if (obj.criado_em) metaParts.push(formatarTempoRelativo(obj.criado_em));
  const meta = metaParts.join(' · ');

  // Botões variam por aba
  let botoesHtml = '';
  if (filtro === 'ativos') {
    const podeSubir = idx > 0;
    const podeDescer = idx < total - 1;
    botoesHtml = `
      <div style="display:flex;gap:4px;flex-shrink:0;">
        <button onclick="reordenarObjetivoUI('${obj.id}','cima')" ${!podeSubir ? 'disabled' : ''}
                title="Mover pra cima"
                style="padding:6px;border-radius:6px;border:1.5px solid var(--neutral-300);background:var(--neutral-0);color:var(--brand-navy);cursor:pointer;${!podeSubir ? 'opacity:.3;cursor:not-allowed;' : ''}">
          <span class="material-symbols-rounded" style="font-size:18px;">arrow_upward</span>
        </button>
        <button onclick="reordenarObjetivoUI('${obj.id}','baixo')" ${!podeDescer ? 'disabled' : ''}
                title="Mover pra baixo"
                style="padding:6px;border-radius:6px;border:1.5px solid var(--neutral-300);background:var(--neutral-0);color:var(--brand-navy);cursor:pointer;${!podeDescer ? 'opacity:.3;cursor:not-allowed;' : ''}">
          <span class="material-symbols-rounded" style="font-size:18px;">arrow_downward</span>
        </button>
        <button onclick="editarObjetivoUI('${obj.id}','${nomeEscaped}')"
                title="Editar nome"
                style="padding:6px;border-radius:6px;border:1.5px solid var(--neutral-300);background:var(--neutral-0);color:var(--brand-navy);cursor:pointer;">
          <span class="material-symbols-rounded" style="font-size:18px;">edit</span>
        </button>
        <button onclick="arquivarObjetivoUI('${obj.id}','${nomeEscaped}')"
                title="Arquivar"
                style="padding:6px;border-radius:6px;border:1.5px solid var(--status-warning);background:var(--neutral-0);color:var(--status-warning);cursor:pointer;">
          <span class="material-symbols-rounded" style="font-size:18px;">archive</span>
        </button>
      </div>
    `;
  } else if (filtro === 'pendentes') {
    botoesHtml = `
      <div style="display:flex;gap:4px;flex-shrink:0;">
        <button onclick="aprovarObjetivoPendente('${obj.id}')"
                title="Aprovar"
                style="padding:6px 10px;border-radius:6px;border:none;background:var(--status-success);color:#fff;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:12px;">
          <span class="material-symbols-rounded" style="font-size:14px;">check</span>Aprovar
        </button>
        <button onclick="editarObjetivoPendente('${obj.id}','${nomeEscaped}')"
                title="Editar e aprovar"
                style="padding:6px;border-radius:6px;border:1.5px solid var(--neutral-300);background:var(--neutral-0);color:var(--brand-navy);cursor:pointer;">
          <span class="material-symbols-rounded" style="font-size:18px;">edit</span>
        </button>
        <button onclick="rejeitarObjetivoPendente('${obj.id}')"
                title="Rejeitar"
                style="padding:6px;border-radius:6px;border:1.5px solid var(--status-danger);background:var(--neutral-0);color:var(--status-danger);cursor:pointer;">
          <span class="material-symbols-rounded" style="font-size:18px;">close</span>
        </button>
      </div>
    `;
  } else if (filtro === 'arquivados') {
    botoesHtml = `
      <div style="display:flex;gap:4px;flex-shrink:0;">
        <button onclick="desarquivarObjetivoUI('${obj.id}','${nomeEscaped}')"
                title="Restaurar"
                style="padding:6px 10px;border-radius:6px;border:1.5px solid var(--status-success);background:var(--neutral-0);color:var(--status-success);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:12px;">
          <span class="material-symbols-rounded" style="font-size:14px;">unarchive</span>Restaurar
        </button>
        <button onclick="excluirObjetivoUI('${obj.id}','${nomeEscaped}')"
                title="Excluir definitivamente"
                style="padding:6px;border-radius:6px;border:1.5px solid var(--status-danger);background:var(--neutral-0);color:var(--status-danger);cursor:pointer;">
          <span class="material-symbols-rounded" style="font-size:18px;">delete_forever</span>
        </button>
      </div>
    `;
  }

  // Badge opcional
  const badge = filtro === 'pendentes'
    ? `<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#FEF4E1;color:#92400E;">AGUARDANDO</span>`
    : filtro === 'arquivados'
    ? `<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--neutral-200);color:var(--neutral-600);">ARQUIVADO</span>`
    : '';

  const borderColor = filtro === 'ativos' ? 'var(--brand-lime)' :
                      filtro === 'pendentes' ? 'var(--status-warning)' :
                      'var(--neutral-400)';

  return `
    <div style="background:var(--neutral-0);border:1px solid var(--neutral-200);border-left:4px solid ${borderColor};border-radius:12px;padding:12px 14px;box-shadow:0 2px 6px rgba(10,31,92,0.04);display:flex;align-items:center;gap:10px;">
      <div style="width:36px;height:36px;border-radius:10px;background:#F4F9EA;color:var(--brand-lime);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span class="material-symbols-rounded" style="font-size:20px;">flag</span>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-family:var(--font-display);font-weight:700;color:var(--brand-navy);font-size:14px;line-height:1.3;">${nomeSafe}</span>
          ${badge}
        </div>
        ${meta ? `<div style="font-size:11.5px;color:var(--neutral-500);margin-top:3px;">${meta}</div>` : ''}
      </div>
      ${botoesHtml}
    </div>
  `;
}

    icone: 'archive',
    iconeCor: 'warning',
    titulo: `Arquivar "${nome}"?`,
    subtitulo: 'O objetivo não aparecerá mais em novas visitas, mas visitas antigas continuam com ele registrado. Você pode restaurar a qualquer momento.',
    btnConfirmar: 'Sim, arquivar',
    btnCancelar: 'Cancelar',
  });
  if (!ok) return;
  try {
    await updateOrThrow('objetivos_visita', { ativo: false, pendente_aprovacao: false }, id);
    setFlash('info', 'Objetivo arquivado.');
    await carregarAdminObjetivos();
  } catch (err) { alert('Erro: ' + err.message); }
};

window.desarquivarObjetivoUI = async function(id, nome) {
  try {
    await updateOrThrow('objetivos_visita', { ativo: true, pendente_aprovacao: false }, id);
    setFlash('success', `"${nome}" restaurado.`);
    await carregarAdminObjetivos();
  } catch (err) { alert('Erro: ' + err.message); }
};

window.excluirObjetivoUI = async function(id, nome) {
  // Primeiro: checa se o objetivo tá em uso em alguma visita
  const uso = await contarUsoObjetivo(id);
  if (uso > 0) {
    await showModalConfirmacao({
      icone: 'block',
      iconeCor: 'warning',
      titulo: 'Não pode excluir',
      subtitulo: `Este objetivo foi usado em ${uso} ${uso === 1 ? 'visita' : 'visitas'}. Excluir definitivamente apagaria essa relação e quebraria o histórico. Deixe arquivado — ele não aparece pra novos profissionais mesmo assim.`,
      btnConfirmar: 'Entendi',
      btnCancelar: null,
    });
    return;
  }
  // Se zero uso, confirma forte
  const ok = await showModalConfirmacao({
    icone: 'delete_forever',
    iconeCor: 'danger',
    titulo: `Excluir "${nome}" definitivamente?`,
    subtitulo: 'Esta ação apaga o objetivo permanentemente do banco. Não é possível desfazer. Confirma?',
    btnConfirmar: 'Sim, excluir pra sempre',
    btnCancelar: 'Cancelar',
  });
  if (!ok) return;
  try {
    await excluirObjetivoDefinitivo(id);
    setFlash('info', `"${nome}" excluído.`);
    await carregarAdminObjetivos();
  } catch (err) {
    alert('Erro: ' + err.message);
  }
};

window.reordenarObjetivoUI = async function(id, direcao) {
  try {
    const ok = await reordenarObjetivo(id, direcao);
    if (ok) await carregarAdminObjetivos();
  } catch (err) { alert('Erro ao reordenar: ' + err.message); }
};

          <div style="font-size:12.5px;color:var(--neutral-600);margin-top:2px;">Veja todas as visitas agendadas e atribua novas pros profissionais.</div>

          <div style="padding:30px;text-align:center;color:var(--neutral-500);font-size:13px;">Carregando...</div>
        </div>

        <button onclick="handleNovoAgendamentoAdmin()"
                style="position:fixed;bottom:92px;right:20px;width:56px;height:56px;border-radius:50%;border:none;background:var(--brand-lime);color:#fff;box-shadow:0 6px 18px rgba(139,198,63,0.45);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;transition:transform .15s;"

window.trocarAdminAgendaView = function(view) {
  window._adminAgendaView = view;
  if (view === 'calendario' && typeof window._adminAgendaWeekOffset !== 'number') {
    window._adminAgendaWeekOffset = 0;
  }
  // Dispara o router pra re-renderizar (mais leve que recarregar)
  window.dispatchEvent(new HashChangeEvent('hashchange'));
};

async function carregarAdminAgenda() {
  const listaEl = document.getElementById('adminAgendaLista');
  if (!listaEl) return;

  const ags = await listarTodosAgendamentos();

  if (ags.length === 0) {
    listaEl.innerHTML = `
      <div class="empty-state" style="margin:20px 0;">
        <div class="empty-state__icon"><span class="material-symbols-rounded">calendar_add_on</span></div>
        <div class="empty-state__title">Nenhuma visita agendada ainda</div>
        <div class="empty-state__desc">Toque no botão <strong>+</strong> pra atribuir a primeira visita.</div>
      </div>
    `;
    return;
  }

  const view = window._adminAgendaView || 'lista';
  if (view === 'profissional') listaEl.innerHTML = renderAgendaPorProfissional(ags);
  else if (view === 'calendario') listaEl.innerHTML = renderAgendaCalendario(ags);
  else listaEl.innerHTML = renderAgendaLista(ags);
}

// View 1 — Lista global por bucket de data (comportamento original do Mini 2a)
function renderAgendaLista(ags) {
  const grupos = { atrasado: [], hoje: [], amanha: [], semana: [], futuro: [] };
  ags.forEach(a => {
    const b = bucketDoAgendamento(a.data_visita);
    grupos[b].push(a);
  });

  const ordem = ['atrasado', 'hoje', 'amanha', 'semana', 'futuro'];
  const titulos = {
    atrasado: 'Atrasados',
    hoje:     'Hoje',
    amanha:   'Amanhã',
    semana:   'Esta semana',
    futuro:   'Mais adiante',
  };
  const cores = {
    atrasado: 'var(--status-danger)',
    hoje:     'var(--brand-lime)',
    amanha:   'var(--status-info)',
    semana:   'var(--brand-navy)',
    futuro:   'var(--neutral-500)',
  };

  let html = '';
  ordem.forEach(b => {
    if (grupos[b].length === 0) return;
    html += `
      <div style="margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${cores[b]};"></div>
          <div style="font-family:var(--font-display);font-weight:700;color:var(--brand-navy);font-size:13px;text-transform:uppercase;letter-spacing:.5px;">${titulos[b]}</div>
          <div style="background:var(--neutral-100);color:var(--neutral-600);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">${grupos[b].length}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${grupos[b].map(a => cardAdminAgendamento(a, b)).join('')}
        </div>
      </div>
    `;
  });
  return html;
}

// View 2 — Lista agrupada por profissional (ordena por nome, mostra avatar e contador)
function renderAgendaPorProfissional(ags) {
  const porProf = {};
  ags.forEach(a => {
    const pid = a.nutricionista_id;
    if (!porProf[pid]) {
      porProf[pid] = {
        nome: a.usuarios?.nome || 'Profissional',
        ags: [],
      };
    }
    porProf[pid].ags.push(a);
  });

  // Ordena profissionais por nome
  const entradas = Object.entries(porProf).sort((a, b) => (a[1].nome || '').localeCompare(b[1].nome || ''));

  return entradas.map(([pid, info]) => {
    const iniciais = (info.nome || '?')
      .split(/\s+/).filter(Boolean).slice(0, 2)
      .map(p => p.charAt(0).toUpperCase()).join('') || '?';
    // Ordena agendamentos do profissional por data+hora
    info.ags.sort((a, b) => {
      if (a.data_visita !== b.data_visita) return a.data_visita < b.data_visita ? -1 : 1;
      return (a.horario_inicio || '99:99') < (b.horario_inicio || '99:99') ? -1 : 1;
    });
    return `
      <div class="ag-prof-group">
        <div class="ag-prof-group__header">
          <div class="ag-prof-group__avatar">${iniciais}</div>
          <div class="ag-prof-group__nome">${(info.nome || '').replace(/"/g,'&quot;')}</div>
          <div class="ag-prof-group__count">
            <span class="material-symbols-rounded" style="font-size:13px;">event</span>
            ${info.ags.length}
          </div>
        </div>
        <div class="ag-prof-group__body">
          ${info.ags.map(a => cardAdminAgendamento(a, bucketDoAgendamento(a.data_visita))).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// View 3 — Calendário semanal com navegação entre semanas
function renderAgendaCalendario(ags) {
  const offset = window._adminAgendaWeekOffset || 0;

  // Calcula o início da semana (segunda) pro offset atual
  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0);
  // Ajusta pra segunda (dow: 0=dom, 1=seg, ..., 6=sab)
  const diaSemana = hoje.getDay();
  const diffParaSegunda = diaSemana === 0 ? -6 : (1 - diaSemana);
  const segundaAtual = new Date(hoje);
  segundaAtual.setDate(segundaAtual.getDate() + diffParaSegunda);
  // Aplica offset da navegação (em semanas)
  const inicioSemana = new Date(segundaAtual);
  inicioSemana.setDate(inicioSemana.getDate() + offset * 7);
  const fimSemana = new Date(inicioSemana);
  fimSemana.setDate(fimSemana.getDate() + 6);

  // Agrupa agendamentos por data (YYYY-MM-DD)
  const porData = {};
  ags.forEach(a => {
    if (!porData[a.data_visita]) porData[a.data_visita] = [];
    porData[a.data_visita].push(a);
  });

  // Monta os 7 dias da semana
  const diasSemanaLabels = ['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  const hojeStr = (() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  let diasHtml = '';
  for (let i = 0; i < 7; i++) {
    const dt = new Date(inicioSemana);
    dt.setDate(dt.getDate() + i);
    const dtStr = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isHoje = dtStr === hojeStr;
    const isPassado = dtStr < hojeStr;
    const dia = dt.getDate();
    const agsDoDia = (porData[dtStr] || []).sort((a, b) =>
      (a.horario_inicio || '99:99') < (b.horario_inicio || '99:99') ? -1 : 1
    );
    const cls = ['ag-cal-day'];
    if (isHoje) cls.push('ag-cal-day--today');
    if (isPassado && !isHoje) cls.push('ag-cal-day--passado');

    diasHtml += `
      <div class="${cls.join(' ')}">
        <div class="ag-cal-day__header" onclick="handleAdminAgDiaDetalhes('${dtStr}')" title="Ver detalhes do dia">
          <span class="ag-cal-day__dia-sem">${diasSemanaLabels[i]}</span>
          <span class="ag-cal-day__dia-num">${dia}</span>
        </div>
        ${agsDoDia.length === 0
          ? `<div class="ag-cal-empty" onclick="handleAdminAgDiaDetalhes('${dtStr}')" style="cursor:pointer;">—</div>`
          : agsDoDia.map(a => {
              const hora = a.horario_inicio ? String(a.horario_inicio).substring(0, 5) : '';
              const prof = (a.usuarios?.nome || 'Profissional').split(' ')[0];
              const clsEntry = a.status === 'sugerida' ? 'ag-cal-entry ag-cal-entry--sugerida' : 'ag-cal-entry';
              return `<div class="${clsEntry}" onclick="event.stopPropagation();handleAdminAgDetalhes('${a.id}')">
                <div class="ag-cal-entry__hora">${hora || '—'}</div>
                <div class="ag-cal-entry__prof">${prof.replace(/"/g,'&quot;')}</div>
              </div>`;
            }).join('')}
      </div>
    `;
  }

  // Label da navegação
  const labelInicio = `${String(inicioSemana.getDate()).padStart(2,'0')} ${meses[inicioSemana.getMonth()]}`;
  const labelFim = `${String(fimSemana.getDate()).padStart(2,'0')} ${meses[fimSemana.getMonth()]} ${fimSemana.getFullYear()}`;

  return `
    <div class="ag-cal-nav">
      <button class="ag-cal-nav__btn" onclick="adminAgendaMoverSemana(-1)" title="Semana anterior">
        <span class="material-symbols-rounded" style="font-size:20px;">chevron_left</span>
      </button>
      <div class="ag-cal-nav__label">${labelInicio} – ${labelFim}</div>
      ${offset !== 0
        ? `<button class="ag-cal-nav__btn ag-cal-nav__btn--today" onclick="adminAgendaMoverSemana(0)">Hoje</button>`
        : ''}
      <button class="ag-cal-nav__btn" onclick="adminAgendaMoverSemana(1)" title="Próxima semana">
        <span class="material-symbols-rounded" style="font-size:20px;">chevron_right</span>
      </button>
    </div>
    <div class="ag-cal-grid">
      ${diasHtml}
    </div>
  `;
}

window.adminAgendaMoverSemana = function(delta) {
  if (delta === 0) window._adminAgendaWeekOffset = 0;
  else window._adminAgendaWeekOffset = (window._adminAgendaWeekOffset || 0) + delta;
  carregarAdminAgenda();
};

// Card parecido com o do profissional, mas com badge do nome do profissional e origem
function cardAdminAgendamento(ag, bucket) {
  const instNome = ag.instituicoes?.nome || 'Instituição';
  const instCidade = ag.instituicoes?.cidade || '';
  const profNome = ag.usuarios?.nome || 'Profissional';
  const horaBonita = ag.horario_inicio ? String(ag.horario_inicio).substring(0, 5) : '—';
  const dataBonita = (() => {
    if (!ag.data_visita) return '';
    const [y, m, d] = String(ag.data_visita).split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
  })();
  const objs = (ag.objetivos || []).map(o => o.nome).join(' · ') || 'Sem objetivo definido';
  const obs = ag.resumo
    ? `<div style="font-size:12px;color:var(--neutral-600);margin-top:6px;font-style:italic;">"${ag.resumo.replace(/"/g,'&quot;').substring(0, 120)}${ag.resumo.length > 120 ? '...' : ''}"</div>`
    : '';
  const bordaCor = bucket === 'atrasado' ? 'var(--status-danger)'
                 : bucket === 'hoje'     ? 'var(--brand-lime)'
                 : 'var(--neutral-300)';

  // Badge varia pelo status:
  //   sugerida = aguardando aceite do profissional (âmbar)
  //   agendada + atribuido_por = já aceita / atribuída direto (azul info)
  //   agendada sem atribuido_por = profissional criou pra si mesmo (sem badge)
  let badgeAtribuido = '';
  if (ag.status === 'sugerida') {
    badgeAtribuido = `<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#FEF4E1;color:#92400E;">AGUARDANDO</span>`;
  } else if (ag.atribuido_por) {
    badgeAtribuido = `<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#E4ECFD;color:var(--status-info);">ATRIBUÍDO</span>`;
  }

  return `
    <div onclick="handleAdminAgDetalhes('${ag.id}')" style="background:var(--neutral-0);border:1px solid var(--neutral-200);border-left:4px solid ${bordaCor};border-radius:12px;padding:12px 14px;box-shadow:0 2px 6px rgba(10,31,92,0.04);cursor:pointer;transition:transform .15s, box-shadow .15s;" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 10px rgba(10,31,92,0.08)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 2px 6px rgba(10,31,92,0.04)'">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <div style="font-family:var(--font-mono);font-weight:700;color:var(--brand-navy);font-size:18px;letter-spacing:-.5px;">${horaBonita}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="font-family:var(--font-display);font-weight:700;color:var(--brand-navy);font-size:14px;line-height:1.3;">${instNome.replace(/"/g,'&quot;')}</span>
            ${badgeAtribuido}
          </div>
          ${instCidade ? `<div style="font-size:11.5px;color:var(--neutral-500);margin-top:1px;">${instCidade} · ${dataBonita}</div>` : `<div style="font-size:11.5px;color:var(--neutral-500);margin-top:1px;">${dataBonita}</div>`}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--neutral-600);margin-top:4px;">
        <span class="material-symbols-rounded" style="font-size:14px;color:var(--status-info);">person</span>
        <span style="font-weight:600;color:var(--brand-navy);">${profNome.replace(/"/g,'&quot;')}</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--neutral-600);margin-top:3px;">
        <span class="material-symbols-rounded" style="font-size:14px;color:var(--brand-lime);">flag</span>
        <span>${objs.replace(/"/g,'&quot;')}</span>
      </div>
      ${obs}
    </div>
  `;
}

// Handler — admin cria agendamento atribuindo pra um profissional.
// `dataPreSelecionada` é opcional, vem do calendário quando o admin clica num dia.
window.handleNovoAgendamentoAdmin = async function(dataPreSelecionada = null) {
  const [profs, insts, objs] = await Promise.all([
    listarProfissionaisAtivos(),
    listarInstituicoes(),
    listarObjetivos(),
  ]);
  const instsAtivas = (insts || []).filter(i => i.ativo !== false);
  const objsAtivos = (objs || []).filter(o => o.ativo !== false && !o.pendente_aprovacao);

  if (profs.length === 0) {
    alert('Não há profissionais ativos pra atribuir visitas.');
    return;
  }
  if (instsAtivas.length === 0) {
    alert('Não há instituições cadastradas ainda.');
    return;
  }

  const hojeStr = (() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  // Se veio data pré-selecionada e é futura (ou hoje), usa ela como valor inicial
  const dataInicial = (dataPreSelecionada && dataPreSelecionada >= hojeStr)
    ? dataPreSelecionada
    : hojeStr;

  const dados = await showModalAgendamentoAdmin({
    profissionais: profs,
    instituicoes: instsAtivas,
    objetivos: objsAtivos,
    hojeStr,
    dataInicial,
  });
  if (!dados) return;

  try {
    await criarAgendamento(dados);
    setFlash('success', 'Visita atribuída! Profissional foi notificado.');
    await carregarAdminAgenda();
  } catch (err) {
    alert('Erro ao atribuir visita: ' + err.message);
  }
};

// Abre modal de detalhes ao clicar num card da agenda admin
window.handleAdminAgDetalhes = async function(id) {
  const ags = await listarTodosAgendamentos();
  const ag = (ags || []).find(a => String(a.id) === String(id));
  if (!ag) {
    alert('Agendamento não encontrado.');
    await carregarAdminAgenda();
    return;
  }
  showModalAdminAgDetalhes(ag);
};

// Abre modal que mostra todos os agendamentos de um dia específico (clique no header do calendário)
window.handleAdminAgDiaDetalhes = async function(dataStr) {
  const ags = await listarTodosAgendamentos();
  const doDia = (ags || [])
    .filter(a => a.data_visita === dataStr)
    .sort((a, b) => (a.horario_inicio || '99:99') < (b.horario_inicio || '99:99') ? -1 : 1);
  showModalAdminAgDia(dataStr, doDia);
};

function showModalAdminAgDia(dataStr, ags) {
  const [y, m, d] = String(dataStr).split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const diasSemana = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const dataBonita = `${diasSemana[dt.getDay()].charAt(0).toUpperCase() + diasSemana[dt.getDay()].slice(1)}, ${dt.getDate()} de ${meses[dt.getMonth()]}`;

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';

  const corpoHtml = ags.length === 0
    ? `
      <div style="padding:24px 16px;text-align:center;">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--neutral-100);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
          <span class="material-symbols-rounded" style="font-size:28px;color:var(--neutral-500);">event_busy</span>
        </div>

// Admin edita agendamento (reusa o modal do profissional em modo edit)
window.handleEditarAgendamentoAdmin = async function(id) {
  const [ags, insts, objs] = await Promise.all([
    listarTodosAgendamentos(),
    listarInstituicoes(),
    listarObjetivos(),
  ]);
  const ag = (ags || []).find(a => String(a.id) === String(id));
  if (!ag) {
    alert('Agendamento não encontrado.');
    await carregarAdminAgenda();
    return;
  }
  const instsAtivas = (insts || []).filter(i => i.ativo !== false);
  const objsAtivos = (objs || []).filter(o => o.ativo !== false && !o.pendente_aprovacao);
  const hojeStr = (() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  const dados = await showModalAgendamento({
    instituicoes: instsAtivas,
    objetivos: objsAtivos,
    hojeStr,
    agendamento: ag,
  });
  if (!dados) return;
  try {
    await atualizarAgendamento(id, dados);
    setFlash('success', 'Agendamento atualizado.');
    await carregarAdminAgenda();
  } catch (err) {
    alert('Erro ao atualizar: ' + err.message);
  }
};

// Admin reatribui agendamento pra outro profissional
window.handleReatribuirAgendamento = async function(id) {
  const profs = await listarProfissionaisAtivos();
  if ((profs || []).length === 0) {
    alert('Não há profissionais ativos.');
    return;
  }
  const novoId = await showModalEscolherProfissional({ profissionais: profs });
  if (!novoId) return;
  try {
    await reatribuirAgendamento(id, novoId);
    setFlash('success', 'Reatribuído! Novo profissional foi notificado.');
    await carregarAdminAgenda();
  } catch (err) {
    alert('Erro ao reatribuir: ' + err.message);
  }
};

function renderAdminEquipe() {
  const user = requireAdmin();
  if (!user) return '<div class="splash"><div class="splash__spinner"></div></div>';

  const filtroInicial = window._routeParams?.filtro || 'pendentes';
  window._equipeFilter = filtroInicial;

  // Se veio da busca global (?id=X), descobre o status do user pra abrir na aba certa
  const idBusca = getIdDaURL('id');
  if (idBusca) {
    setTimeout(async () => {
      try {
        const { data } = await db.from('usuarios').select('status').eq('id', idBusca).single();
        if (data?.status) {
          const abaPorStatus = {
            pendente: 'pendentes',
            ativo: 'ativos',
            inativo: 'desativados',
            bloqueado: 'desativados',
          };
          const abaCorreta = abaPorStatus[data.status];
          if (abaCorreta && abaCorreta !== window._equipeFilter) {
            window._equipeFilter = abaCorreta;
            // Re-marca a aba ativa visualmente
            document.querySelectorAll('#equipeTabs .review-tab').forEach(btn => btn.classList.remove('is-active'));
            const btnCerto = document.querySelector(`#equipeTabs .review-tab[onclick*="${abaCorreta}"]`);
            if (btnCerto) btnCerto.classList.add('is-active');
          }
        }
      } catch {}
      await carregarEquipe();
      destacarItemDaURL('.eq-card[data-id="%ID%"]');
    }, 0);
  } else {
    setTimeout(async () => {
      await carregarEquipe();
    }, 0);
  }

  return `
    <div class="mobile-app">
      ${mobileTopBar({ title: 'Equipe', showBack: true })}
      <main class="mcontent">
        <div class="review-tabs" id="equipeTabs" style="overflow-x:auto;scrollbar-width:none;">
          <button class="review-tab ${filtroInicial === 'pendentes' ? 'is-active' : ''}" onclick="trocarEquipeFiltro('pendentes')">
            Pendentes <span class="review-tab__count" id="cntPendentes">—</span>
          </button>
          <button class="review-tab ${filtroInicial === 'ativos' ? 'is-active' : ''}" onclick="trocarEquipeFiltro('ativos')">
            Ativos <span class="review-tab__count" id="cntAtivos">—</span>
          </button>
          <button class="review-tab ${filtroInicial === 'desativados' ? 'is-active' : ''}" onclick="trocarEquipeFiltro('desativados')">
            Desativados <span class="review-tab__count" id="cntDesativados">—</span>
          </button>
          <button class="review-tab ${filtroInicial === 'categorias' ? 'is-active' : ''}" onclick="trocarEquipeFiltro('categorias')">
            Categorias <span class="review-tab__count" id="cntCategorias">—</span>
          </button>
        </div>

        <div id="equipeList" style="display:flex;flex-direction:column;gap:10px;">
          <div style="padding:30px;text-align:center;color:var(--neutral-500);font-size:13px;">Carregando...</div>
        </div>
      </main>
    </div>
  `;
}

// ====== Equipe: helpers ======
async function listarUsuariosPorStatus(statuses) {
  if (!db) return [];
  const { data, error } = await db
    .from('usuarios')
    .select('id, nome, cpf, email, telefone, perfil, status, categoria_id, criado_em, ultimo_login, categorias_profissionais(nome)')
    .in('status', statuses)
    .neq('perfil', 'admin') // não lista admins aqui
    .order('criado_em', { ascending: false });
  if (error) { console.warn('[equipe]', error.message); return []; }
  return data || [];
}

async function contarUsuariosPorStatus() {
  if (!db) return { pendentes: 0, ativos: 0, desativados: 0 };
  const [p, a, d] = await Promise.all([
    db.from('usuarios').select('*', { count: 'exact', head: true }).eq('status', 'pendente').neq('perfil', 'admin'),
    db.from('usuarios').select('*', { count: 'exact', head: true }).eq('status', 'ativo').neq('perfil', 'admin'),
    db.from('usuarios').select('*', { count: 'exact', head: true }).in('status', ['inativo', 'bloqueado']).neq('perfil', 'admin'),
  ]);
  return { pendentes: p.count || 0, ativos: a.count || 0, desativados: d.count || 0 };
}

};

async function carregarEquipe() {
  const listEl = document.getElementById('equipeList');
  if (!listEl) return;
  // Atualiza contadores (paralelo: usuários + categorias)
  const [cnts, cats] = await Promise.all([
    contarUsuariosPorStatus(),
    listarTodasCategoriasComContagem(),
  ]);
  const setCnt = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  setCnt('cntPendentes', cnts.pendentes);
  setCnt('cntAtivos', cnts.ativos);
  setCnt('cntDesativados', cnts.desativados);
  setCnt('cntCategorias', cats.length);

  const filtro = window._equipeFilter || 'pendentes';

  // Aba Categorias é tratada separadamente
  if (filtro === 'categorias') {
    renderAbaCategorias(listEl, cats);
    return;
  }

  const statuses = filtro === 'pendentes' ? ['pendente']
    : filtro === 'ativos' ? ['ativo']
    : ['inativo', 'bloqueado'];
  const users = await listarUsuariosPorStatus(statuses);

  if (users.length === 0) {
    const vazios = {
      pendentes: { icon: 'check_circle', titulo: 'Nenhum cadastro pendente', desc: 'Assim que alguém se cadastrar no sistema, vai aparecer aqui para sua aprovação.' },
      ativos: { icon: 'groups', titulo: 'Nenhum profissional ativo', desc: 'Aguarde novos cadastros ou aprove pendentes para liberar acesso.' },
      desativados: { icon: 'person_off', titulo: 'Nenhum profissional desativado', desc: 'Quando você desativar ou rejeitar alguém, aparece aqui.' },
    };
    const v = vazios[filtro];
    listEl.innerHTML = `
      <div class="empty-state" style="margin:0;">
        <div class="empty-state__icon"><span class="material-symbols-rounded">${v.icon}</span></div>
        <div class="empty-state__title">${v.titulo}</div>
        <div class="empty-state__desc">${v.desc}</div>
      </div>
    `;
    return;
  }

  listEl.innerHTML = users.map(u => renderEquipeCard(u, filtro)).join('');
}

// Lista categorias com contagem de profissionais vinculados
async function listarTodasCategoriasComContagem() {
  if (!db) return [];
  const { data: cats, error: errC } = await db
    .from('categorias_profissionais')
    .select('id, nome, ativo, criado_em')
    .order('nome');
  if (errC || !cats) return [];
  // Pega contagens em paralelo — poderia ser uma view, mas com poucas categorias roda rápido
  const counts = await Promise.all(
    cats.map(c => db.from('usuarios').select('*', { count: 'exact', head: true }).eq('categoria_id', c.id))
  );
  return cats.map((c, i) => ({ ...c, total_profissionais: counts[i].count || 0 }));
}

            <span class="material-symbols-rounded" style="font-size:16px;">edit</span>

            ? `<button class="eq-btn eq-btn--primary" onclick="reativarCategoria('${c.id}')">
                 <span class="material-symbols-rounded" style="font-size:16px;">restart_alt</span>

// Modal reutilizável de input de texto
function showModalInputTexto({ titulo, subtitulo = '', label, placeholder = '', valorInicial = '', btnConfirmar = 'OK' }) {
  return new Promise((resolve) => {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal-card" style="max-width:400px;">
        <div class="modal-card__header">
          <div class="modal-card__icon" style="background:#E4ECFD;color:var(--status-info);">
            <span class="material-symbols-rounded">edit</span>
          </div>
          <div class="modal-card__title">${titulo}</div>
          ${subtitulo ? `<div class="modal-card__subtitle">${subtitulo}</div>` : ''}
        </div>
        <div class="modal-card__body" style="display:flex;flex-direction:column;gap:12px;">
          <div class="report-field">
            <label>${label}</label>
            <input type="text" id="mniTxInput" placeholder="${placeholder.replace(/"/g,'&quot;')}" value="${valorInicial.replace(/"/g,'&quot;')}" style="width:100%;padding:10px 12px;border:1.5px solid var(--neutral-200);border-radius:10px;font-size:14px;font-family:inherit;" />
          </div>
        </div>
        <div class="modal-card__footer">
          <button class="modal-btn modal-btn--primary" id="mniTxOk">${btnConfirmar}</button>
          <button class="modal-btn modal-btn--secondary" id="mniTxCancel">Cancelar</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);
    const input = backdrop.querySelector('#mniTxInput');
    setTimeout(() => { input.focus(); input.select(); }, 150);
    const cleanup = () => backdrop.remove();
    const submit = () => {
      const v = input.value.trim();
      if (!v) { input.focus(); return; }
      cleanup();
      resolve(v);
    };
    backdrop.querySelector('#mniTxOk').onclick = submit;
    backdrop.querySelector('#mniTxCancel').onclick = () => { cleanup(); resolve(null); };
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); if (e.key === 'Escape') { cleanup(); resolve(null); } });
    backdrop.onclick = (e) => { if (e.target === backdrop) { cleanup(); resolve(null); } };
  });
}

function renderEquipeCard(u, filtro) {
  const categoria = u.categorias_profissionais?.nome || '—';
  const iniciais_ = (u.nome || '?').split(' ').filter(Boolean).slice(0, 2).map(s => s[0].toUpperCase()).join('');
  const dataCad = u.criado_em ? new Date(u.criado_em).toLocaleDateString('pt-BR') : '—';
  const ultimoLogin = u.ultimo_login ? new Date(u.ultimo_login).toLocaleDateString('pt-BR') : 'nunca';

  // Botões de ação variam por filtro
  let acoes = '';
  if (filtro === 'pendentes') {
    acoes = `
      <button class="eq-btn eq-btn--primary" onclick="aprovarProfissional('${u.id}')">
        <span class="material-symbols-rounded" style="font-size:16px;">check_circle</span>
        Aprovar
      </button>
      <button class="eq-btn eq-btn--danger-outline" onclick="rejeitarProfissional('${u.id}')">
        <span class="material-symbols-rounded" style="font-size:16px;">close</span>
        Rejeitar
      </button>
    `;
  } else if (filtro === 'ativos') {
    acoes = `
      <button class="eq-btn eq-btn--secondary" onclick="editarCategoriaProfissional('${u.id}')">
        <span class="material-symbols-rounded" style="font-size:16px;">edit</span>
        Categoria
      </button>
      <button class="eq-btn eq-btn--warning-outline" onclick="desativarProfissional('${u.id}')">
        <span class="material-symbols-rounded" style="font-size:16px;">person_off</span>
        Desativar
      </button>
    `;
  } else {
    // desativados
    acoes = `
      <button class="eq-btn eq-btn--primary" onclick="reativarProfissional('${u.id}')">
        <span class="material-symbols-rounded" style="font-size:16px;">restart_alt</span>
        Reativar
      </button>
      <button class="eq-btn eq-btn--danger-outline" onclick="excluirProfissional('${u.id}')">
        <span class="material-symbols-rounded" style="font-size:16px;">delete_forever</span>
        Excluir
      </button>
    `;
  }

  const statusBadge = u.status === 'pendente'
    ? '<span class="badge badge--warning"><span class="material-symbols-rounded" style="font-size:12px;">hourglass_top</span>Pendente</span>'
    : u.status === 'ativo'
    ? '<span class="badge badge--success"><span class="material-symbols-rounded" style="font-size:12px;">check_circle</span>Ativo</span>'
    : u.status === 'inativo'
    ? '<span class="badge badge--draft"><span class="material-symbols-rounded" style="font-size:12px;">person_off</span>Inativo</span>'
    : '<span class="badge badge--danger"><span class="material-symbols-rounded" style="font-size:12px;">block</span>Bloqueado</span>';

  return `
    <div class="eq-card" data-id="${u.id}">
      <div class="eq-card__top">
        <div class="eq-card__avatar">${iniciais_}</div>
        <div class="eq-card__info">
          <div class="eq-card__name">${(u.nome || '(sem nome)').replace(/"/g,'&quot;')}</div>
          <div class="eq-card__meta">
            <span>${categoria}</span>
            <span>·</span>
            ${statusBadge}
          </div>
        </div>
      </div>
      <div class="eq-card__details">
        <div class="eq-card__row"><span class="material-symbols-rounded" style="font-size:14px;">badge</span><span style="font-family:var(--font-mono);">${u.cpf || '—'}</span></div>
        ${u.email ? `<div class="eq-card__row"><span class="material-symbols-rounded" style="font-size:14px;">mail</span><span>${u.email}</span></div>` : ''}
        ${u.telefone ? `<div class="eq-card__row"><span class="material-symbols-rounded" style="font-size:14px;">phone</span><span style="font-family:var(--font-mono);">${u.telefone}</span></div>` : ''}
        <div class="eq-card__row"><span class="material-symbols-rounded" style="font-size:14px;">event</span><span>Cadastrado em ${dataCad}${filtro === 'ativos' ? ` · último login: ${ultimoLogin}` : ''}</span></div>
      </div>
      <div class="eq-card__actions">${acoes}</div>
    </div>
  `;
}

// Seed de visitas de teste — gera 9 visitas com cenários variados
window.seedVisitasTeste = async function() {
  const ok = await showModalConfirmacao({
    icone: 'science',
    iconeCor: 'info',
    titulo: 'Gerar visitas de teste?',
    subtitulo: 'Vou criar 9 visitas variadas (sem check-in, GPS divergente, horário fora, em revisão, etc.) pra testar o admin. Apenas para desenvolvimento.',
    btnConfirmar: 'Sim, gerar 9 visitas',
    btnCancelar: 'Cancelar',
  });
  if (!ok) return;

  try {
    const user = getCurrentUser();
    if (!user) throw new Error('Usuário não logado');

    // Busca hospitais
    const insts = await listarInstituicoes();
    if (insts.length < 5) {
      alert('Precisa de pelo menos 5 instituições. Popula instituições primeiro.');
      return;
    }

    // Busca objetivos
    const objs = await listarObjetivos();
    if (objs.length === 0) {
      alert('Sem objetivos cadastrados. Algo está errado no banco.');
      return;
    }

    // Helpers
    const diasAtras = (dias) => {
      const d = new Date();
      d.setDate(d.getDate() - dias);
      return d;
    };
    const toTime = (date, h, m) => {
      const d = new Date(date);
      d.setHours(h, m, 0, 0);
      return d;
    };
    const isoOf = (date) => date.toISOString();
    const dateOf = (date) => date.toISOString().split('T')[0];
    const timeOf = (date) => date.toTimeString().substring(0, 8);

    // Pick helpers (usando índices pra espalhar)
    const [einstein, sirio, saoLuiz, samaritano, nove] = insts;

    // Define os 9 cenários
    // Cada cenário tem: instituicao, cenario descritivo, datas, coords, status, relatório
    const cenarios = [
      // 1. Visita normal completa — Einstein (7 dias atrás)
      {
        inst: einstein,
        dia: diasAtras(7),
        checkinTime: [10, 5],
        checkoutTime: [11, 20],
        horaInicio: '10:05', horaTermino: '11:20',
        coordDelta: 0.0003, // ~30m = dentro do raio
        checkinManual: false,
        status: 'completa',
        realizada: true,

        inst: sirio,
        dia: diasAtras(5),
        checkinTime: [14, 15],
        checkoutTime: [15, 40],
        horaInicio: '14:15', horaTermino: '15:40',
        coordDelta: 0.0002,
        checkinManual: false,
        status: 'completa',
        realizada: true,
        resumo: 'Contagem de consignados. Estoque conferido e 3 itens reprocessados. Dra. Camila atendeu.',
        proximos: 'Retornar próximo mês pra nova contagem.',
      },
      // 3. Sem check-out — São Luiz (4 dias atrás) — nutri esqueceu
      {
        inst: saoLuiz,
        dia: diasAtras(4),
        checkinTime: [9, 30],
        checkoutTime: null,
        horaInicio: '09:30', horaTermino: '10:50',
        coordDelta: 0.0004,
        checkinManual: false,
        status: 'completa',
        flagSemCheckout: true,
        realizada: true,
        resumo: 'Visita técnica de rotina. Tudo dentro do esperado.',
        proximos: 'Próxima visita em 30 dias.',
      },
      // 4. Sem check-in (manual) — Samaritano (3 dias atrás)
      {
        inst: samaritano,
        dia: diasAtras(3),
        checkinTime: null,
        checkoutTime: [16, 50],
        horaInicio: '15:30', horaTermino: '16:50',
        coordDelta: null,
        checkinManual: true,
        status: 'completa',
        flagSemCheckin: true,
        realizada: true,
        resumo: 'Visita urgente sem acesso ao GPS (celular descarregado). Apresentação de produto novo.',
        proximos: 'Seguimento via email.',
      },
      // 5. GPS divergente forte (2km fora) — 9 de Julho (3 dias atrás)
      {
        inst: nove,
        dia: diasAtras(3),
        checkinTime: [11, 0],
        checkoutTime: [12, 15],
        horaInicio: '11:00', horaTermino: '12:15',
        coordDelta: 0.018, // ~2km de diferença
        forceGpsDivergente: true,
        checkinManual: false,
        status: 'completa',
        realizada: true,
        resumo: 'Visita de acompanhamento. Supervisora em treinamento externo, conversei com substituta.',
        proximos: 'Retornar quando supervisora titular voltar.',
      },
      // 6. Horário declarado fora da margem — Einstein (2 dias atrás)
      {
        inst: einstein,
        dia: diasAtras(2),
        checkinTime: [8, 0], // check-in 08:00
        checkoutTime: [9, 30],
        horaInicio: '12:00', horaTermino: '13:30', // declarou 4h depois!
        coordDelta: 0.0003,
        forceHorarioForaMargem: true,
        checkinManual: false,
        status: 'completa',
        realizada: true,
        resumo: 'Reunião com Dr. Rafael adiada, fui atendido só à tarde.',
        proximos: 'Manter contato por telefone.',
      },
      // 7. Rascunho (check-in manual, não finalizou ainda) — Sírio (hoje)
      {
        inst: sirio,
        dia: diasAtras(0),
        checkinTime: null,
        checkoutTime: null,
        horaInicio: null, horaTermino: null,
        coordDelta: null,
        checkinManual: true,
        status: 'rascunho',
        flagSemCheckin: true,
        realizada: null,
        resumo: null,
        proximos: null,
      },
      // 8. Duas flags juntas (GPS divergente + horário fora) — São Luiz (1 dia atrás)
      {
        inst: saoLuiz,
        dia: diasAtras(1),
        checkinTime: [16, 0],
        checkoutTime: [17, 30],
        horaInicio: '10:00', horaTermino: '11:30', // 6h fora do check-in!
        coordDelta: 0.012, // ~1.3km fora
        forceGpsDivergente: true,
        forceHorarioForaMargem: true,
        checkinManual: false,
        status: 'completa',
        realizada: true,
        resumo: 'Confusão com agenda, cheguei no horário errado. Visita aconteceu à tarde.',
        proximos: 'Confirmar agenda com antecedência próxima vez.',
      },
      // 9. Em revisão (admin pediu correção) — Samaritano (1 dia atrás)
      {
        inst: samaritano,
        dia: diasAtras(1),
        checkinTime: [13, 45],
        checkoutTime: [14, 55],
        horaInicio: '13:45', horaTermino: '14:55',
        coordDelta: 0.008, // ~900m fora
        forceGpsDivergente: true,
        checkinManual: false,
        status: 'em_revisao',
        revisaoMotivo: 'GPS mostra que você estava longe do hospital. Pode confirmar o endereço?',
        realizada: true,
        resumo: 'Apresentação do kit para Dra. Beatriz. Feedback positivo.',
        proximos: 'Enviar ficha técnica por email.',
      },
    ];

    const agora = new Date();
    const visitasCriadas = [];

    // Cria cada visita
    for (const c of cenarios) {
      // Calcula timestamps de check-in/out
      const checkinTs = c.checkinTime ? toTime(c.dia, c.checkinTime[0], c.checkinTime[1]) : null;
      const checkoutTs = c.checkoutTime ? toTime(c.dia, c.checkoutTime[0], c.checkoutTime[1]) : null;

      // Coords (com delta adicionado pra simular divergência)
      const coordLat = c.coordDelta !== null ? c.inst.latitude + c.coordDelta : null;
      const coordLng = c.coordDelta !== null ? c.inst.longitude + c.coordDelta : null;

      // Distância calculada (pra flag)
      let distanciaMetros = null;
      if (coordLat !== null) {
        distanciaMetros = calcularDistanciaMetros(coordLat, coordLng, c.inst.latitude, c.inst.longitude);
      }

      const payload = {
        nutricionista_id: user.id,
        instituicao_id: c.inst.id,
        data_visita: dateOf(c.dia),
        horario_inicio: c.horaInicio || null,
        horario_termino: c.horaTermino || null,
        checkin_timestamp: checkinTs ? isoOf(checkinTs) : null,
        checkout_timestamp: checkoutTs ? isoOf(checkoutTs) : null,
        checkin_latitude: coordLat,
        checkin_longitude: coordLng,
        checkin_precisao_metros: coordLat !== null ? (Math.random() * 50 + 10).toFixed(2) : null,
        checkout_latitude: checkoutTs && coordLat !== null ? coordLat : null,
        checkout_longitude: checkoutTs && coordLng !== null ? coordLng : null,
        checkin_manual: !!c.checkinManual,
        status: c.status,
        visita_realizada: c.realizada,
        resumo: c.resumo,
        proximos_passos: c.proximos,
        flag_sem_checkin: !!c.flagSemCheckin,
        flag_sem_checkout: !!c.flagSemCheckout,
        flag_gps_divergente: !!c.forceGpsDivergente || (distanciaMetros !== null && distanciaMetros > 500),
        flag_horario_fora_margem: !!c.forceHorarioForaMargem,
        distancia_checkin_metros: distanciaMetros,
        criado_em: new Date().toISOString(),
        atualizado_em: new Date().toISOString(),
      };

      // Se está em revisão, preenche campos de revisão
      if (c.status === 'em_revisao') {
        payload.revisao_solicitada_por = user.id;
        payload.revisao_solicitada_em = new Date().toISOString();
        payload.revisao_motivo = c.revisaoMotivo;
      }

      const { data: visita, error } = await db
        .from('visitas')
        .insert(payload)
        .select()
        .single();

      if (error) {
        console.error('[Seed] Erro na visita:', error);
        throw new Error(`Erro ao criar visita ${visitasCriadas.length + 1}: ${error.message}`);
      }

      visitasCriadas.push(visita);

      // Adiciona objetivo (primeiro objetivo da lista pra simplificar)
      if (c.realizada && objs.length > 0) {
        const objIdx = visitasCriadas.length % objs.length;
        await db.from('visitas_objetivos').insert({
          visita_id: visita.id,
          objetivo_id: objs[objIdx].id,
        });
      }

      // Adiciona 1 profissional aleatório daquela instituição
      if (c.realizada) {
        const { data: profsInst } = await db
          .from('profissionais')
          .select('id')
          .eq('instituicao_id', c.inst.id)
          .eq('ativo', true)
          .limit(1);
        if (profsInst && profsInst.length > 0) {
          await db.from('visitas_profissionais').insert({
            visita_id: visita.id,
            profissional_id: profsInst[0].id,
          });
        }
      }
    }

    setFlash('success', `${visitasCriadas.length} visitas de teste criadas!`);
    router();
  } catch (err) {
    alert('Erro ao gerar visitas: ' + err.message);
    console.error('[Seed] Erro:', err);
  }
};

// Limpar todas as visitas (CUIDADO — só em dev)
window.limparVisitasTeste = async function() {
  const ok = await showModalConfirmacao({
    icone: 'delete_forever',
    iconeCor: 'danger',
    titulo: 'Apagar TODAS as visitas?',
    subtitulo: 'Isso vai deletar permanentemente todas as visitas do banco (de todos os usuários). Use só em ambiente de teste!',
    btnConfirmar: 'Sim, apagar tudo',
    btnCancelar: 'Cancelar',
  });
  if (!ok) return;

  try {
    // Apaga associações primeiro (pra evitar erro de FK)
    await db.from('visitas_objetivos').delete().gte('visita_id', '00000000-0000-0000-0000-000000000000');
    await db.from('visitas_profissionais').delete().gte('visita_id', '00000000-0000-0000-0000-000000000000');
    // Apaga visitas
    const { error } = await db.from('visitas').delete().gte('id', '00000000-0000-0000-0000-000000000000');
    if (error) throw new Error(error.message);

    setFlash('success', 'Todas as visitas foram apagadas.');
    router();
  } catch (err) {
    alert('Erro ao apagar: ' + err.message);
  }
};

function renderAdminConfig() {
  const user = requireAdmin();
  if (!user) return '<div class="splash"><div class="splash__spinner"></div></div>';

  setTimeout(async () => {
    const bodyEl = document.getElementById('configBody');
    if (!bodyEl) return;

    try {
      const configs = await carregarConfigs(true);

      // Agrupa configs por categoria
      const grupos = {};
      Object.keys(ConfigMeta).forEach(chave => {
        const meta = ConfigMeta[chave];
        const cat = meta.categoria;
        if (!grupos[cat]) grupos[cat] = [];
        grupos[cat].push({ chave, meta, atual: configs[chave] });
      });

      // Renderiza grupos na ordem definida em ConfigCategorias
      let html = `
        <div class="config-warning">
          <span class="material-symbols-rounded">info</span>
          <div>Alterações aqui afetam <strong>todo o sistema</strong>. Mudanças nos limites (raio GPS, margem de horário) passam a valer imediatamente para novas visitas.</div>
        </div>
      `;

      Object.keys(ConfigCategorias).forEach(catKey => {
        const cat = ConfigCategorias[catKey];
        const items = grupos[catKey];
        if (!items || items.length === 0) return;

        const iconClass = {
          'brand-lime': 'config-group__icon',
          'navy': 'config-group__icon config-group__icon--navy',
          'warning': 'config-group__icon config-group__icon--warning',
          'info': 'config-group__icon config-group__icon--info',
        }[cat.cor] || 'config-group__icon';

        html += `
          <div class="config-group">
            <div class="config-group__header">
              <div class="${iconClass}">
                <span class="material-symbols-rounded">${cat.icone}</span>
              </div>
              <div class="config-group__title">${cat.titulo}</div>
            </div>
            <div class="config-group__list">
              ${items.map(item => renderConfigItem(item)).join('')}
            </div>
          </div>
        `;
      });

      bodyEl.innerHTML = html;
    } catch (err) {
      bodyEl.innerHTML = `
        <div class="empty-state" style="margin:0;">
          <div class="empty-state__icon" style="background:var(--status-danger-bg);color:var(--status-danger);">
            <span class="material-symbols-rounded">error</span>
          </div>
          <div class="empty-state__title">Erro ao carregar configurações</div>
          <div class="empty-state__desc">${err.message}</div>
        </div>
      `;
    }
  }, 0);

  return `
    <div class="mobile-app">
      ${mobileTopBar({ title: 'Configurações', showBack: true })}
      <main class="mcontent">
        <div id="configBody">
          <div style="padding:40px 20px;text-align:center;color:var(--neutral-500);font-size:13px;">
            <span class="material-symbols-rounded" style="font-size:32px;color:var(--neutral-400);">settings</span>
            <div style="margin-top:8px;">Carregando configurações...</div>
          </div>
        </div>
      </main>
    </div>
  `;
}

function renderConfigItem({ chave, meta, atual }) {
  const valor = atual ? atual.valor : null;
  const metaInfo = atual?.atualizado_em
    ? `<span class="material-symbols-rounded" style="font-size:12px">history</span> atualizado ${formatarTempoRelativo(atual.atualizado_em)}`
    : '<span class="material-symbols-rounded" style="font-size:12px">fiber_new</span> valor original';

  let controlHtml = '';

  if (meta.tipo === 'number') {
    controlHtml = `
      <div class="config-number-group">
        <input
          type="number"
          class="config-number"
          id="cfg_${chave}"
          value="${valor !== null && valor !== undefined ? valor : ''}"
          min="${meta.min || 0}"
          max="${meta.max || 999999}"
          step="${meta.step || 1}"
          onchange="handleConfigChange('${chave}', this.value, 'number')"
        />
        ${meta.sufixo ? `<span class="config-number-suffix">${meta.sufixo}</span>` : ''}
      </div>
      <span class="config-saved-badge" id="cfgSaved_${chave}">
        <span class="material-symbols-rounded">check</span>Salvo
      </span>
    `;
  } else if (meta.tipo === 'boolean') {
    const isOn = valor === true || valor === 'true';
    controlHtml = `
      <span class="config-saved-badge" id="cfgSaved_${chave}">
        <span class="material-symbols-rounded">check</span>Salvo
      </span>
      <button
        type="button"
        class="config-toggle ${isOn ? 'is-on' : ''}"
        id="cfg_${chave}"
        onclick="handleConfigToggle('${chave}', this)"
        aria-label="${isOn ? 'Desativar' : 'Ativar'} ${meta.titulo}"
      ></button>
    `;
  } else if (meta.tipo === 'select') {
    const opcoesHtml = (meta.opcoes || []).map(o => {
      const selected = valor === o.valor ? 'selected' : '';
      return `<option value="${o.valor}" ${selected}>${o.label}</option>`;
    }).join('');
    controlHtml = `
      <select class="config-select" id="cfg_${chave}" onchange="handleConfigChange('${chave}', this.value, 'string')">
        ${opcoesHtml}
      </select>
      <span class="config-saved-badge" id="cfgSaved_${chave}">
        <span class="material-symbols-rounded">check</span>Salvo
      </span>
    `;
  }

  return `
    <div class="config-item">
      <div class="config-item__text">
        <div class="config-item__title">${meta.titulo}</div>
        <div class="config-item__desc">${meta.descricao}</div>
        <div class="config-item__meta">${metaInfo}</div>
      </div>
      <div class="config-item__control">${controlHtml}</div>
    </div>
  `;
}

window.handleConfigChange = async function(chave, valor, tipo) {
  let valorConvertido = valor;
  if (tipo === 'number') {
    valorConvertido = Number(valor);
    const meta = ConfigMeta[chave];
    if (meta) {
      if (meta.min !== undefined && valorConvertido < meta.min) {
        valorConvertido = meta.min;
        document.getElementById(`cfg_${chave}`).value = meta.min;
      }
      if (meta.max !== undefined && valorConvertido > meta.max) {
        valorConvertido = meta.max;
        document.getElementById(`cfg_${chave}`).value = meta.max;
      }
    }
  }

  try {
    await atualizarConfig(chave, valorConvertido);
    // Sincroniza CONFIG global se for uma das chaves cacheadas
    if (chave === 'raio_gps_metros') CONFIG.GPS_RADIUS_METERS = valorConvertido;
    if (chave === 'margem_horario_minutos') CONFIG.MARGIN_TIME_MINUTES = valorConvertido;
    showSavedBadge(chave);
  } catch (err) {
    alert('Erro ao salvar: ' + err.message);
  }
};

window.handleConfigToggle = async function(chave, btn) {
  const isOn = btn.classList.contains('is-on');
  const novoValor = !isOn;
  btn.classList.toggle('is-on');

  try {
    await atualizarConfig(chave, novoValor);
    showSavedBadge(chave);
  } catch (err) {
    // Reverte visualmente em caso de erro
    btn.classList.toggle('is-on');
    alert('Erro ao salvar: ' + err.message);
  }
};

function showSavedBadge(chave) {
  const badge = document.getElementById(`cfgSaved_${chave}`);
  if (!badge) return;
  badge.classList.add('is-visible');
  setTimeout(() => badge.classList.remove('is-visible'), 2000);
}

/* ==========================================================================
   BOOT
   ========================================================================== */
async function boot() {
  initSupabase();

  if (db) {
    await testConnection();
    // Pré-carrega configurações do sistema e sincroniza com CONFIG global
    try {
      await carregarConfigs(true);
      const raio = getConfigSync('raio_gps_metros', 500);
      const margem = getConfigSync('margem_horario_minutos', 90);
      if (typeof raio === 'number') CONFIG.GPS_RADIUS_METERS = raio;
      if (typeof margem === 'number') CONFIG.MARGIN_TIME_MINUTES = margem;
    } catch (e) {
      console.warn('[Boot] Não foi possível carregar configs, usando defaults.', e);
    }
  }

  window.addEventListener('hashchange', router);
  router();

  // Se já tem sessão ativa, liga o polling de notificações
  if (getCurrentUser()) {
    iniciarPollingNotificacoes();
  }

  setTimeout(() => {
    document.getElementById('splash').classList.add('splash--hidden');
    document.getElementById('app').classList.remove('hidden');
  }, 800);
}

document.addEventListener('DOMContentLoaded', boot);
</script>
