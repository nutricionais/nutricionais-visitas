  await db.from('visitas_profissionais').delete().eq('visita_id', visitaId);
  if (profissionaisIds.length > 0) {
    const rows = profissionaisIds.map(pid => ({ visita_id: visitaId, profissional_id: pid }));
    const { error } = await db.from('visitas_profissionais').insert(rows);
    if (error) throw new Error(error.message);
  }
}

// Validar e finalizar relatório (rascunho → completa)
async function finalizarRelatorio(visitaId, dados) {
  if (!db) throw new Error('Banco não conectado');

  // Validação
  const erros = [];
  if (!dados.horario_inicio) erros.push('Horário de início da visita');
  if (!dados.horario_termino) erros.push('Horário de término');
  if (dados.visita_realizada === null || dados.visita_realizada === undefined)
    erros.push('Indicar se a visita foi realizada');

  if (dados.visita_realizada === false) {
    if (!dados.motivo_nao_realizada?.trim()) erros.push('Motivo de não-realização');
  } else {
    if (!dados.profissionais_ids?.length) erros.push('Ao menos 1 profissional conversado');
    if (!dados.objetivos_ids?.length) erros.push('Ao menos 1 objetivo');
    if (!dados.resumo?.trim()) erros.push('Resumo da visita');
    if (!dados.proximos_passos?.trim()) erros.push('Próximos passos');
  }

  if (erros.length > 0) {
    throw new Error('Campos obrigatórios faltando:\n• ' + erros.join('\n• '));
  }

  // Calcula flag_horario_fora_margem
  // Usa a margem configurada no sistema (default: 90min)
  const margemMin = await getConfig('margem_horario_minutos', 90);
  let flagHorarioForaMargem = false;
  if (dados.checkin_timestamp && dados.horario_inicio) {
    const checkinTs = new Date(dados.checkin_timestamp);
    const [h, m] = dados.horario_inicio.split(':');
    const declaradoInicio = new Date(checkinTs);
    declaradoInicio.setHours(parseInt(h), parseInt(m), 0, 0);
    const diffMin = Math.abs((declaradoInicio - checkinTs) / 60000);
    if (diffMin > margemMin) flagHorarioForaMargem = true;
  }

  // Atualização final
  const payload = {
    horario_inicio: dados.horario_inicio,
    horario_termino: dados.horario_termino,
    visita_realizada: dados.visita_realizada,
    motivo_nao_realizada: dados.motivo_nao_realizada || null,
    resumo: dados.resumo || null,
    proximos_passos: dados.proximos_passos || null,
    proxima_visita_programada: dados.proxima_visita_programada || null,
    flag_horario_fora_margem: flagHorarioForaMargem,
    status: 'completa',
    atualizado_em: new Date().toISOString(),
  };

  // Se era uma visita devolvida (rascunho com motivo de revisão),
  // limpa os campos de devolução ao refinalizar para fechar o ciclo
  if (dados.foiDevolvida) {
    payload.revisao_motivo = null;
    payload.revisao_solicitada_por = null;
    payload.revisao_solicitada_em = null;
  }

  await atualizarRelatorio(visitaId, payload);
  await syncObjetivosVisita(visitaId, dados.objetivos_ids || []);
  await syncProfissionaisVisita(visitaId, dados.profissionais_ids || []);
}

/* ==========================================================================
   AGENDA — CRUD de agendamentos (Sprint 7 Mini 1)
   Estratégia: reusa a tabela `visitas` com status='agendada'.
   - Criar agendamento: INSERT com status='agendada' + data/hora futuras
   - Iniciar visita agendada: UPDATE status='rascunho' + checkin_timestamp + GPS
   - Cancelar: DELETE (zero necessidade de histórico de agendamento cancelado)
   ========================================================================== */

// Lista agendamentos do profissional logado — inclui 'agendada' E 'sugerida'
// (ele precisa ver as sugestões pendentes de aceite também)
async function listarAgendamentosDoUser() {
  if (!db) return [];
  const user = getCurrentUser();
  if (!user) return [];
  const { data, error } = await db
    .from('visitas')
    .select(`
      id, data_visita, horario_inicio, resumo, instituicao_id, status, atribuido_por,
      instituicoes(id, nome, cidade, latitude, longitude)
    `)
    .eq('nutricionista_id', user.id)
    .in('status', ['agendada', 'sugerida'])
    .order('data_visita', { ascending: true })
    .order('horario_inicio', { ascending: true, nullsFirst: false });
  if (error) { console.warn('[agenda listar]', error.message); return []; }
  const ags = data || [];

  // Carrega objetivos de cada agendamento (N:N)
  if (ags.length > 0) {
    const ids = ags.map(a => a.id);
    const { data: rels } = await db
      .from('visitas_objetivos')
      .select('visita_id, objetivos_visita(id, nome)')
      .in('visita_id', ids);
    const porVisita = {};
    (rels || []).forEach(r => {
      if (!porVisita[r.visita_id]) porVisita[r.visita_id] = [];
      if (r.objetivos_visita) porVisita[r.visita_id].push(r.objetivos_visita);
    });
    ags.forEach(a => a.objetivos = porVisita[a.id] || []);
  }
  return ags;
}

// Cria um agendamento futuro (status='agendada')
// Cria agendamento. Se `nutricionista_id` vier preenchido (admin atribuindo),
// usa esse ID no lugar do user atual e marca `atribuido_por`. Por padrão,
// admin atribuindo cria como 'sugerida' (profissional precisa aceitar).
// Passar `sugerir=false` força criação direta como 'agendada' (pulando aceite).
async function criarAgendamento({ instituicao_id, data, hora, objetivo_id, observacao, nutricionista_id = null, sugerir = true }) {
  if (!db) throw new Error('Banco não conectado');
  const user = getCurrentUser();
  if (!user) throw new Error('Usuário não logado');
  if (!instituicao_id) throw new Error('Instituição é obrigatória');
  if (!data) throw new Error('Data é obrigatória');
  // Aceita "HH:MM" ou "HH:MM:SS"; normaliza pra "HH:MM:SS"
  const horaNormalizada = hora
    ? (hora.length === 5 ? `${hora}:00` : hora)
    : null;

  // Se admin está atribuindo pra outra pessoa, usa esse ID e marca atribuido_por
  const ehAtribuicao = nutricionista_id && nutricionista_id !== user.id;
  const statusInicial = (ehAtribuicao && sugerir) ? 'sugerida' : 'agendada';

  const payload = {
    nutricionista_id: nutricionista_id || user.id,
    instituicao_id,
    data_visita: data,
    horario_inicio: horaNormalizada,
    status: statusInicial,
    resumo: observacao || null,
    atribuido_por: ehAtribuicao ? user.id : null,
    // Flags neutras (necessárias se alguma migration tem NOT NULL)
    checkin_manual: false,
    flag_gps_divergente: false,
    flag_horario_fora_margem: false,
    flag_sem_checkin: false,
    flag_sem_checkout: false,
  };

  const { data: novo, error } = await db
    .from('visitas')
    .insert(payload)
    .select()
    .single();
  if (error) throw new Error(error.message);

  // Vincula objetivo se foi escolhido
  if (objetivo_id) {
    await db.from('visitas_objetivos').insert({ visita_id: novo.id, objetivo_id });
  }
  return novo;
}

// Profissional aceita uma sugestão do admin → vira agendamento normal

  if (!db) throw new Error('Banco não conectado');

      status: 'agendada',
      sugestao_decidida_em: new Date().toISOString(),
    })
    .eq('id', id)

  if (error) throw new Error(error.message);

}

// Profissional recusa uma sugestão → vira 'recusada' com motivo obrigatório
async function recusarSugestao(id, motivo) {
  if (!db) throw new Error('Banco não conectado');
  if (!motivo || !motivo.trim()) throw new Error('Motivo é obrigatório');
  const { error } = await db
    .from('visitas')

      sugestao_decidida_em: new Date().toISOString(),
    })
    .eq('id', id)
    .eq('status', 'sugerida');
  if (error) throw new Error(error.message);
  return true;
}

// Admin reatribui agendamento pra outro profissional. Se estava 'agendada' ou
// 'sugerida', mantém o mesmo status (profissional novo precisará aceitar se era sugestão).
// Atualiza atribuido_por pro admin atual pra fechar o loop de notificação.
async function reatribuirAgendamento(id, novoNutricionistaId) {
  if (!db) throw new Error('Banco não conectado');
  if (!novoNutricionistaId) throw new Error('Profissional de destino é obrigatório');
  const user = getCurrentUser();
  if (!user) throw new Error('Usuário não logado');

  // Pega o agendamento atual pra saber status e se muda de pessoa
  const { data: atual, error: errGet } = await db
    .from('visitas')
    .select('id, status, nutricionista_id')
    .eq('id', id)
    .single();
  if (errGet) throw new Error(errGet.message);
  if (!['agendada','sugerida'].includes(atual.status)) {
    throw new Error('Só dá pra reatribuir visitas ainda não iniciadas.');
  }
  if (String(atual.nutricionista_id) === String(novoNutricionistaId)) {
    throw new Error('Esse profissional já é o responsável por essa visita.');
  }

  // Se era 'agendada' direto (sem fluxo de aceite), pro novo profissional mantemos
  // 'agendada' e ele já recebe notificação de atribuído (trigger dispara pelo atribuido_por).
  // Se era 'sugerida', mantemos 'sugerida' pra que o novo precise aceitar.
  // Em ambos os casos o trigger de INSERT não vai disparar (porque é UPDATE), então
  // fazemos o INSERT de notificação manualmente em seguida.
  const { error } = await db
    .from('visitas')
    .update({
      nutricionista_id: novoNutricionistaId,
      atribuido_por: user.id,
      // Reseta estado de decisão anterior (caso tenha sido sugerida antes)
      sugestao_motivo_recusa: null,
      sugestao_decidida_em: null,
    })
    .eq('id', id)
    .in('status', ['agendada','sugerida']);
  if (error) throw new Error(error.message);

  // Notificação pro novo profissional (já que o trigger de INSERT não dispara em UPDATE)
  // Busca dados pra montar a mensagem
  const { data: completo } = await db
    .from('visitas')
    .select('id, status, data_visita, horario_inicio, instituicao_id, instituicoes(nome)')
    .eq('id', id)
    .single();

  if (completo) {
    const instNome = completo.instituicoes?.nome || 'instituição';
    const [y, m, d] = String(completo.data_visita).split('-').map(Number);
    const dataFmt = `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}`;
    const horaFmt = completo.horario_inicio
      ? ' às ' + String(completo.horario_inicio).substring(0,5)
      : '';

    const ehSugestao = completo.status === 'sugerida';
    await db.from('notificacoes').insert({
      user_id: novoNutricionistaId,
      tipo: ehSugestao ? 'agendamento_sugerido' : 'agendamento_atribuido',
      titulo: ehSugestao ? 'Nova visita sugerida — precisa de aceite' : 'Nova visita atribuída',
      mensagem: ehSugestao
        ? `Visita em ${instNome} no dia ${dataFmt}${horaFmt}. Abra pra aceitar ou recusar.`
        : `Nova visita em ${instNome} agendada pra ${dataFmt}${horaFmt}.`,
      link: '#/agenda',
      objeto_id: String(id),
      lida: false,
    });
  }
  return true;
}

/* ==========================================================================
   BUSCA GLOBAL — busca varia por perfil (Sprint 8)
   Admin: busca em visitas (todas), instituições (todas), profissionais
   Profissional: busca apenas SUAS visitas + instituições ATIVAS (sem profissionais)
   Ignora acentos / case sensitivity via ilike do Postgres.
   ========================================================================== */
async function buscarGlobal(query) {
  if (!db) return { visitas: [], instituicoes: [], profissionais: [] };
  const termo = (query || '').trim();
  if (termo.length < 2) return { visitas: [], instituicoes: [], profissionais: [] };
  const pattern = `%${termo}%`;

  const user = getCurrentUser();
  const ehAdmin = !!user && user.perfil === 'admin';

  // Instituições — admin vê todas; profissional vê só as ativas
  const queryInsts = db.from('instituicoes')
    .select('id, nome, razao_social, cidade, estado, ativo')
    .or(`nome.ilike.${pattern},razao_social.ilike.${pattern},cidade.ilike.${pattern}`)
    .order('nome')
    .limit(8);
  if (!ehAdmin) queryInsts.eq('ativo', true);

  // Visitas — admin vê todas; profissional vê só as dele
  const queryVisitas = db.from('visitas')
    .select(`
      id, data_visita, status, resumo, instituicao_id, nutricionista_id,
      instituicoes(nome, cidade),
      usuarios:nutricionista_id(nome)
    `)
    .or(`resumo.ilike.${pattern},proximos_passos.ilike.${pattern},motivo_nao_realizada.ilike.${pattern}`)
    .order('data_visita', { ascending: false })
    .limit(8);
  if (!ehAdmin && user) queryVisitas.eq('nutricionista_id', user.id);

  // Profissionais — SÓ pra admin
  const promises = [queryInsts, queryVisitas];
  if (ehAdmin) {
    promises.push(
      db.from('usuarios')
        .select('id, nome, perfil, status, categorias_profissionais(nome)')
        .ilike('nome', pattern)
        .order('nome')
        .limit(8)
    );
  }

  const [resInsts, resVisitas, resProfs] = await Promise.all(promises);

  return {
    instituicoes: resInsts.data || [],
    visitas:      resVisitas.data || [],
    profissionais: ehAdmin ? (resProfs?.data || []) : [],
  };
}

// Cancela (deleta) um agendamento — funciona tanto pra 'agendada' quanto 'sugerida'
async function cancelarAgendamento(id) {
  if (!db) throw new Error('Banco não conectado');
  // Limpa a relação N:N primeiro (caso FK não tenha CASCADE)
  await db.from('visitas_objetivos').delete().eq('visita_id', id);
  const { error } = await db
    .from('visitas')
    .delete()
    .eq('id', id)
    .in('status', ['agendada', 'sugerida']);
  if (error) throw new Error(error.message);
  return true;
}

// Atualiza um agendamento existente (só funciona se ainda estiver com status='agendada')
async function atualizarAgendamento(id, { instituicao_id, data, hora, objetivo_id, observacao }) {
  if (!db) throw new Error('Banco não conectado');
  if (!instituicao_id) throw new Error('Instituição é obrigatória');
  if (!data) throw new Error('Data é obrigatória');
  const horaNormalizada = hora
    ? (hora.length === 5 ? `${hora}:00` : hora)
    : null;

  // Atualiza só os campos editáveis; mantém checkin_* etc zerados
  const payload = {
    instituicao_id,
    data_visita: data,
    horario_inicio: horaNormalizada,
    resumo: observacao || null,
  };

  // Garante que só atualiza se ainda estiver agendada ou sugerida (evita editar visita já iniciada)
  const { error } = await db
    .from('visitas')
    .update(payload)
    .eq('id', id)
    .in('status', ['agendada', 'sugerida']);
  if (error) throw new Error(error.message);

  // Sync do objetivo (N:N): apaga relações existentes e cria a nova se tiver
  await db.from('visitas_objetivos').delete().eq('visita_id', id);
  if (objetivo_id) {
    const { error: errObj } = await db.from('visitas_objetivos').insert({ visita_id: id, objetivo_id });
    if (errObj) throw new Error(errObj.message);
  }
  return true;
}

// Transforma um agendamento em visita ativa (check-in). Pega GPS, valida raio, e atualiza status.
async function iniciarVisitaAgendada(id, userPos /* { lat, lng, accuracy } | null */) {
  if (!db) throw new Error('Banco não conectado');
  // Busca o agendamento + coords da instituição pra validar GPS
  const { data: ag, error: errAg } = await db
    .from('visitas')
    .select('id, status, instituicao_id, instituicoes(latitude, longitude)')
    .eq('id', id)
    .single();
  if (errAg) throw new Error(errAg.message);
  if (ag.status !== 'agendada') throw new Error('Esta visita não está mais agendada.');

  // Calcula flag de GPS divergente se tiver coords
  let flagGpsDivergente = false;
  const inst = ag.instituicoes;
  if (userPos && inst && inst.latitude && inst.longitude) {
    const dist = calcularDistanciaMetros(userPos.lat, userPos.lng, inst.latitude, inst.longitude);
    flagGpsDivergente = dist > (CONFIG.GPS_RADIUS_METERS || 500);
  }

  const d = new Date();
  const agoraISO = d.toISOString();
  const dataLocal = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const horaLocal = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;

  // Sobrescreve data/hora pelo momento real do início (agendamento serve só como ponto de partida)
  const payload = {
    status: 'rascunho',
    data_visita: dataLocal,
    horario_inicio: horaLocal,
    checkin_timestamp: agoraISO,
    checkin_latitude: userPos ? userPos.lat : null,
    checkin_longitude: userPos ? userPos.lng : null,
    checkin_precisao_metros: userPos ? Math.round(userPos.accuracy) : null,
    checkin_manual: !userPos,
    flag_gps_divergente: flagGpsDivergente,
  };

  await updateOrThrow('visitas', payload, id);
  return id;
}

// Verifica se visita pode ser editada
// Regras:
// - aprovada_pos_revisao: sempre travada (histórico imutável)
// - em_revisao: travada (admin decide)
// - rascunho devolvido pelo admin (tem revisao_solicitada_em): 24h a partir da devolução
// - rascunho / completa normal: 24h a partir do check-in
function visitaPodeSerEditada(visita) {
  if (visita.status === 'aprovada_pos_revisao') {
    return { pode: false, motivo: 'Visita aprovada pelo administrador. Histórico imutável.' };
  }
  if (visita.status === 'em_revisao') {
    return { pode: false, motivo: 'Visita em revisão pelo administrador.' };
  }
  // Detecta devolução: rascunho com revisao_solicitada_em preenchido
  const foiDevolvida = visita.status === 'rascunho' && !!visita.revisao_solicitada_em;
  // Marco temporal: devolução (se foi devolvida) ou check-in original
  const marcoTs = foiDevolvida ? visita.revisao_solicitada_em : visita.checkin_timestamp;
  if (marcoTs) {
    const marco = new Date(marcoTs);
    const agora = new Date();
    const horasPassadas = (agora - marco) / (1000 * 60 * 60);
    if (horasPassadas > 24) {
      const motivo = foiDevolvida
        ? 'A janela de 24h para corrigir esta visita expirou. Solicite nova revisão ao administrador.'
        : 'Janela de edição de 24h expirada. Solicite revisão ao administrador.';
      return { pode: false, motivo };
    }
    return { pode: true, horasRestantes: 24 - horasPassadas, devolvida: foiDevolvida };
  }
  return { pode: true, horasRestantes: null };
}

// Calcula duração em minutos entre 2 timestamps
function calcularDuracaoMin(inicio, fim) {
  if (!inicio || !fim) return null;
  const diff = (new Date(fim) - new Date(inicio)) / 60000;
  return Math.max(0, Math.round(diff));
}

function formatarDuracao(min) {
  if (min === null || min === undefined) return '—';
  const h = Math.floor(min / 60);
  const m = min % 60;
  if (h === 0) return `${m}min`;
  return `${h}h ${m.toString().padStart(2,'0')}min`;
}

// Carrega todas as configs (com cache)
async function carregarConfigs(forcarReload = false) {
  const agora = Date.now();
  const cacheValido = ConfigCache.data && ConfigCache.loadedAt && (agora - ConfigCache.loadedAt) < ConfigCache.ttlMs;

  if (cacheValido && !forcarReload) return ConfigCache.data;

  if (!db) {
    console.warn('[Config] Banco não conectado, usando defaults');
    return {};
  }

  const { data, error } = await db.from('configuracoes_sistema').select('*');
  if (error) {
    console.warn('[Config] Erro ao carregar:', error.message);
    return ConfigCache.data || {};
  }

  const map = {};
  (data || []).forEach(row => {
    map[row.chave] = {
      valor: row.valor,
      descricao: row.descricao,
      atualizado_em: row.atualizado_em,
      atualizado_por: row.atualizado_por,
    };
  });

  ConfigCache.data = map;
  ConfigCache.loadedAt = agora;
  return map;
}

// Lê um valor específico (com fallback se não existir)
async function getConfig(chave, fallback = null) {
  const configs = await carregarConfigs();
  if (!configs[chave]) return fallback;
  return configs[chave].valor;
}

// Versão síncrona (lê do cache — útil em UI depois que já carregou)
function getConfigSync(chave, fallback = null) {
  if (!ConfigCache.data || !ConfigCache.data[chave]) return fallback;
  return ConfigCache.data[chave].valor;
}

// Atualiza uma configuração (admin-only)
async function atualizarConfig(chave, novoValor) {
  if (!db) throw new Error('Banco não conectado');
  const user = getCurrentUser();
  if (!user || user.perfil !== 'admin') throw new Error('Apenas admin pode alterar configurações');

  const { error } = await db
    .from('configuracoes_sistema')
    .update({
      valor: novoValor,
      atualizado_em: new Date().toISOString(),
      atualizado_por: user.id,
    })
    .eq('chave', chave);

  if (error) throw new Error(error.message);

  // Invalida cache
  ConfigCache.data = null;
  ConfigCache.loadedAt = null;

  return true;
}

// Extrai flags ativas de uma visita
function getFlagsAtivas(v) {
  if (!v) return [];
  const flags = [];
  Object.keys(FlagsMeta).forEach(key => {
    if (v[key] === true) flags.push({ key, ...FlagsMeta[key] });
  });
  return flags;
}

// Nível mais crítico das flags (pra borda do card)
function getNivelCritico(flags) {
  if (flags.some(f => f.nivel === 'critical')) return 'critical';
  if (flags.some(f => f.nivel === 'warning')) return 'warning';
  if (flags.some(f => f.nivel === 'info')) return 'info';
  return null;
}

// Lista visitas pra fila de revisão
// filtro: 'todas' | 'com_flags' | 'em_revisao' | 'resolvidas'
//   em_revisao aqui = visitas devolvidas pro profissional, aguardando a correção.
//   (status='rascunho' + revisao_motivo preenchido + ainda não resolvida)
async function listarVisitasAdmin(filtro = 'com_flags') {
  if (!db) return [];

  let query = db.from('visitas').select(
    '*, instituicoes(id, nome, cidade), usuarios:nutricionista_id(id, nome)'
  );

  if (filtro === 'com_flags') {
    // Apenas visitas com alguma flag ativa, status rascunho ou completa
    query = query.or('flag_sem_checkin.eq.true,flag_sem_checkout.eq.true,flag_gps_divergente.eq.true,flag_horario_fora_margem.eq.true,checkin_manual.eq.true');
  } else if (filtro === 'em_revisao') {
    // Rascunhos que o admin devolveu pro profissional (aguardando correção)
    query = query.eq('status', 'rascunho').not('revisao_motivo', 'is', null).is('revisao_resolvida_em', null);
  } else if (filtro === 'resolvidas') {
    query = query.eq('status', 'aprovada_pos_revisao');
  }
  // 'todas' = sem filtro

  query = query.order('checkin_timestamp', { ascending: false, nullsFirst: false }).limit(100);

  const { data, error } = await query;
  if (error) {
    console.warn('[AdminRevisao] Erro:', error.message);
    return [];
  }
  return data || [];
}

// Conta visitas por tipo de filtro (pra mostrar nos tabs)
async function contarVisitasPorFiltro() {
  if (!db) return { todas: 0, com_flags: 0, em_revisao: 0, resolvidas: 0 };

  const promises = [
    db.from('visitas').select('*', { count: 'exact', head: true }),
    db.from('visitas').select('*', { count: 'exact', head: true })
      .or('flag_sem_checkin.eq.true,flag_sem_checkout.eq.true,flag_gps_divergente.eq.true,flag_horario_fora_margem.eq.true,checkin_manual.eq.true'),
    db.from('visitas').select('*', { count: 'exact', head: true })
      .eq('status', 'rascunho').not('revisao_motivo', 'is', null).is('revisao_resolvida_em', null),
    db.from('visitas').select('*', { count: 'exact', head: true }).eq('status', 'aprovada_pos_revisao'),
  ];

  try {
    const results = await Promise.all(promises);
    return {
      todas: results[0].count || 0,
      com_flags: results[1].count || 0,
      em_revisao: results[2].count || 0,
      resolvidas: results[3].count || 0,
    };
  } catch {
    return { todas: 0, com_flags: 0, em_revisao: 0, resolvidas: 0 };
  }
}

// Obter detalhes completos de uma visita (com tudo que admin precisa ver)
async function getVisitaAdmin(visitaId) {
  if (!db) throw new Error('Banco não conectado');
  const { data: visita, error } = await db
    .from('visitas')
    .select(`
      *,
      instituicoes(id, nome, razao_social, logradouro, bairro, cidade, estado, latitude, longitude),
      nutricionista:usuarios!nutricionista_id(id, nome, email, cpf),
      revisor_solicitou:usuarios!revisao_solicitada_por(id, nome),
      revisor_resolveu:usuarios!revisao_resolvida_por(id, nome)
    `)
    .eq('id', visitaId)
    .single();

  if (error) throw new Error(error.message);

  // Carrega objetivos
  const { data: vObj } = await db
    .from('visitas_objetivos')
    .select('objetivos_visita(id, nome)')
    .eq('visita_id', visitaId);
  visita.objetivos = (vObj || []).map(v => v.objetivos_visita).filter(Boolean);

  // Carrega profissionais
  const { data: vProf } = await db
    .from('visitas_profissionais')
    .select('profissionais(id, nome, profissao, profissao_outro)')
    .eq('visita_id', visitaId);
  visita.profissionais = (vProf || []).map(v => v.profissionais).filter(Boolean);

  return visita;
}

// Aceita `status` (string) ou a visita inteira. Quando recebe a visita,
// detecta o caso especial "rascunho devolvido pelo admin aguardando correção"
// e mostra um badge dedicado ("Revisão solicitada") em vez de "Rascunho".
function sbadgeForStatus(statusOrVisita) {
  let status, visita;
  if (typeof statusOrVisita === 'string') {
    status = statusOrVisita;
  } else if (statusOrVisita && typeof statusOrVisita === 'object') {
    visita = statusOrVisita;
    status = visita.status;
  }

  // Caso especial: rascunho com revisão solicitada pelo admin (devolução)
  const ehRevisaoSolicitada = status === 'rascunho'
    && visita && !!visita.revisao_motivo && !!visita.revisao_solicitada_em
    && !visita.revisao_resolvida_em;
  if (ehRevisaoSolicitada) {
    return `<span class="sbadge sbadge--review-req"><span class="sbadge__dot"></span>Revisão solicitada</span>`;
  }

  const map = {
    'rascunho':            { cls: 'draft',      label: 'Rascunho' },
    'completa':            { cls: 'approved',   label: 'Concluída' },
    'em_revisao':          { cls: 'review',     label: 'Em revisão' },
    'aprovada_pos_revisao':{ cls: 'approved',   label: 'Aprovada' },
  };
  const s = map[status] || map.rascunho;
  return `<span class="sbadge sbadge--${s.cls}"><span class="sbadge__dot"></span>${s.label}</span>`;
}

function router() {
  const fullHash = window.location.hash || '#/';
  // Separa hash e query (ex: #/visitas/relatorio?id=abc)
  const [hash, queryString] = fullHash.split('?');
  const params = {};
  if (queryString) {
    queryString.split('&').forEach(p => {
      const [k, v] = p.split('=');
      params[k] = decodeURIComponent(v || '');
    });
  }
  window._routeParams = params; // disponível nas telas

  const route = routes[hash];
  const app = document.getElementById('app');

  if (route) {
    document.title = `${route.title} · ${CONFIG.APP_NAME}`;
    app.innerHTML = route.render(hash);
  } else {
    app.innerHTML = render404(hash);
    document.title = `Não encontrado · ${CONFIG.APP_NAME}`;
  }

  // Atualiza badge de notificações sempre que mudar de tela
  // (assim o usuário vê novas notifs logo após agir — admin aprovar, etc.)
  if (getCurrentUser()) {
    setTimeout(() => atualizarBadgeNotificacoes(), 200);
  }

  // Pós-render: aplica máscaras e listeners dinâmicos
  applyMasks(app);

  // Listener em campos de senha (pra atualizar strength/reqs)
  const sPwd = document.getElementById('sPwd');
  if (sPwd) sPwd.addEventListener('input', window.updateSignupPasswordMeter);

  const fNewPwd = document.getElementById('fNewPwd');
  if (fNewPwd) fNewPwd.addEventListener('input', window.updateNewPwdMeter);

  // Barra fixa de "modo simulação nutri" (admin testando como nutri)
  renderSimulacaoBar();

  window.scrollTo(0, 0);
}

window.handleSignupSubmit = async function(ev) {
  ev.preventDefault();
  const nome = document.getElementById('sNome').value.trim();
  const cpf = document.getElementById('sCpf').value;
  const email = document.getElementById('sEmail').value.trim();
  const telefone = document.getElementById('sTel').value;
  const categoriaId = document.getElementById('sCategoria')?.value || '';
  const pwd = document.getElementById('sPwd').value;
  const pwd2 = document.getElementById('sPwd2').value;
  const termsChecked = document.getElementById('termsLabel').classList.contains('cbx--checked');
  const btn = document.getElementById('signupSubmitBtn');
  const flashEl = document.getElementById('signupFlash');

  // Validações
  const errors = [];
  if (nome.length < 4) errors.push('Nome muito curto');
  if (cpf.replace(/\D/g,'').length !== 11) errors.push('CPF inválido');
  if (!email.includes('@') || !email.includes('.')) errors.push('E-mail inválido');
  if (telefone.replace(/\D/g,'').length < 10) errors.push('Telefone inválido');
  if (!categoriaId) errors.push('Selecione sua categoria profissional');
  if (pwd.length < 8 || !/[A-Z]/.test(pwd) || !/[0-9]/.test(pwd) || !/[^A-Za-z0-9]/.test(pwd)) {
    errors.push('Senha não atende aos requisitos');
  }
  if (pwd !== pwd2) errors.push('As senhas não conferem');
  if (!termsChecked) errors.push('Você precisa aceitar os termos de uso');

  if (errors.length) {
    flashEl.innerHTML = `<div class="flash flash--error"><span class="material-symbols-rounded" style="font-size:18px">error</span>${errors[0]}</div>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Criando conta...';
  flashEl.innerHTML = '';

  try {
    await cadastrar({ nome, cpf, email, telefone, senha: pwd, categoria_id: categoriaId });
    setFlash('success', 'Conta criada! Aguardando aprovação do administrador.');
    window.location.hash = '#/login';
  } catch (err) {
    flashEl.innerHTML = `<div class="flash flash--error"><span class="material-symbols-rounded" style="font-size:18px">error</span>${err.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'Criar conta';
  }
};

window.handleRecuperarEmail = async function(ev) {
  ev.preventDefault();
  const cpf = document.getElementById('fCpf').value;
  const btn = document.getElementById('fEmailBtn');
  const flashEl = document.getElementById('fEmailFlash');

  if (cpf.replace(/\D/g,'').length !== 11) {
    flashEl.innerHTML = `<div class="flash flash--error"><span class="material-symbols-rounded" style="font-size:18px">error</span>CPF inválido</div>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Enviando...';
  flashEl.innerHTML = '';

  try {
    const cpfFmt = maskCPF(cpf);
    const { data: user, error } = await db
      .from('usuarios')
      .select('id, email, nome')
      .eq('cpf', cpfFmt)
      .maybeSingle();

    if (error) throw new Error(error.message);
    if (!user) throw new Error('Não encontramos conta com esse CPF');

    // Gera código OTP (simulado — na V2 enviamos via EmailJS)
    const code = String(Math.floor(100000 + Math.random() * 900000));

    ForgotState.step = 'otp';
    ForgotState.email = user.email;
    ForgotState.cpf = cpfFmt;
    ForgotState.userId = user.id;
    ForgotState.expectedCode = code;

    // Enquanto o EmailJS não está configurado, mostra o código via alert
    alert(`[MODO DEMO — SEM EMAIL AINDA]\n\nO código enviado seria:\n${code}\n\nUse esse código na próxima tela. Na versão final, o código chegará no e-mail: ${user.email}`);

    router(); // re-renderiza na nova step
  } catch (err) {
    flashEl.innerHTML = `<div class="flash flash--error"><span class="material-symbols-rounded" style="font-size:18px">error</span>${err.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'Enviar código';
  }
};

function maskEmail(email) {
  if (!email || !email.includes('@')) return email;
  const [user, domain] = email.split('@');
  if (user.length <= 2) return email;
  return `${user[0]}${'*'.repeat(Math.min(6, user.length - 2))}${user[user.length - 1]}@${domain}`;
}

              ${i === 0 ? 'autofocus' : ''}
            />
          `).join('')}
        </div>

window.handleOtpInput = function(i, input) {
  const digit = input.value.replace(/\D/g,'').slice(-1);
  input.value = digit;
  if (digit) {
    input.classList.add('otp__digit--filled');
    const next = document.querySelector(`[data-otp-index="${i+1}"]`);
    if (next) next.focus();
  } else {
    input.classList.remove('otp__digit--filled');
  }
  validateOtpForm();
};

window.handleOtpKey = function(i, ev) {
  if (ev.key === 'Backspace' && !ev.target.value && i > 0) {
    const prev = document.querySelector(`[data-otp-index="${i-1}"]`);
    if (prev) prev.focus();
  }
};

window.handleOtpPaste = function(ev) {
  const txt = (ev.clipboardData.getData('text') || '').replace(/\D/g,'').slice(0,6);
  if (!txt) return;
  ev.preventDefault();
  for (let i = 0; i < 6; i++) {
    const el = document.querySelector(`[data-otp-index="${i}"]`);
    if (el) {
      el.value = txt[i] || '';
      if (txt[i]) el.classList.add('otp__digit--filled');
    }
  }
  const lastIdx = Math.min(txt.length, 5);
  document.querySelector(`[data-otp-index="${lastIdx}"]`)?.focus();
  validateOtpForm();
};

function validateOtpForm() {
  const code = getOtpValue();
  const btn = document.getElementById('fOtpBtn');
  if (btn) btn.disabled = code.length < 6;
}

function getOtpValue() {
  return [0,1,2,3,4,5].map(i => document.querySelector(`[data-otp-index="${i}"]`)?.value || '').join('');
}

window.handleOtpVerify = function() {
  const code = getOtpValue();
  const flashEl = document.getElementById('fOtpFlash');

  if (code !== ForgotState.expectedCode) {
    flashEl.innerHTML = `<div class="flash flash--error"><span class="material-symbols-rounded" style="font-size:18px">error</span>Código incorreto</div>`;
    return;
  }

  ForgotState.step = 'novaSenha';
  router();
};

  ForgotState.step = 'email';

  btn.textContent = 'Salvando...';
  flashEl.innerHTML = '';

  try {
    const senhaHash = await hashSenha(pwd);
    const { error } = await db.from('usuarios')
      .update({ senha_hash: senhaHash })
      .eq('id', ForgotState.userId);

    if (error) throw new Error(error.message);

    ForgotState.step = 'email'; // reset
    ForgotState.expectedCode = '';
    setFlash('success', 'Senha atualizada com sucesso! Faça login.');
    window.location.hash = '#/login';
  } catch (err) {
    flashEl.innerHTML = `<div class="flash flash--error"><span class="material-symbols-rounded" style="font-size:18px">error</span>${err.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'Salvar nova senha';
  }
};

function renderCheckin() {
  const user = requireAuth();
  if (!user) return '<div class="splash"><div class="splash__spinner"></div></div>';

  // Reseta fluxo
  CheckinFlow.instituicaoSelecionada = null;
  CheckinFlow.manual = false;

  // Async: pega GPS + lista instituições + ordena
  setTimeout(async () => {
    const listEl = document.getElementById('instList');
    const gpsEl = document.getElementById('gpsStatus');

    try {
      // Pega instituições primeiro (essa operação não depende de GPS)
      const instituicoes = await listarInstituicoes();

      if (instituicoes.length === 0) {
        if (listEl) {
          listEl.innerHTML = `
            <div class="empty-state" style="margin:0;">
              <div class="empty-state__icon">
                <span class="material-symbols-rounded">local_hospital</span>
              </div>
              <div class="empty-state__title">Nenhuma instituição cadastrada</div>
              <div class="empty-state__desc">O administrador precisa cadastrar instituições antes de você fazer check-in.</div>
              ${user.perfil === 'admin' ? '<a href="#/admin/instituicoes" class="btn-auth btn-auth--secondary" style="display:inline-flex;text-decoration:none;width:auto;padding:10px 20px;min-height:auto;">Cadastrar agora</a>' : ''}

        }
        if (gpsEl) {
          gpsEl.outerHTML = `
            <div class="gps-status gps-status--warning" id="gpsStatus">
              <span class="gps-status__icon"><span class="material-symbols-rounded">info</span></span>

                <div class="gps-status__detail">Cadastre instituições primeiro</div>
              </div>
            </div>
          `;
        }
        return;
      }

      // Tenta pegar GPS FRESH (sem cache)
      let userPos = null;
      try {
        userPos = await getGeolocation({ maximumAge: 0, timeout: 15000 });
        CheckinFlow.userPos = userPos;
        if (gpsEl) {
          gpsEl.className = 'gps-status';
          gpsEl.innerHTML = `
            <span class="gps-status__icon"><span class="material-symbols-rounded">gps_fixed</span></span>
            <div class="gps-status__body">
              <div class="gps-status__label">GPS ativo · ±${Math.round(userPos.accuracy)}m</div>
              <div class="gps-status__detail" style="font-family:var(--font-mono);font-size:10.5px;">${userPos.lat.toFixed(5)}, ${userPos.lng.toFixed(5)}</div>
            </div>
            <button type="button" onclick="atualizarGPSManual()" title="Atualizar GPS" style="background:none;border:none;padding:6px;border-radius:50%;cursor:pointer;color:var(--brand-navy);">
              <span class="material-symbols-rounded" style="font-size:18px;">refresh</span>
            </button>
          `;
        }
      } catch (gpsErr) {
        if (gpsEl) {
          gpsEl.className = 'gps-status gps-status--warning';
          gpsEl.innerHTML = `
            <span class="gps-status__icon"><span class="material-symbols-rounded">gps_off</span></span>
            <div class="gps-status__body">
              <div class="gps-status__label">GPS indisponível</div>
              <div class="gps-status__detail">${gpsErr.message}</div>
            </div>
          `;
        }
      }

      // Ordena
      const instComDist = userPos
        ? ordenarPorProximidade(instituicoes, userPos.lat, userPos.lng, CONFIG.GPS_RADIUS_METERS)
        : instituicoes.map(i => ({ ...i, distancia: null, distanciaFmt: '—', dentroDoRaio: false }));

      CheckinFlow.instituicoes = instComDist;

      // Renderiza lista
      if (listEl) {
        const currentUserId = user.id;
        listEl.innerHTML = instComDist.map((inst, i) => {
          const isClosest = i === 0 && userPos;
          const zone = inst.dentroDoRaio ? 'in' : 'out';
          const enderecoCurto = [inst.logradouro, inst.bairro].filter(Boolean).join(' · ') || 'Endereço não informado';
          const ehMinhaPendente = inst.pendente_aprovacao && inst.cadastrada_por === currentUserId;
          const pendingBadge = ehMinhaPendente
            ? `<span onclick="event.preventDefault(); event.stopPropagation(); editarMinhaInstituicaoPendente('${inst.id}');" style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#FEF4E1;color:#92400E;margin-left:6px;cursor:pointer;border:1px solid rgba(245,158,11,0.3);" title="Clique para editar"><span class="material-symbols-rounded" style="font-size:11px;">edit</span>Pendente — editar</span>`
            : inst.pendente_aprovacao
            ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#FEF4E1;color:#92400E;margin-left:6px;"><span class="material-symbols-rounded" style="font-size:11px;">hourglass_top</span>Pendente</span>`
            : '';
          return `
            <a href="#" onclick="selectInstitution('${inst.id}'); return false;" data-id="${inst.id}" class="inst-item${isClosest ? ' inst-item--closest' : ''}">

              </div>
              <div class="inst-item__info">
                <div class="inst-item__name">${inst.nome.replace(/"/g,'&quot;')}${pendingBadge}</div>
                <div class="inst-item__addr">${enderecoCurto.replace(/"/g,'&quot;')}</div>
              </div>
              <div class="inst-item__right">
                <div class="inst-item__dist inst-item__dist--${zone}">${inst.distanciaFmt}</div>
                ${!inst.dentroDoRaio && userPos ? '<div class="inst-item__zone-tag">fora do raio</div>' : ''}
              </div>
            </a>
          `;
        }).join('');
        // Se veio da busca global (?inst=X), destaca e scrolla até o item
        destacarItemDaURL('.inst-item[data-id="%ID%"]', 'inst');
      }
    } catch (err) {
      console.error('[Checkin] Erro:', err);
      if (listEl) {
        listEl.innerHTML = `
          <div class="empty-state" style="margin:0;">
            <div class="empty-state__icon" style="background:var(--status-danger-bg);color:var(--status-danger);">
              <span class="material-symbols-rounded">error</span>
            </div>
            <div class="empty-state__title">Erro ao carregar</div>
            <div class="empty-state__desc">${err.message}</div>
          </div>
        `;
      }
    }
  }, 0);

  return `
    <div class="mobile-app">
      ${mobileTopBar({ title: 'Check-in', showBack: true })}
      <main class="mcontent">
        <div class="gps-status gps-status--warning" id="gpsStatus">
          <span class="gps-status__icon"><span class="material-symbols-rounded">gps_not_fixed</span></span>
          <div class="gps-status__body">
            <div class="gps-status__label">Obtendo localização...</div>
            <div class="gps-status__detail">aguarde um momento</div>
          </div>
        </div>

        <div class="search-bar">
          <span class="material-symbols-rounded search-bar__icon">search</span>
          <input type="text" placeholder="Buscar instituição..." oninput="filterInstitutions(this.value)" />
        </div>

        <div class="list-label">
          <span class="list-label__title">Instituições cadastradas</span>
          <span class="list-label__meta">raio ${CONFIG.GPS_RADIUS_METERS}m</span>
        </div>

        <div class="inst-list" id="instList">
          <div style="padding:20px;text-align:center;color:var(--neutral-500);font-size:13px;">Carregando...</div>
        </div>

        <button class="btn-auth btn-auth--secondary" onclick="cadastrarInstituicaoECheckin()" style="margin-bottom:10px;">
          <span class="material-symbols-rounded" style="font-size:20px;color:var(--brand-lime);">add_location_alt</span>
          Cadastrar nova instituição
        </button>

        <button class="btn-auth btn-auth--secondary" onclick="startManualCheckin()">
          <span class="material-symbols-rounded" style="font-size:20px">edit_location_alt</span>
          Check-in manual (sem GPS)
        </button>
      </main>
      ${bottomNav('checkin')}
    </div>
  `;
}

// Força nova leitura do GPS na tela de check-in (botão refresh).
// Útil quando o profissional acabou de chegar no local e o GPS ainda não atualizou.
window.atualizarGPSManual = async function() {
  const gpsEl = document.getElementById('gpsStatus');
  if (gpsEl) {
    gpsEl.className = 'gps-status';
    gpsEl.innerHTML = `
      <span class="gps-status__icon"><span class="material-symbols-rounded">hourglass_empty</span></span>
      <div class="gps-status__body">
        <div class="gps-status__label">Atualizando GPS...</div>
        <div class="gps-status__detail">aguarde alguns segundos</div>
      </div>
    `;
  }
  try {
    const userPos = await getGeolocation({ maximumAge: 0, timeout: 20000, enableHighAccuracy: true });
    CheckinFlow.userPos = userPos;
    // Reordena a lista de instituições com a nova posição
    const reord = ordenarPorProximidade(CheckinFlow.instituicoes, userPos.lat, userPos.lng, CONFIG.GPS_RADIUS_METERS);
    CheckinFlow.instituicoes = reord;
    if (typeof window.filterInstitutions === 'function') {
      const searchEl = document.querySelector('.search-input input, #searchInput');
      window.filterInstitutions(searchEl ? searchEl.value : '');
    }
    if (gpsEl) {
      gpsEl.innerHTML = `
        <span class="gps-status__icon"><span class="material-symbols-rounded">gps_fixed</span></span>
        <div class="gps-status__body">
          <div class="gps-status__label">GPS ativo · ±${Math.round(userPos.accuracy)}m</div>
          <div class="gps-status__detail" style="font-family:var(--font-mono);font-size:10.5px;">${userPos.lat.toFixed(5)}, ${userPos.lng.toFixed(5)}</div>
        </div>
        <button type="button" onclick="atualizarGPSManual()" title="Atualizar GPS" style="background:none;border:none;padding:6px;border-radius:50%;cursor:pointer;color:var(--brand-navy);">
          <span class="material-symbols-rounded" style="font-size:18px;">refresh</span>
        </button>
      `;
    }
  } catch (err) {
    if (gpsEl) {
      gpsEl.className = 'gps-status gps-status--warning';
      gpsEl.innerHTML = `
        <span class="gps-status__icon"><span class="material-symbols-rounded">gps_off</span></span>
        <div class="gps-status__body">
          <div class="gps-status__label">GPS indisponível</div>
          <div class="gps-status__detail">${err.message}</div>
        </div>
        <button type="button" onclick="atualizarGPSManual()" title="Tentar novamente" style="background:none;border:none;padding:6px;border-radius:50%;cursor:pointer;color:var(--brand-navy);">
          <span class="material-symbols-rounded" style="font-size:18px;">refresh</span>
        </button>
      `;
    }
  }
};

// Cadastra nova instituição direto da tela de check-in (antes mesmo de entrar no modal manual)
window.cadastrarInstituicaoECheckin = async function() {
  const dados = await showModalInstituicaoNova();
  if (!dados) return;
  // Se o profissional tem GPS ativo agora, usa essa posição como coords iniciais da instituição.
  // Admin ajusta depois se necessário (geocoding + revisão manual).
  if (CheckinFlow.userPos) {
    dados.latitude = CheckinFlow.userPos.lat;
    dados.longitude = CheckinFlow.userPos.lng;
  }
  try {
    const nova = await criarInstituicaoSugerida(dados);
    // Se a instituição ficou com coords (GPS do profissional), não precisa ser manual
    CheckinFlow.manual = !nova.latitude;
    CheckinFlow.instituicaoSelecionada = nova;
    window.location.hash = '#/checkin/confirmar';
  } catch (err) {
    await showModalConfirmacao({
      icone: 'error',
      iconeCor: 'danger',
      titulo: 'Não foi possível cadastrar',
      subtitulo: err.message || 'Tente novamente em instantes.',
      btnConfirmar: 'OK',
      btnCancelar: '',
    });
  }
};

// Profissional edita dados de uma instituição que ele cadastrou e que AINDA está pendente.
// Se admin já aprovou, não deixa editar.
window.editarMinhaInstituicaoPendente = async function(id) {
  const user = getCurrentUser();
  if (!user) return;
  // Busca estado atual
  const { data: inst, error } = await db.from('instituicoes').select('*').eq('id', id).single();
  if (error || !inst) {
    await showModalConfirmacao({
      icone: 'error', iconeCor: 'danger',
      titulo: 'Não foi possível carregar',
      subtitulo: error?.message || 'Instituição não encontrada.',
      btnConfirmar: 'OK', btnCancelar: '',
    });
    return;
  }
  // Checagem de segurança dupla: só edita se pendente E foi ele quem cadastrou
  if (!inst.pendente_aprovacao) {
    await showModalConfirmacao({
      icone: 'lock', iconeCor: 'warning',
      titulo: 'Já foi aprovada',
      subtitulo: 'O admin já aprovou esta instituição. Se precisar ajustar algo, fale com ele.',
      btnConfirmar: 'Entendi', btnCancelar: '',
    });
    return;
  }
  if (inst.cadastrada_por !== user.id) {
    await showModalConfirmacao({
      icone: 'block', iconeCor: 'danger',
      titulo: 'Sem permissão',
      subtitulo: 'Você só pode editar instituições que cadastrou.',
      btnConfirmar: 'OK', btnCancelar: '',
    });
    return;
  }
  const novosDados = await showModalInstituicaoNova({ modo: 'edicao', instExistente: inst });
  if (!novosDados) return;
  // Se o profissional tem GPS ativo agora, atualiza as coords também (caso queira refinar)
  const payload = { ...novosDados };
  if (CheckinFlow.userPos) {
    payload.latitude = CheckinFlow.userPos.lat;
    payload.longitude = CheckinFlow.userPos.lng;
  }
  try {
    const { error: upErr } = await db.from('instituicoes').update(payload).eq('id', id);
    if (upErr) throw new Error(upErr.message);
    setFlash('success', 'Dados atualizados. Aguardando aprovação do admin.');
    // Recarrega a listagem da tela de check-in
    if (typeof window.filterInstitutions === 'function') {
      // dispara re-render completo da tela
      window.location.hash = '#/checkin';
    }
  } catch (err) {
    await showModalConfirmacao({
      icone: 'error', iconeCor: 'danger',
      titulo: 'Não foi possível salvar',
      subtitulo: err.message || 'Tente novamente em instantes.',
      btnConfirmar: 'OK', btnCancelar: '',
    });
  }
};

window.filterInstitutions = function(query) {
  const q = query.toLowerCase().trim();
  const listEl = document.getElementById('instList');
  if (!listEl) return;

  const filtered = q
    ? CheckinFlow.instituicoes.filter(i => i.nome.toLowerCase().includes(q) || (i.bairro || '').toLowerCase().includes(q))
    : CheckinFlow.instituicoes;

  if (filtered.length === 0) {
    listEl.innerHTML = `
      <div style="padding:30px 20px;text-align:center;color:var(--neutral-500);">
        <span class="material-symbols-rounded" style="font-size:32px;color:var(--neutral-400);">search_off</span>
        <div style="margin-top:8px;font-size:13px;">Nenhuma instituição encontrada</div>
      </div>
    `;
    return;
  }

  listEl.innerHTML = filtered.map((inst, i) => {
    const zone = inst.dentroDoRaio ? 'in' : 'out';
    const enderecoCurto = [inst.logradouro, inst.bairro].filter(Boolean).join(' · ') || 'Endereço não informado';
    return `
      <a href="#" onclick="selectInstitution('${inst.id}'); return false;" class="inst-item">
        <div class="inst-item__pin inst-item__pin--${zone}">
          <span class="material-symbols-rounded">location_on</span>
        </div>
        <div class="inst-item__info">
          <div class="inst-item__name">${inst.nome.replace(/"/g,'&quot;')}</div>
          <div class="inst-item__addr">${enderecoCurto.replace(/"/g,'&quot;')}</div>
        </div>
        <div class="inst-item__right">
          <div class="inst-item__dist inst-item__dist--${zone}">${inst.distanciaFmt}</div>
          ${!inst.dentroDoRaio && inst.distancia !== null ? '<div class="inst-item__zone-tag">fora do raio</div>' : ''}
        </div>
      </a>
    `;
  }).join('');
};

window.selectInstitution = function(id) {
  const inst = CheckinFlow.instituicoes.find(i => i.id === id);
  if (!inst) return;
  CheckinFlow.instituicaoSelecionada = inst;
  CheckinFlow.manual = false;
  window.location.hash = '#/checkin/confirmar';
};

window.startManualCheckin = async function() {
  // Fluxo manual: seleciona sem GPS
  if (!CheckinFlow.instituicoes || CheckinFlow.instituicoes.length === 0) {
    alert('Ainda não há instituições cadastradas.');
    return;
  }
  CheckinFlow.manual = true;
  // Se só tem uma, já seleciona
  if (CheckinFlow.instituicoes.length === 1) {
    CheckinFlow.instituicaoSelecionada = CheckinFlow.instituicoes[0];
    window.location.hash = '#/checkin/confirmar';
    return;
  }
  // Modal customizado com lista filtrável
  const inst = await showModalSelectInstituicao(CheckinFlow.instituicoes);
  if (!inst) return;
  CheckinFlow.instituicaoSelecionada = inst;
  window.location.hash = '#/checkin/confirmar';
};

// Modal para escolher instituição no check-in manual (sem GPS)
function showModalSelectInstituicao(instituicoes) {
  return new Promise((resolve) => {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal-card" style="max-width:420px;">
        <div class="modal-card__header">
          <div class="modal-card__icon" style="background:#FEF4E1;color:var(--status-warning);">
            <span class="material-symbols-rounded">edit_location_alt</span>
          </div>
          <div class="modal-card__title">Check-in manual</div>
          <div class="modal-card__subtitle">GPS indisponível. Selecione o local da visita — o admin será notificado pra revisão.</div>
        </div>
        <div class="modal-card__body" style="padding-top:4px;">
          <div class="search-bar" style="margin-bottom:10px;">
            <span class="material-symbols-rounded search-bar__icon">search</span>
            <input type="text" id="msiSearch" placeholder="Buscar instituição..." autocomplete="off" />
          </div>
          <div id="msiList" style="max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;"></div>
        </div>
        <div class="modal-card__footer">
          <button class="modal-btn modal-btn--secondary" id="msiCancel" style="width:100%;">Cancelar</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);

    const listEl = backdrop.querySelector('#msiList');
    const searchEl = backdrop.querySelector('#msiSearch');

    const renderList = (q) => {
      const query = (q || '').toLowerCase().trim();
      const filtered = query
        ? instituicoes.filter(i => i.nome.toLowerCase().includes(query) || (i.bairro || '').toLowerCase().includes(query))
        : instituicoes;

      // Botão "cadastrar nova" — aparece sempre; texto muda conforme busca
      const addNewBtn = query
        ? `<button type="button" id="msiAddNew" style="
            display:flex;align-items:center;gap:10px;padding:12px;margin-top:4px;
            border:1.5px dashed var(--brand-lime);border-radius:10px;background:#F4F9EA;
            cursor:pointer;text-align:left;transition:all 140ms;width:100%;
            color:var(--brand-navy);font-weight:700;font-size:13px;font-family:inherit;
          ">
            <span class="material-symbols-rounded" style="font-size:20px;color:var(--brand-lime);">add_location_alt</span>
            <div style="flex:1;">
              <div>Cadastrar "${query.replace(/"/g,'&quot;')}"</div>
              <div style="font-size:11px;font-weight:500;color:var(--neutral-500);margin-top:2px;">O admin completará os dados depois.</div>
            </div>
          </button>`
        : `<button type="button" id="msiAddNew" style="
            display:flex;align-items:center;gap:10px;padding:12px;margin-top:4px;
            border:1.5px dashed var(--neutral-300);border-radius:10px;background:var(--neutral-50);
            cursor:pointer;text-align:left;transition:all 140ms;width:100%;
            color:var(--brand-navy);font-weight:700;font-size:13px;font-family:inherit;
          ">
            <span class="material-symbols-rounded" style="font-size:20px;color:var(--brand-lime);">add_location_alt</span>
            <div style="flex:1;">
              <div>Cadastrar nova instituição</div>
              <div style="font-size:11px;font-weight:500;color:var(--neutral-500);margin-top:2px;">Não está na lista? Cadastre só o nome e siga com o check-in.</div>
            </div>
          </button>`;

      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div style="padding:20px 12px;text-align:center;color:var(--neutral-500);font-size:13px;">
            <span class="material-symbols-rounded" style="font-size:28px;color:var(--neutral-400);display:block;margin-bottom:4px;">search_off</span>
            Nenhuma instituição encontrada
          </div>
          ${addNewBtn}
        `;
      } else {
        listEl.innerHTML = filtered.map(inst => {
          const endereco = `${inst.logradouro || ''}${inst.bairro ? ' · ' + inst.bairro : ''}`;
          const pendingBadge = inst.pendente_aprovacao
            ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#FEF4E1;color:#92400E;margin-left:6px;"><span class="material-symbols-rounded" style="font-size:11px;">hourglass_top</span>Pendente</span>`
            : '';
          return `
            <button type="button" class="msi-item" data-id="${inst.id}" style="
              display:flex;align-items:center;gap:10px;padding:10px 12px;
              border:1.5px solid var(--neutral-200);border-radius:10px;background:var(--neutral-0);
              cursor:pointer;text-align:left;transition:all 140ms;width:100%;
            ">
              <div style="
                width:32px;height:32px;border-radius:50%;flex-shrink:0;
                background:#FEF4E1;color:var(--status-warning);
                display:flex;align-items:center;justify-content:center;
              ">
                <span class="material-symbols-rounded" style="font-size:18px;">location_on</span>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:13.5px;font-weight:700;color:var(--brand-navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${inst.nome.replace(/"/g,'&quot;')}${pendingBadge}</div>
                <div style="font-size:11.5px;color:var(--neutral-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${endereco.replace(/"/g,'&quot;') || '(endereço pendente)'}</div>
              </div>
            </button>
          `;
        }).join('') + addNewBtn;
      }

      listEl.querySelectorAll('.msi-item').forEach(btn => {
        btn.onclick = () => {
          const id = btn.getAttribute('data-id');
          const inst = instituicoes.find(i => String(i.id) === String(id));
          cleanup();
          resolve(inst || null);
        };
        btn.onmouseover = () => { btn.style.background = 'var(--neutral-50)'; btn.style.borderColor = 'var(--brand-navy)'; };
        btn.onmouseout = () => { btn.style.background = 'var(--neutral-0)'; btn.style.borderColor = 'var(--neutral-200)'; };
      });

      const addBtn = listEl.querySelector('#msiAddNew');
      if (addBtn) {
        addBtn.onclick = async () => {
          const nomeSugerido = searchEl.value.trim();
          const dados = await showModalInstituicaoNova({ valorInicialNome: nomeSugerido });
          if (!dados) return;
          try {
            const nova = await criarInstituicaoSugerida(dados);
            cleanup();
            resolve(nova);
          } catch (err) {
            await showModalConfirmacao({
              icone: 'error',
              iconeCor: 'danger',
              titulo: 'Não foi possível cadastrar',
              subtitulo: err.message || 'Tente novamente em instantes.',
              btnConfirmar: 'OK',
              btnCancelar: '',
            });
          }
        };
      }
    };

    renderList('');
    searchEl.oninput = () => renderList(searchEl.value);
    setTimeout(() => searchEl.focus(), 150);

    const cleanup = () => backdrop.remove();
    backdrop.querySelector('#msiCancel').onclick = () => { cleanup(); resolve(null); };
    backdrop.onclick = (e) => { if (e.target === backdrop) { cleanup(); resolve(null); } };
  });
}

      institucaoId: CheckinFlow.instituicaoSelecionada.id,

window.abrirRelatorioDaVisitaAtiva = function() {
  const visitaId = window._activeVisitaId;
  if (!visitaId) return;
  window.location.hash = `#/visitas/relatorio?id=${visitaId}`;
};

window.handleCheckoutAtivo = async function() {
  const visitaId = window._activeVisitaId;
  if (!visitaId) {
    alert('Erro: não encontrei a visita ativa');
    return;
  }

  // Modal de confirmação de checkout
  const confirmou = await showConfirmCheckoutModal();
  if (!confirmou) return;

  try {
    // Pega posição de checkout FRESH (ignora cache, força leitura atual)
    let checkoutPos = null;
    try {
      checkoutPos = await getGeolocation({ timeout: 10000, maximumAge: 0 });
    } catch (e) {
      // continua sem GPS de checkout
      console.warn('[checkout] GPS falhou:', e.message);
    }

    await finalizarCheckin(visitaId, checkoutPos);
    stopTimer();

    // Calcula duração pra mostrar no modal
    const visita = await getVisitaCompleta(visitaId);
    const duracao = calcularDuracaoMin(visita.checkin_timestamp, visita.checkout_timestamp);
    const instName = visita.instituicoes?.nome || 'Instituição';

    // Modal: "Preencher agora ou depois?"
    const escolha = await showPostCheckoutModal({
      instName,
      duracao: formatarDuracao(duracao),
    });

    if (escolha === 'agora') {
      window.location.hash = `#/visitas/relatorio?id=${visitaId}`;
    } else {
      setFlash('success', 'Visita finalizada. Você pode preencher o relatório quando quiser (até 24h).');
      window.location.hash = '#/visitas';
    }
  } catch (err) {
    alert('Erro ao fazer check-out: ' + err.message);
  }
};

            </div>
          </div>

            Você pode preencher em até <strong>24h</strong> após o check-in.
          </div>

        <div class="modal-card__footer">
          <button class="modal-btn modal-btn--primary" id="mpcAgora">
            <span class="material-symbols-rounded">edit_note</span>Preencher agora
          </button>
          <button class="modal-btn modal-btn--secondary" id="mpcDepois">
            Deixar pra depois
          </button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);

    const cleanup = () => backdrop.remove();
    backdrop.querySelector('#mpcAgora').onclick = () => { cleanup(); resolve('agora'); };
    backdrop.querySelector('#mpcDepois').onclick = () => { cleanup(); resolve('depois'); };
  });
}

window.handleCancelarVisita = async function() {
  const ok = await showModalConfirmacao({
    icone: 'cancel',
    iconeCor: 'danger',
    titulo: 'Cancelar visita?',
    subtitulo: 'Você perderá todos os dados preenchidos até agora. Esta ação não pode ser desfeita.',
    btnConfirmar: 'Sim, cancelar',
    btnCancelar: 'Voltar',
  });
  if (!ok) return;
  const visitaId = window._activeVisitaId;
  if (!visitaId) return;

  try {
    await cancelarVisita(visitaId);
    stopTimer();
    setFlash('info', 'Visita cancelada.');
    window.location.hash = '#/inicio';
  } catch (err) {
    alert('Erro ao cancelar: ' + err.message);
  }
};

function renderVisitas() {
  const user = requireAuth();
  if (!user) return '<div class="splash"><div class="splash__spinner"></div></div>';

  setTimeout(async () => {
    const listEl = document.getElementById('visitasList');
    if (!listEl) return;
    try {
      const visitas = await listarMinhasVisitas(50);
      if (visitas.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state" style="margin:0;">
            <div class="empty-state__icon">
              <span class="material-symbols-rounded">assignment</span>
            </div>

            <div class="empty-state__desc">Faça seu primeiro check-in pra começar.</div>
            <a href="#/checkin" class="btn-auth btn-auth--primary" style="display:inline-flex;text-decoration:none;width:auto;padding:12px 24px;min-height:auto;">
              <span class="material-symbols-rounded" style="font-size:20px">my_location</span>

            </a>
          </div>
        `;
      } else {
        listEl.innerHTML = visitas.map(v => `
          <a href="#/visitas/relatorio?id=${v.id}" data-id="${v.id}" class="visits-list__item">

              <div class="visits-list__time">${formatarTempoRelativo(v.data_visita + 'T' + (v.horario_inicio || '00:00:00'))}</div>
            </div>

function renderRelatorio() {
  const user = requireAuth();
  if (!user) return '<div class="splash"><div class="splash__spinner"></div></div>';

  const visitaId = window._routeParams?.id;
  if (!visitaId) {
    setTimeout(() => { window.location.hash = '#/visitas'; }, 0);
    return '<div class="splash"><div class="splash__spinner"></div></div>';
  }

  // Limpa estado
  ReportState.visitaId = visitaId;
  ReportState.visita = null;
  ReportState.profissionaisInstituicao = [];
  ReportState.profissionaisSelecionados = [];
  ReportState.objetivos = [];
  ReportState.objetivosSelecionados = new Set();
  if (ReportState.autoSaveTimer) clearTimeout(ReportState.autoSaveTimer);
  ReportState.pendingChanges = {};

  // Carrega dados async
  setTimeout(async () => {
    try {
      const [visita, objetivos] = await Promise.all([
        getVisitaCompleta(visitaId),
        listarObjetivos(),
      ]);

      ReportState.visita = visita;
      ReportState.objetivos = objetivos;
      ReportState.objetivosSelecionados = new Set(visita.objetivos_selecionados || []);
      ReportState.profissionaisSelecionados = visita.profissionais_selecionados || [];

      // Carrega profissionais da instituição
      const profs = await listarProfissionaisDaInstituicao(visita.instituicao_id);
      ReportState.profissionaisInstituicao = profs;

      hydrateReportForm();
    } catch (err) {
      document.getElementById('reportBody').innerHTML = `
        <div class="empty-state" style="margin:0;">
          <div class="empty-state__icon" style="background:var(--status-danger-bg);color:var(--status-danger);">
            <span class="material-symbols-rounded">error</span>
          </div>
          <div class="empty-state__title">Erro ao carregar</div>
          <div class="empty-state__desc">${err.message}</div>
        </div>
      `;
    }
  }, 0);

  return `
    <div class="mobile-app">
      <header class="mbar">
        <div class="mbar__row">
          <button class="mbar__back" onclick="history.back()">
            <span class="material-symbols-rounded" style="font-size:18px">arrow_back_ios_new</span>
          </button>
          <div class="mbar__title">Relatório</div>
          <span class="save-indicator" id="saveIndicator">
            <span class="material-symbols-rounded">cloud_done</span>
            <span id="saveIndicatorText">Pronto</span>
          </span>
        </div>
      </header>
      <main class="mcontent" id="reportBody">
        <div style="padding:40px 20px;text-align:center;color:var(--neutral-500);font-size:13px;">
          <span class="material-symbols-rounded" style="font-size:32px;color:var(--neutral-400);">hourglass_empty</span>
          <div style="margin-top:8px;">Carregando relatório...</div>
        </div>
      </main>
    </div>
  `;
}

window.handleProfSearch = function(query) {
  const q = query.toLowerCase().trim();
  const dropdown = document.getElementById('profDropdown');
  if (!dropdown) return;

  dropdown.style.display = 'block';

  const selectedIds = new Set(ReportState.profissionaisSelecionados.map(p => p.id));
  const available = ReportState.profissionaisInstituicao.filter(p => !selectedIds.has(p.id));
  const filtered = q
    ? available.filter(p => p.nome.toLowerCase().includes(q) || (p.profissao || '').toLowerCase().includes(q))
    : available;

  // Botão de cadastro — sempre presente no final do dropdown,
  // com texto adaptado ao contexto (busca vazia vs. busca com valor)
  const addNewBtn = q && !ReportState.profissionaisInstituicao.some(p => p.nome.toLowerCase() === q)
    ? `
      <div class="prof-dropdown__add-new" onclick="handleAddNewProf('${q.replace(/'/g, '')}')">
        <span class="material-symbols-rounded">person_add</span>
        Cadastrar "${q}" como novo profissional
      </div>
    `
    : `
      <div class="prof-dropdown__add-new" onclick="handleAddNewProf('')">
        <span class="material-symbols-rounded">person_add</span>
        Cadastrar novo profissional
      </div>
    `;

  // Caso não tenha ninguém cadastrado no hospital
  if (ReportState.profissionaisInstituicao.length === 0) {
    dropdown.innerHTML = `
      <div class="prof-dropdown__empty">Nenhum profissional cadastrado neste hospital.</div>
      ${addNewBtn}
    `;
    return;
  }

  // Caso a busca não retornou resultados
  if (filtered.length === 0) {
    const totalInst = ReportState.profissionaisInstituicao.length;
    const totalSel = ReportState.profissionaisSelecionados.length;
    const todosJaSelecionados = !q && totalInst > 0 && totalSel >= totalInst;
    const mensagem = todosJaSelecionados
      ? `Todos os ${totalInst} ${totalInst === 1 ? 'profissional já foi adicionado' : 'profissionais já foram adicionados'} a esta visita.`
      : 'Nenhum resultado encontrado.';
    dropdown.innerHTML = `
      <div class="prof-dropdown__empty">${mensagem}</div>
      ${addNewBtn}
    `;
    return;
  }

  // Lista de profissionais + botão cadastrar sempre no final
  const itemsHtml = filtered.slice(0, 8).map(p => {
    const profText = p.profissao === 'Outro' ? (p.profissao_outro || 'Outro') : p.profissao;
    return `
      <div class="prof-dropdown-item" onclick="addProfissional('${p.id}')">
        <div class="prof-dropdown-item__avatar">${iniciais(p.nome)}</div>
        <div class="prof-dropdown-item__info">
          <div class="prof-dropdown-item__name">${p.nome.replace(/"/g,'&quot;')}</div>
          <div class="prof-dropdown-item__role">${profText}</div>
        </div>
      </div>
    `;
  }).join('');

  dropdown.innerHTML = itemsHtml + addNewBtn;
};

window.showProfDropdown = function() {
  const inp = document.getElementById('profSearchInput');
  if (inp) window.handleProfSearch(inp.value || '');
};

window.hideProfDropdown = function() {
  const dropdown = document.getElementById('profDropdown');
  if (dropdown) dropdown.style.display = 'none';
};

window.addProfissional = function(id) {
  const p = ReportState.profissionaisInstituicao.find(x => x.id === id);
  if (!p) return;
  if (ReportState.profissionaisSelecionados.some(x => x.id === id)) return;
  ReportState.profissionaisSelecionados.push(p);
  renderProfSelected();
  const inp = document.getElementById('profSearchInput');
  if (inp) inp.value = '';
  window.hideProfDropdown();
  scheduleSyncProfissionais();
};

window.removeProfissional = function(id) {
  ReportState.profissionaisSelecionados = ReportState.profissionaisSelecionados.filter(p => p.id !== id);
  renderProfSelected();
  scheduleSyncProfissionais();
};

window.handleAddNewProf = async function(nomeInicial) {
  try {
    const dados = await showNewProfissionalModal(nomeInicial);
    if (!dados) return; // cancelado

    const novo = await criarProfissional({
      institucaoId: ReportState.visita.instituicao_id,
      nome: dados.nome,
      profissao: dados.profissao,
      telefone: dados.telefone,
      email: dados.email,

    ReportState.profissionaisInstituicao.push(novo);
    ReportState.profissionaisSelecionados.push(novo);
    renderProfSelected();
    const inp = document.getElementById('profSearchInput');
    if (inp) inp.value = '';
    window.hideProfDropdown();
    scheduleSyncProfissionais();
    setFlash('success', `Profissional "${novo.nome}" cadastrado!`);
  } catch (err) {
    alert('Erro ao cadastrar profissional: ' + err.message);
  }
};

// Modal bonito pra cadastro de profissional
function showNewProfissionalModal(nomeInicial) {
  return new Promise((resolve) => {
    const instName = ReportState.visita?.instituicoes?.nome || 'Instituição';
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal-card" style="max-width:440px;">
        <div class="modal-card__header">
          <div class="modal-card__icon">
            <span class="material-symbols-rounded">person_add</span>
          </div>
          <div class="modal-card__title">Novo profissional</div>
          <div class="modal-card__subtitle">${instName.replace(/"/g,'&quot;')}</div>
        </div>
        <div class="modal-card__body">
          <div class="report-field" style="margin-bottom:12px;">
            <label for="mnpNome">Nome completo <span class="report-section__required">*</span></label>
            <input type="text" id="mnpNome" placeholder="Ex: Dra. Ana Silva" value="${(nomeInicial || '').replace(/"/g,'&quot;')}" autocomplete="off" />
          </div>
          <div class="report-field" style="margin-bottom:12px;">
            <label for="mnpProfissao">Profissão <span class="report-section__required">*</span></label>
            <select id="mnpProfissao">
              <option value="Nutricionista">Nutricionista</option>
              <option value="Medico">Médico(a)</option>
              <option value="Farmaceutico">Farmacêutico(a)</option>
              <option value="Enfermeiro">Enfermeiro(a)</option>
              <option value="Comprador">Comprador(a)</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
          <div class="report-row-2" style="margin-bottom:4px;">
            <div class="report-field">
              <label for="mnpTelefone">Telefone</label>
              <input type="text" id="mnpTelefone" placeholder="(11) 99999-9999" autocomplete="off" />
            </div>
            <div class="report-field">
              <label for="mnpEmail">E-mail</label>
              <input type="text" id="mnpEmail" placeholder="nome@email.com" autocomplete="off" />
            </div>
          </div>
          <div style="font-size:11px;color:var(--neutral-500);margin-top:4px;">
            Telefone e e-mail são opcionais.
          </div>
        </div>
        <div class="modal-card__footer">
          <button class="modal-btn modal-btn--primary" id="mnpConfirm">
            <span class="material-symbols-rounded">check_circle</span>Cadastrar profissional
          </button>
          <button class="modal-btn modal-btn--secondary" id="mnpCancel">
            Cancelar
          </button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);

    // Foca no nome se vazio, ou na profissão se nome já preenchido
    setTimeout(() => {
      const nomeInput = backdrop.querySelector('#mnpNome');
      const profInput = backdrop.querySelector('#mnpProfissao');
      if (nomeInput && !nomeInput.value.trim()) {
        nomeInput.focus();
      } else if (profInput) {
        profInput.focus();
      }
    }, 150);

    // Máscara simples pra telefone
    const telInput = backdrop.querySelector('#mnpTelefone');
    telInput.addEventListener('input', (e) => {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length > 10) {
        v = v.replace(/^(\d{2})(\d{5})(\d{0,4}).*/, '($1) $2-$3');
      } else if (v.length > 6) {
        v = v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
      } else if (v.length > 2) {
        v = v.replace(/^(\d{2})(\d{0,5}).*/, '($1) $2');
      } else if (v.length > 0) {
        v = v.replace(/^(\d{0,2}).*/, '($1');
      }
      e.target.value = v;
    });

    const cleanup = () => backdrop.remove();

    backdrop.querySelector('#mnpConfirm').onclick = () => {
      const nome = backdrop.querySelector('#mnpNome').value.trim();
      const profissao = backdrop.querySelector('#mnpProfissao').value;
      const telefone = backdrop.querySelector('#mnpTelefone').value.trim();
      const email = backdrop.querySelector('#mnpEmail').value.trim();

      if (!nome) {
        alert('Nome é obrigatório.');
        backdrop.querySelector('#mnpNome').focus();
        return;
      }
      if (email && !/\S+@\S+\.\S+/.test(email)) {
        alert('E-mail inválido.');
        backdrop.querySelector('#mnpEmail').focus();
        return;
      }

      cleanup();
      resolve({ nome, profissao, telefone: telefone || null, email: email || null });
    };

    backdrop.querySelector('#mnpCancel').onclick = () => {
      cleanup();
      resolve(null);
    };

    // Enter no nome/telefone/email confirma
    backdrop.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
        e.preventDefault();
        backdrop.querySelector('#mnpConfirm').click();
      }
      if (e.key === 'Escape') {
        cleanup();
        resolve(null);
      }
    });

    // Clicar fora do card fecha
    backdrop.onclick = (e) => {
      if (e.target === backdrop) {
        cleanup();
        resolve(null);
      }
    };
  });
}

window.setRealizada = function(valor) {
  ReportState.pendingChanges.visita_realizada = valor;
  // Atualiza visual
  document.getElementById('btnRealizadaSim').classList.toggle('is-selected', valor === true);
  document.getElementById('btnRealizadaNao').classList.toggle('is-selected', valor === false);
