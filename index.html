/* Section heading */
.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-head h2 {
  margin: 0;
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--brand-navy);
}
.section-head a, .section-head button {
  background: none;
  border: 0;
  cursor: pointer;
  color: #689628;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
}

/* Visits list (recent) */
.visits-list {
  background: var(--neutral-0);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(10,31,92,0.05);
}
.visits-list__item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--neutral-100);
  text-decoration: none;
  color: inherit;
}
.visits-list__item:last-child { border-bottom: 0; }
.visits-list__icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: #F3F5FA;
  color: var(--brand-navy);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.visits-list__icon .material-symbols-rounded { font-size: 20px; }
.visits-list__info { flex: 1; min-width: 0; }
.visits-list__name {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--brand-navy);
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.visits-list__time {
  font-size: 11.5px;
  color: var(--neutral-500);
  margin-top: 2px;
  font-family: var(--font-mono);
}

/* Status badge */
.sbadge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 22px;
  padding: 0 9px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.01em;
  font-family: var(--font-body);
  white-space: nowrap;
}
.sbadge__dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.sbadge--approved { background: var(--status-success-bg); color: #15803D; }
.sbadge--approved .sbadge__dot { background: var(--status-success); }
.sbadge--pending { background: #FEF4E1; color: #B45309; }
.sbadge--pending .sbadge__dot { background: var(--status-warning); }
.sbadge--review { background: #E4ECFD; color: #1D4ED8; }
.sbadge--review .sbadge__dot { background: var(--status-info); }
.sbadge--review-req { background: #FEF4E1; color: #B45309; }
.sbadge--review-req .sbadge__dot { background: var(--status-warning); }
.sbadge--rejected { background: var(--status-danger-bg); color: #B91C1C; }
.sbadge--rejected .sbadge__dot { background: var(--status-danger); }
.sbadge--draft { background: var(--neutral-100); color: var(--neutral-600); }
.sbadge--draft .sbadge__dot { background: var(--neutral-400); }
.sbadge--inprogress { background: #F4F9EA; color: #689628; }
.sbadge--inprogress .sbadge__dot { background: var(--brand-lime); }

/* ==========================================================================
   CHECK-IN
   ========================================================================== */

/* GPS status */
.gps-status {
  background: var(--status-success-bg);
  border: 1px solid rgba(34,160,107,0.2);
  border-radius: 12px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.gps-status--warning {
  background: #FEF4E1;
  border-color: rgba(245,158,11,0.3);
}
.gps-status--danger {
  background: var(--status-danger-bg);
  border-color: rgba(220,38,38,0.2);
}
.gps-status__icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--status-success);
  color: var(--neutral-0);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.gps-status--warning .gps-status__icon { background: var(--status-warning); }
.gps-status--danger .gps-status__icon { background: var(--status-danger); }
.gps-status__icon .material-symbols-rounded { font-size: 16px; }
.gps-status__body { flex: 1; min-width: 0; }
.gps-status__label {
  font-size: 13px;
  font-weight: 600;
  color: #15803D;
  font-family: var(--font-body);
}
.gps-status--warning .gps-status__label { color: #B45309; }
.gps-status--danger .gps-status__label { color: #B91C1C; }
.gps-status__detail {
  font-size: 11.5px;
  color: #166534;
  font-family: var(--font-mono);
}
.gps-status--warning .gps-status__detail { color: #92400E; }
.gps-status--danger .gps-status__detail { color: #991B1B; }

/* Search bar */
.search-bar {
  background: var(--neutral-0);
  border: 1.5px solid var(--neutral-200);
  border-radius: 12px;
  height: 48px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}
.search-bar:focus-within {
  border-color: var(--brand-lime);
  box-shadow: 0 0 0 3px rgba(139,198,63,0.2);
}
.search-bar input {
  flex: 1;
  border: 0;
  outline: 0;
  background: transparent;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--brand-navy);
}
.search-bar__icon {
  color: var(--neutral-500);
  font-size: 20px;
}

/* List label */
.list-label {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
}
.list-label__title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--neutral-500);
}
.list-label__meta {
  font-size: 11px;
  font-weight: 600;
  color: var(--neutral-500);
  font-family: var(--font-mono);
}

/* Institution list */
.inst-list {
  background: var(--neutral-0);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(10,31,92,0.05);
  margin-bottom: 18px;
}
.inst-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  border-bottom: 1px solid var(--neutral-100);
  cursor: pointer;
  background: var(--neutral-0);
  border-left: 3px solid transparent;
  text-decoration: none;
  color: inherit;
  transition: background 140ms;
}
.inst-item:last-child { border-bottom: 0; }
.inst-item:hover { background: #F9FBF5; }
.inst-item--closest {
  background: #F4F9EA;
  border-left-color: var(--brand-lime);
}
.inst-item__pin {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--neutral-0);
}
.inst-item__pin .material-symbols-rounded { font-size: 22px; }
.inst-item__pin--in {
  background: var(--status-success);
  box-shadow: 0 4px 10px rgba(34,160,107,0.3);
}
.inst-item__pin--out {
  background: var(--status-warning);
  box-shadow: 0 4px 10px rgba(245,158,11,0.3);
}
.inst-item__info { flex: 1; min-width: 0; }
.inst-item__name {
  font-family: var(--font-display);
  font-size: 14.5px;
  font-weight: 600;
  color: var(--brand-navy);
  line-height: 1.2;
}
.inst-item__addr {
  font-size: 11.5px;
  color: var(--neutral-500);
  margin-top: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.inst-item__right {
  text-align: right;
  flex-shrink: 0;
}
.inst-item__dist {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
}
.inst-item__dist--in { color: var(--status-success); }
.inst-item__dist--out { color: var(--status-warning); }
.inst-item__zone-tag {
  font-size: 9.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-top: 2px;
  color: var(--status-warning);
}

/* Empty state */
.empty-state {
  background: var(--neutral-0);
  border: 1px dashed var(--neutral-300);
  border-radius: 14px;
  padding: 32px 20px;
  text-align: center;
  margin-bottom: 18px;
}
.empty-state__icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--neutral-100);
  color: var(--neutral-500);
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.empty-state__icon .material-symbols-rounded { font-size: 28px; }
.empty-state__title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--brand-navy);
  margin-bottom: 6px;
}
.empty-state__desc {
  font-size: 13px;
  color: var(--neutral-600);
  margin-bottom: 16px;
  line-height: 1.45;
}

/* Mini map (confirmation) */
.mini-map {
  height: 180px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  background: linear-gradient(135deg, #E9EEF5 0%, #F3F5FA 100%);
  margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(10,31,92,0.08);
  border: 1px solid var(--neutral-200);
}

.mini-map__legend {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(255,255,255,0.92);
  padding: 6px 10px;
  border-radius: 8px;
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--neutral-600);
  font-family: var(--font-body);
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.mini-map__legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.mini-map__legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* Confirmation card */
.confirm-card {
  background: var(--neutral-0);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 4px 12px rgba(10,31,92,0.06);
}
.confirm-card__top {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 14px;
}
.confirm-card__icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--brand-navy);
  color: var(--neutral-0);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.confirm-card__icon .material-symbols-rounded { font-size: 22px; }
.confirm-card__name {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  color: var(--brand-navy);
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.confirm-card__addr {
  font-size: 12.5px;
  color: var(--neutral-600);
  margin-top: 4px;
  line-height: 1.4;
}
.confirm-card__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding-top: 14px;
  border-top: 1px solid var(--neutral-100);
}
.confirm-card__label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--neutral-500);
}
.confirm-card__value {
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.confirm-card__dist {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--status-success);
}
.confirm-card__dist--out { color: var(--status-warning); }
.confirm-card__time {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--brand-navy);
  letter-spacing: -0.02em;
  margin-top: 2px;
}
.confirm-card__hint {
  font-size: 10.5px;
  color: var(--neutral-500);
  margin-top: 2px;
}

/* Select objective */
.objective-select {
  background: var(--neutral-0);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 12px rgba(10,31,92,0.06);
}
.objective-select__label {
  font-size: 13px;
  font-weight: 600;
  color: var(--neutral-700);
  margin-bottom: 8px;
  display: block;
}
.objective-select select {
  width: 100%;
  height: 48px;
  padding: 0 14px;
  border: 1.5px solid var(--neutral-300);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--brand-navy);
  background: var(--neutral-0);
  outline: 0;
  cursor: pointer;
}
.objective-select select:focus {
  border-color: var(--brand-lime);
  box-shadow: 0 0 0 3px rgba(139,198,63,0.2);
}
.objective-select textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--neutral-300);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--brand-navy);
  background: var(--neutral-0);
  outline: 0;
  resize: vertical;
  min-height: 80px;
  margin-top: 8px;
}
.objective-select textarea:focus {
  border-color: var(--brand-lime);
  box-shadow: 0 0 0 3px rgba(139,198,63,0.2);
}

/* Confirm giant button */
.btn-confirm {
  width: 100%;
  min-height: 64px;
  padding: 16px 24px;
  border-radius: var(--radius-pill);
  border: 0;
  background: linear-gradient(180deg, var(--brand-lime) 0%, #689628 100%);
  color: var(--neutral-0);
  box-shadow: 0 10px 28px rgba(139,198,63,0.4), inset 0 1.5px 0 rgba(255,255,255,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
  transition: transform 120ms ease-out;
}
.btn-confirm:active:not(:disabled) { transform: scale(0.98); }
.btn-confirm:disabled {
  background: var(--neutral-300);
  color: var(--neutral-500);
  box-shadow: none;
  cursor: not-allowed;
}

/* Danger giant button */
.btn-danger-giant {
  width: 100%;
  min-height: 64px;
  padding: 16px 24px;
  border-radius: var(--radius-pill);
  border: 0;
  background: linear-gradient(180deg, #E94B4B 0%, var(--status-danger) 100%);
  color: var(--neutral-0);
  box-shadow: 0 10px 28px rgba(220,38,38,0.35), inset 0 1.5px 0 rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.01em;
  transition: transform 120ms ease-out;
}
.btn-danger-giant:active { transform: scale(0.98); }

/* Cancel link */
.btn-cancel-link {
  background: none;
  border: 0;
  cursor: pointer;
  color: var(--neutral-600);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  padding: 10px 20px;
  display: block;
  margin: 0 auto;
  width: fit-content;
}
.btn-cancel-link:hover { color: var(--status-danger); }

/* Active visit card */
.active-card {
  background: var(--neutral-0);
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 4px 12px rgba(10,31,92,0.06);
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  border-left: 4px solid var(--brand-lime);
}
.active-card__icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: #F4F9EA;
  color: #689628;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.active-card__icon .material-symbols-rounded { font-size: 20px; }
.active-card__info { flex: 1; min-width: 0; }
.active-card__name {
  font-family: var(--font-display);
  font-size: 14.5px;
  font-weight: 600;
  color: var(--brand-navy);
  line-height: 1.25;
}
.active-card__started {
  font-size: 12px;
  color: var(--neutral-500);
  margin-top: 2px;
  font-family: var(--font-body);
}
.active-card__time {
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--brand-navy);
}

/* Timer (giant) */
.timer {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 20px 0;
}
.timer__label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--neutral-500);
}
.timer__value {
  font-family: var(--font-mono);
  font-size: 72px;
  font-weight: 700;
  color: var(--brand-navy);
  letter-spacing: -0.04em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 2px 0 rgba(10,31,92,0.04);
}
.timer__status {
  margin-top: 6px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  background: #F4F9EA;
  color: #689628;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.02em;
  font-family: var(--font-body);
}
.timer__status--out {
  background: #FEF4E1;
  color: #B45309;
}
.timer__status .material-symbols-rounded { font-size: 15px; }

/* Screen content (when mobile content needs flex for vertical fill) */
.mcontent--flex {
  display: flex;
  flex-direction: column;
}

/* ==========================================================================
   FAB (Floating Action Button) — seed de instituições
   ========================================================================== */
.seed-helper {
  position: fixed;
  bottom: 90px;
  right: 16px;
  max-width: 480px;
  z-index: 35;
}

/* ==========================================================================
   RELATÓRIO DE VISITA (Sprint 2.3)
   ========================================================================== */

/* Indicador de auto-save no header */
.save-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  background: rgba(255,255,255,0.08);
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
  font-family: var(--font-body);
  white-space: nowrap;
  transition: opacity 300ms, background 300ms;
}
.save-indicator .material-symbols-rounded { font-size: 14px; }
.save-indicator--saving { background: rgba(245,158,11,0.2); color: #FCD34D; }
.save-indicator--saved  { background: rgba(139,198,63,0.2); color: #C8E68C; }
.save-indicator--error  { background: rgba(220,38,38,0.2); color: #FCA5A5; }

/* Card de info da visita (readonly no topo do relatório) */
.report-info {
  background: linear-gradient(135deg, #F3F5FA 0%, #E3E7F1 100%);
  border: 1px solid #E3E7F1;
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 18px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.report-info__icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--brand-navy);
  color: var(--neutral-0);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.report-info__icon .material-symbols-rounded { font-size: 22px; }
.report-info__body { flex: 1; min-width: 0; }
.report-info__name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--brand-navy);
  line-height: 1.25;
}
.report-info__meta {
  font-size: 12px;
  color: var(--neutral-600);
  margin-top: 4px;
  font-family: var(--font-mono);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.report-info__meta-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.report-info__meta-item .material-symbols-rounded {
  font-size: 13px;
  color: var(--neutral-500);
}

/* Aviso de 24h */
.report-lock-warning {
  background: #FEF4E1;
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 16px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 12.5px;
  color: #92400E;
  line-height: 1.4;
}
.report-lock-warning .material-symbols-rounded {
  font-size: 20px;
  color: var(--status-warning);
  flex-shrink: 0;
}
.report-lock-warning strong { font-weight: 700; }

/* Seção do relatório */
.report-section {
  background: var(--neutral-0);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(10,31,92,0.05);
}
.report-section__title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--brand-navy);
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}
.report-section__title .material-symbols-rounded {
  font-size: 18px;
  color: #689628;
}
.report-section__required {
  color: var(--status-danger);
  font-weight: 700;
  margin-left: 2px;
}
.report-section__help {
  font-size: 11.5px;
  color: var(--neutral-500);
  margin-bottom: 10px;
  line-height: 1.4;
}

/* Linha de dois inputs (horários) */
.report-row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.report-field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--neutral-500);
  margin-bottom: 4px;
}
.report-field input[type="time"],
.report-field input[type="date"],
.report-field input[type="text"],
.report-field input[type="number"],
.report-field select {
  width: 100%;
  height: 44px;
  padding: 0 12px;
  border: 1.5px solid var(--neutral-300);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--brand-navy);
  background: var(--neutral-0);
  outline: 0;
}
.report-field input[type="time"] {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 16px;
}
.report-field input:focus,
.report-field select:focus,
.report-field textarea:focus {
  border-color: var(--brand-lime);
  box-shadow: 0 0 0 3px rgba(139,198,63,0.2);
}
.report-field textarea {
  width: 100%;
  padding: 12px;
  border: 1.5px solid var(--neutral-300);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--brand-navy);
  background: var(--neutral-0);
  outline: 0;
  resize: vertical;
  min-height: 100px;
  line-height: 1.5;
}

/* Aviso de margem de horário divergente */
.time-warning {
  background: var(--status-danger-bg);
  border: 1px solid rgba(220,38,38,0.2);
  border-radius: 8px;
  padding: 8px 12px;
  margin-top: 10px;
  font-size: 11.5px;
  color: #991B1B;
  display: flex;
  gap: 6px;
  align-items: flex-start;
  line-height: 1.4;
}
.time-warning .material-symbols-rounded {
  font-size: 16px;
  flex-shrink: 0;
  color: var(--status-danger);
}

/* Toggle Sim/Não */
.toggle-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.toggle-btn {
  padding: 12px;
  border: 1.5px solid var(--neutral-300);
  border-radius: 12px;
  background: var(--neutral-0);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--neutral-600);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 140ms;
}
.toggle-btn .material-symbols-rounded { font-size: 18px; }
.toggle-btn:hover { background: var(--neutral-50); }
.toggle-btn.is-selected {
  background: var(--brand-lime);
  border-color: var(--brand-lime);
  color: var(--neutral-0);
  box-shadow: 0 4px 10px rgba(139,198,63,0.35);
}
.toggle-btn.is-selected--no {
  background: var(--status-danger);
  border-color: var(--status-danger);
  box-shadow: 0 4px 10px rgba(220,38,38,0.25);
}

/* Profissionais (tags removíveis) */
.prof-search {
  position: relative;
  margin-bottom: 10px;
}
.prof-search-input {
  width: 100%;
  height: 44px;
  padding: 0 12px 0 40px;
  border: 1.5px solid var(--neutral-300);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--brand-navy);
  background: var(--neutral-0);
  outline: 0;
}
.prof-search-input:focus {
  border-color: var(--brand-lime);
  box-shadow: 0 0 0 3px rgba(139,198,63,0.2);
}
.prof-search__icon {
  position: absolute;
  top: 50%;
  left: 12px;
  transform: translateY(-50%);
  color: var(--neutral-500);
  font-size: 18px;
  pointer-events: none;
}
.prof-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--neutral-0);
  border: 1px solid var(--neutral-200);
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(10,31,92,0.12);
  max-height: 240px;
  overflow-y: auto;
  z-index: 20;
  margin-top: 4px;
}
.prof-dropdown-item {
  padding: 10px 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--neutral-100);
  display: flex;
  align-items: center;
  gap: 10px;
}
.prof-dropdown-item:last-child { border-bottom: 0; }
.prof-dropdown-item:hover { background: #F4F9EA; }
.prof-dropdown-item__avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #F3F5FA;
  color: var(--brand-navy);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.prof-dropdown-item__info { flex: 1; min-width: 0; }
.prof-dropdown-item__name {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--brand-navy);
  line-height: 1.2;
}
.prof-dropdown-item__role {
  font-size: 11.5px;
  color: var(--neutral-500);
  margin-top: 2px;
}
.prof-dropdown__empty {
  padding: 16px;
  text-align: center;
  font-size: 12.5px;
  color: var(--neutral-500);
}
.prof-dropdown__add-new {
  padding: 10px 12px;
  background: #F4F9EA;
  color: #689628;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.prof-dropdown__add-new:hover { background: #E7F3D4; }

.prof-selected {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}
.prof-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px 6px 10px;
  background: #F4F9EA;
  border: 1px solid rgba(139,198,63,0.3);
  border-radius: var(--radius-pill);
  font-size: 12.5px;
  color: #689628;
  font-weight: 600;
}
.prof-chip__role {
  font-size: 10.5px;
  color: #8BA764;
  font-weight: 500;
  margin-left: -2px;
}
.prof-chip__remove {
  background: rgba(104,150,40,0.2);
  border: 0;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #689628;
}
.prof-chip__remove:hover { background: rgba(104,150,40,0.35); }
.prof-chip__remove .material-symbols-rounded { font-size: 12px; }

/* Objetivos (checkboxes) */
.objective-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
}
.objective-check {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: 1.5px solid var(--neutral-200);
  border-radius: 10px;
  cursor: pointer;
  transition: all 140ms;
}
.objective-check:hover { background: var(--neutral-50); }
.objective-check.is-selected {
  background: #F4F9EA;
  border-color: var(--brand-lime);
}
.objective-check__box {
  width: 22px;
  height: 22px;
  border: 2px solid var(--neutral-300);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 140ms;
}
.objective-check.is-selected .objective-check__box {
  background: var(--brand-lime);
  border-color: var(--brand-lime);
  color: var(--neutral-0);
}
.objective-check__box .material-symbols-rounded {
  font-size: 16px;
  opacity: 0;
}
.objective-check.is-selected .objective-check__box .material-symbols-rounded { opacity: 1; }
.objective-check.is-disabled {
  cursor: not-allowed;
  opacity: 0.55;
  pointer-events: none;
}
.objective-check.is-disabled:hover { background: transparent; }
.objective-check__label {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--brand-navy);
}

/* ==========================================================================
   MODAL (post-checkout choice + mini-cadastro profissional)
   ========================================================================== */

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10,31,92,0.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 160ms ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-card {
  background: var(--neutral-0);
  border-radius: 18px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(10,31,92,0.3);
  overflow: hidden;
  animation: slideUp 220ms cubic-bezier(0.22,0.61,0.36,1);
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-card__header {
  padding: 22px 22px 0;
  text-align: center;
}
.modal-card__icon {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #F4F9EA;
  color: #689628;
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-card__icon .material-symbols-rounded { font-size: 32px; }
.modal-card__icon--success {
  background: var(--status-success-bg);
  color: var(--status-success);
}
.modal-card__title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--brand-navy);
  letter-spacing: -0.02em;
}
.modal-card__subtitle {
  font-size: 13.5px;
  color: var(--neutral-600);
  margin-top: 6px;
  line-height: 1.45;
}
.modal-card__body { padding: 18px 22px; }
.modal-card__footer {
  padding: 0 22px 22px;
  display: flex;
  gap: 10px;
  flex-direction: column;
}
.modal-btn {
  width: 100%;
  padding: 14px 18px;
  border-radius: var(--radius-pill);
  border: 0;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 120ms;
}
.modal-btn:active { transform: scale(0.98); }
.modal-btn--primary {
  background: linear-gradient(180deg, var(--brand-lime) 0%, #689628 100%);
  color: var(--neutral-0);
  box-shadow: 0 6px 16px rgba(139,198,63,0.35);
}
.modal-btn--secondary {
  background: var(--neutral-0);
  color: var(--brand-navy);
  border: 1.5px solid var(--neutral-300);
}

/* Mini-stats cards no modal */
.modal-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 4px;
}
.modal-stat {
  background: #F3F5FA;
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
}
.modal-stat__label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--neutral-500);
}
.modal-stat__value {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--brand-navy);
  margin-top: 4px;
  letter-spacing: -0.02em;
}

/* Completa (readonly view) */
.readonly-value {
  padding: 10px 12px;
  background: var(--neutral-50);
  border: 1px solid var(--neutral-100);
  border-radius: 8px;
  font-size: 14px;
  color: var(--brand-navy);
  white-space: pre-wrap;
  line-height: 1.5;
}
.readonly-value--empty {
  color: var(--neutral-400);
  font-style: italic;
}

/* Link em visita ativa "Adicionar detalhes" */
.btn-add-details {
  width: 100%;
  padding: 12px 20px;
  background: var(--neutral-0);
  border: 1.5px solid var(--brand-navy);
  border-radius: var(--radius-pill);
  color: var(--brand-navy);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-decoration: none;
}
.btn-add-details:hover { background: var(--neutral-50); }

/* ==========================================================================
   FILA DE REVISÃO (Admin — Sprint 3)
   ========================================================================== */

/* Tabs de filtro (Todas / Flags / Em revisão / Resolvidas) */
.review-tabs {
  display: flex;
  gap: 4px;
  background: var(--neutral-100);
  padding: 4px;
  border-radius: 12px;
  margin-bottom: 16px;
}
.review-tab {
  flex: 1;
  background: transparent;
  border: 0;
  padding: 8px 10px;
  border-radius: 9px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  color: var(--neutral-600);
  cursor: pointer;
  transition: all 140ms;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  white-space: nowrap;
}
.review-tab:hover:not(.is-active) { background: var(--neutral-0); color: var(--brand-navy); }
.review-tab.is-active {
  background: var(--neutral-0);
  color: var(--brand-navy);
  box-shadow: 0 2px 6px rgba(10,31,92,0.08);
}
.review-tab__count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 999px;
  background: var(--neutral-200);
  color: var(--neutral-600);
  font-size: 10px;
  font-weight: 700;
}
.review-tab.is-active .review-tab__count {
  background: var(--brand-lime);
  color: var(--neutral-0);
}

/* Calendário semanal da agenda admin (Sprint 7 Mini 2b) */
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* Pulse de destaque pra item vindo de busca global (Sprint 8) */
@keyframes buscaPulse {
  0%   { box-shadow: 0 0 0 0 rgba(245,158,11,0.45); background: #FEF4E1; }
  40%  { box-shadow: 0 0 0 14px rgba(245,158,11,0); background: #FEF4E1; }
  100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); background: transparent; }
}
.busca-destaque {
  animation: buscaPulse 2.2s ease-out 1;
  border-radius: 12px;
}
.ag-cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
  padding: 10px 12px;
  background: var(--neutral-0);
  border: 1px solid var(--neutral-200);
  border-radius: 10px;
}
.ag-cal-nav__label {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--brand-navy);
  font-size: 13px;
  text-align: center;
  flex: 1;
}
.ag-cal-nav__btn {
  background: transparent;
  border: 1.5px solid var(--neutral-300);
  border-radius: 8px;
  padding: 6px 8px;
  cursor: pointer;
  color: var(--brand-navy);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 140ms;
}
.ag-cal-nav__btn:hover { background: var(--neutral-100); border-color: var(--neutral-400); }
.ag-cal-nav__btn--today {
  background: var(--brand-navy);
  color: #fff;
  border-color: var(--brand-navy);
  font-family: var(--font-body);
  font-size: 11.5px;
  font-weight: 700;
  padding: 6px 12px;
}
.ag-cal-nav__btn--today:hover { background: var(--brand-navy); opacity: .9; }
.ag-cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.ag-cal-day {
  background: var(--neutral-0);
  border: 1px solid var(--neutral-200);
  border-radius: 8px;
  padding: 8px 6px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.ag-cal-day--today {
  border-color: var(--brand-lime);
  border-width: 2px;
  background: #F9FBF5;
}
.ag-cal-day--passado {
  opacity: 0.55;
}
.ag-cal-day__header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 4px;
  padding-bottom: 4px;
  border-bottom: 1px dashed var(--neutral-200);
  margin-bottom: 2px;
  cursor: pointer;
  border-radius: 4px;
  padding: 2px 4px 5px;
  transition: background 140ms;
}
.ag-cal-day__header:hover { background: var(--neutral-100); }
.ag-cal-day__dia-sem {
  font-family: var(--font-body);
  font-weight: 700;
  color: var(--neutral-500);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.ag-cal-day__dia-num {
  font-family: var(--font-display);
  font-weight: 800;
  color: var(--brand-navy);
  font-size: 15px;
}
.ag-cal-day--today .ag-cal-day__dia-num {
  color: var(--brand-lime-dark, #689628);
}
.ag-cal-entry {
  background: #F3F5FA;
  border-left: 3px solid var(--brand-navy);
  border-radius: 4px;
  padding: 4px 5px;
  cursor: pointer;
  font-size: 10.5px;
  line-height: 1.25;
  transition: background 140ms;
}
.ag-cal-entry:hover { background: #E8EDF5; }
.ag-cal-entry--sugerida {
  background: #FEF4E1;
  border-left-color: var(--status-warning);
}
.ag-cal-entry--sugerida:hover { background: #FCEBC6; }
.ag-cal-entry__hora {
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--brand-navy);
  font-size: 10px;
}
.ag-cal-entry__prof {
  color: var(--neutral-700);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ag-cal-empty {
  color: var(--neutral-400);
  font-size: 10px;
  text-align: center;
  padding-top: 8px;
  font-style: italic;
}

/* Responsivo: em telas pequenas, calendário vira scroll horizontal */
@media (max-width: 540px) {
  .ag-cal-grid {
    grid-template-columns: repeat(7, minmax(110px, 1fr));
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .ag-cal-day { min-height: 130px; }
}

/* Seção "por profissional" */
.ag-prof-group {
  margin-bottom: 18px;
  background: var(--neutral-0);
  border: 1px solid var(--neutral-200);
  border-radius: 12px;
  overflow: hidden;
}
.ag-prof-group__header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--neutral-50);
  border-bottom: 1px solid var(--neutral-200);
}
.ag-prof-group__avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--brand-navy);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  flex-shrink: 0;
}
.ag-prof-group__nome {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--brand-navy);
  font-size: 14px;
  flex: 1;
}
.ag-prof-group__count {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--neutral-0);
  color: var(--neutral-700);
  padding: 3px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  border: 1px solid var(--neutral-200);
}
.ag-prof-group__body {
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Filtros secundários (nutricionista, instituição) */
.review-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.review-filter-select {
  flex: 1;
  min-width: 120px;
  height: 40px;
  padding: 0 12px;
  border: 1.5px solid var(--neutral-200);
  border-radius: 10px;
  background: var(--neutral-0);
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--brand-navy);
  outline: 0;
  cursor: pointer;
}
.review-filter-select:focus {
  border-color: var(--brand-lime);
  box-shadow: 0 0 0 3px rgba(139,198,63,0.2);
}

/* Card de visita na fila */
.review-card {
  background: var(--neutral-0);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(10,31,92,0.05);
  cursor: pointer;
  transition: transform 140ms, box-shadow 140ms;
  border-left: 4px solid transparent;
  text-decoration: none;
  color: inherit;
  display: block;
}
.review-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(10,31,92,0.1);
}
.review-card--critical { border-left-color: var(--status-danger); }
.review-card--warning  { border-left-color: var(--status-warning); }
.review-card--info     { border-left-color: var(--status-info); }
.review-card--in-review { border-left-color: var(--status-info); background: linear-gradient(90deg, rgba(37,99,235,0.04) 0%, var(--neutral-0) 100%); }

.review-card__header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}
.review-card__icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: #F3F5FA;
  color: var(--brand-navy);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.review-card__icon .material-symbols-rounded { font-size: 22px; }
.review-card__info { flex: 1; min-width: 0; }
.review-card__inst {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--brand-navy);
  line-height: 1.25;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.review-card__meta {
  font-size: 12px;
  color: var(--neutral-500);
  margin-top: 3px;
  font-family: var(--font-body);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.review-card__meta-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.review-card__meta-item .material-symbols-rounded {
  font-size: 13px;
  color: var(--neutral-400);
}

/* Grupo de flags */
.review-flags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}
.review-flag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: var(--radius-pill);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.02em;
  font-family: var(--font-body);
  white-space: nowrap;
}
.review-flag .material-symbols-rounded { font-size: 12px; }
.review-flag--critical { background: var(--status-danger-bg); color: #B91C1C; }
.review-flag--warning  { background: #FEF4E1; color: #B45309; }
.review-flag--info     { background: #E4ECFD; color: #1D4ED8; }

/* Badge de contagem de flags (no canto direito do card) */
.review-card__flag-count {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
}
.review-card__flag-count--critical { background: var(--status-danger-bg); color: var(--status-danger); }
.review-card__flag-count--warning  { background: #FEF4E1; color: var(--status-warning); }

async function testConnection() {
  if (!db) return;
  try {
    const tabelasEsperadas = [
      'usuarios', 'instituicoes', 'profissionais', 'visitas',
      'visitas_agendadas', 'objetivos_visita', 'configuracoes_sistema',

/* ==========================================================================
   AUTH — Hash, login, sessão, logout, guards
   ========================================================================== */

// SHA-256 usando Web Crypto API nativa (igual CC HAC)
async function hashSenha(senha) {
  const buf = new TextEncoder().encode(senha);
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hashBuf))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

// Máscaras
function maskCPF(v) {
  v = (v || '').replace(/\D/g, '').slice(0, 11);
  if (v.length > 9) return `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6,9)}-${v.slice(9)}`;
  if (v.length > 6) return `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6)}`;
  if (v.length > 3) return `${v.slice(0,3)}.${v.slice(3)}`;
  return v;
}
function maskPhone(v) {
  v = (v || '').replace(/\D/g, '').slice(0, 11);
  if (v.length > 10) return `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  if (v.length > 6) return `(${v.slice(0,2)}) ${v.slice(2,6)}-${v.slice(6)}`;
  if (v.length > 2) return `(${v.slice(0,2)}) ${v.slice(2)}`;
  if (v.length > 0) return `(${v}`;
  return v;
}

// Sessão (cache local)
const AUTH_KEY = 'nutricionais_visitas_session';
const AUTH_FLASH = 'nutricionais_visitas_flash';

function saveSession(user) {
  localStorage.setItem(AUTH_KEY, JSON.stringify({
    id: user.id,
    nome: user.nome,
    cpf: user.cpf,
    email: user.email,
    perfil: user.perfil,
    permissoes: user.permissoes,
    loggedAt: Date.now(),
  }));
}
function getSession() {
  try {
    const raw = localStorage.getItem(AUTH_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function clearSession() {
  localStorage.removeItem(AUTH_KEY);
}
function getCurrentUser() {
  const user = getSession();
  if (!user) return null;
  // Modo simulação: admin pode testar como nutri (botão no home admin)
  // NÃO afeta o user.id — só o perfil, pra passar pelos requireAuth() de telas do nutri
  if (user.perfil === 'admin' && sessionStorage.getItem('SIMULAR_NUTRI') === '1') {
    return { ...user, perfil: 'nutricionista', _simulando: true };
  }
  return user;
}

// Retorna o user real (sem considerar modo simulação) — útil pra toggle do modo
function getCurrentUserReal() {
  return getSession();
}

// Flash messages (entre navegações)
function setFlash(type, message) {
  sessionStorage.setItem(AUTH_FLASH, JSON.stringify({ type, message }));
}
function popFlash() {
  const raw = sessionStorage.getItem(AUTH_FLASH);
  if (!raw) return null;
  sessionStorage.removeItem(AUTH_FLASH);
  try { return JSON.parse(raw); } catch { return null; }
}

// Login
async function login(cpf, senha) {
  if (!db) throw new Error('Banco de dados não conectado');
  const cpfFmt = maskCPF(cpf);
  const senhaHash = await hashSenha(senha);

  const { data: user, error } = await db
    .from('usuarios')
    .select('*')
    .eq('cpf', cpfFmt)
    .eq('senha_hash', senhaHash)
    .maybeSingle();

  if (error) throw new Error(`Erro ao consultar banco: ${error.message}`);
  if (!user) throw new Error('CPF ou senha incorretos');

  if (user.status === 'pendente') {
    throw new Error('Conta aguardando aprovação do administrador');
  }
  if (user.status === 'bloqueado') {
    throw new Error('Conta bloqueada. Fale com o administrador');
  }
  if (user.status === 'inativo') {
    throw new Error('Conta inativa. Fale com o administrador');
  }

  // Atualiza ultimo_login (não bloqueia o login se falhar)
  db.from('usuarios').update({ ultimo_login: new Date().toISOString() }).eq('id', user.id).then();

  saveSession(user);
  return user;
}

// Cadastro
async function cadastrar(dados) {
  if (!db) throw new Error('Banco de dados não conectado');
  const { nome, cpf, email, telefone, senha, categoria_id = null } = dados;
  const cpfFmt = maskCPF(cpf);
  const senhaHash = await hashSenha(senha);

  // Verifica duplicatas
  const { data: existing } = await db
    .from('usuarios')
    .select('id, cpf, email')
    .or(`cpf.eq.${cpfFmt},email.eq.${email}`)
    .maybeSingle();

  if (existing) {
    if (existing.cpf === cpfFmt) throw new Error('Este CPF já está cadastrado');
    if (existing.email === email) throw new Error('Este e-mail já está cadastrado');
  }

  const { error } = await db.from('usuarios').insert({
    nome: nome.trim(),
    cpf: cpfFmt,
    email: email.trim().toLowerCase(),
    telefone: maskPhone(telefone),
    senha_hash: senhaHash,
    perfil: 'nutricionista',
    status: 'pendente',
    categoria_id: categoria_id || null,
    permissoes: {},
  });

  if (error) throw new Error(`Erro ao criar conta: ${error.message}`);
  return true;
}

// Formata tempo relativo curto ("há 2h", "há 3d")
function formatarTempoCurto(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'agora';
  if (diff < 3600) return `${Math.floor(diff / 60)}min`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h`;
  if (diff < 604800) return `${Math.floor(diff / 86400)}d`;
  return `${Math.floor(diff / 604800)}sem`;
}

// Abre/fecha o dropdown
window.toggleNotifDropdown = async function(ev) {
  if (ev) ev.stopPropagation();
  const existing = document.getElementById('notifDropdown');
  if (existing) { existing.remove(); return; }
  const trigger = document.getElementById('notifTrigger');
  if (!trigger) return;

  // Cria dropdown anexado ao body (pra ficar acima de tudo)
  const dropdown = document.createElement('div');
  dropdown.id = 'notifDropdown';
  dropdown.className = 'notif-dropdown';
  dropdown.innerHTML = `
    <div class="notif-dropdown__header">
      <div style="font-weight:700;color:var(--brand-navy);font-family:var(--font-display);">Notificações</div>
      <button onclick="marcarTodasLidasUI()" style="background:none;border:none;color:var(--status-info);font-size:11.5px;font-weight:600;cursor:pointer;padding:4px 6px;" title="Marcar todas como lidas">
        Marcar todas
      </button>
    </div>
    <div id="notifList" class="notif-dropdown__list">
      <div style="padding:20px;text-align:center;color:var(--neutral-400);font-size:12px;">Carregando...</div>
    </div>
  `;
  document.body.appendChild(dropdown);

  // Posiciona abaixo do sininho, garantindo que fique dentro do viewport
  const rect = trigger.getBoundingClientRect();
  dropdown.style.top = `${rect.bottom + 4}px`;

  // A largura real que o dropdown vai ocupar (respeita o max-width do CSS)
  const larguraIdeal = 340;
  const margemLateral = 8;
  const larguraReal = Math.min(larguraIdeal, window.innerWidth - margemLateral * 2);

  // Tenta alinhar a borda direita com a do sininho, mas garante que a borda esquerda
  // do dropdown nunca fique fora do viewport
  const rightIdeal = Math.max(margemLateral, window.innerWidth - rect.right);
  const leftSeUsarRightIdeal = window.innerWidth - rightIdeal - larguraReal;
  // Se ao usar rightIdeal o dropdown sairia pela esquerda, clampa: usa margem fixa
  const rightFinal = leftSeUsarRightIdeal < margemLateral
    ? margemLateral
    : rightIdeal;
  dropdown.style.right = `${rightFinal}px`;

  // Carrega conteúdo
  const list = await listarNotificacoes(15);
  const listEl = document.getElementById('notifList');
  if (!listEl) return;

  if (list.length === 0) {
    listEl.innerHTML = `
      <div style="padding:30px 16px;text-align:center;color:var(--neutral-500);font-size:12.5px;">
        <span class="material-symbols-rounded" style="font-size:32px;color:var(--neutral-300);display:block;margin-bottom:6px;">notifications_none</span>
        Você está em dia!<br>
        <span style="font-size:11px;color:var(--neutral-400);">Nenhuma notificação por aqui.</span>
      </div>
    `;
  } else {
    listEl.innerHTML = list.map(n => {
      const ic = iconeNotificacao(n.tipo);
      return `
        <a href="#" onclick="abrirNotificacao('${n.id}', '${(n.link || '').replace(/'/g,"\\'")}'); return false;" class="notif-item ${n.lida ? '' : 'notif-item--unread'}">
          <div class="notif-item__icon" style="background:${ic.cor}20;color:${ic.cor};">
            <span class="material-symbols-rounded" style="font-size:18px;">${ic.icon}</span>
          </div>
          <div class="notif-item__body">
            <div class="notif-item__title">${(n.titulo || '').replace(/"/g,'&quot;')}</div>
            ${n.mensagem ? `<div class="notif-item__msg">${n.mensagem.replace(/"/g,'&quot;')}</div>` : ''}
            <div class="notif-item__time">${formatarTempoCurto(n.criado_em)}</div>
          </div>
          ${n.lida ? '' : '<span class="notif-item__dot"></span>'}
        </a>
      `;
    }).join('');
  }

  // Rodapé com link pra tela completa
  dropdown.innerHTML += `
    <div class="notif-dropdown__footer">
      <a href="#/notificacoes" onclick="document.getElementById('notifDropdown')?.remove();" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font-size:12px;font-weight:700;color:var(--status-info);text-decoration:none;">
        Ver todas
        <span class="material-symbols-rounded" style="font-size:15px;">arrow_forward</span>
      </a>
    </div>
  `;

  // Fecha ao clicar fora
  setTimeout(() => {
    document.addEventListener('click', fecharNotifDropdownOnClickFora, { once: true });
  }, 0);
};

function fecharNotifDropdownOnClickFora(ev) {
  const dropdown = document.getElementById('notifDropdown');
  const trigger = document.getElementById('notifTrigger');
  if (!dropdown) return;
  if (dropdown.contains(ev.target) || trigger?.contains(ev.target)) {
    // Continua ouvindo
    document.addEventListener('click', fecharNotifDropdownOnClickFora, { once: true });
  } else {
    dropdown.remove();
  }
}

    const mask = input.dataset.mask;
    input.addEventListener('input', (e) => {

// Força de senha
function passwordStrength(pwd) {
  let s = 0;
  if (!pwd) return { score: 0, label: '' };
  if (pwd.length >= 8) s++;
  if (/[A-Z]/.test(pwd)) s++;
  if (/[0-9]/.test(pwd)) s++;
  if (/[^A-Za-z0-9]/.test(pwd)) s++;
  const labels = ['', 'Fraca', 'Média', 'Boa', 'Forte'];
  return { score: s, label: labels[s] };
}

// Geolocation (promise)
function getGeolocation(opts = {}) {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error('Geolocalização não suportada neste navegador'));
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        timestamp: pos.timestamp,
      }),
      (err) => reject(new Error(
        err.code === 1 ? 'Permissão de localização negada' :
        err.code === 2 ? 'Posição indisponível' :
        err.code === 3 ? 'Tempo esgotado. Tente novamente' :
        'Erro ao obter localização'
      )),
      {
        enableHighAccuracy: true,
        timeout: opts.timeout || 10000,
        maximumAge: opts.maximumAge || 60000,
      }
    );
  });
}

// Haversine (em metros)
function calcularDistanciaMetros(lat1, lng1, lat2, lng2) {
  const R = 6371000; // raio Terra em metros
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLng/2) ** 2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// Formatar distância pra display
function formatarDistancia(metros) {
  if (metros < 1000) return `${metros}m`;
  return `${(metros / 1000).toFixed(1)}km`;
}

// Converte período em data de início (ISO)
function calcularDataInicio(periodo) {
  const hoje = new Date();
  const inicio = new Date(hoje);
  switch (periodo) {
    case '7':   inicio.setDate(hoje.getDate() - 7); break;
    case '30':  inicio.setDate(hoje.getDate() - 30); break;
    case 'mes': inicio.setDate(1); break;
    case 'tri':
      // primeiro dia do trimestre atual
      const tri = Math.floor(hoje.getMonth() / 3);
      inicio.setMonth(tri * 3, 1);
      break;
    case 'all':
    default:
      return null; // sem filtro
  }
  inicio.setHours(0, 0, 0, 0);
  return inicio.toISOString();
}

    instituicoes(nome)
  `);
  if (dataInicio) query = query.gte('checkin_timestamp', dataInicio);
  const { data: visitas, error } = await query;
  if (error) {
    console.warn('[dashboard] erro:', error.message);
    return;
  }
  const v = visitas || [];

  // ===== KPIs =====
  const total = v.length;
  const realizadas = v.filter(x => x.visita_realizada === true).length;
  const canceladas = v.filter(x => x.visita_realizada === false).length;
  const naoPreenchida = v.filter(x => x.visita_realizada === null || x.visita_realizada === undefined).length;
  const taxaRealiz = total > 0 ? Math.round((realizadas / total) * 100) : 0;

  // Pendências (contagens das outras tabelas)
  const [instPendRes, objPendRes] = await Promise.all([
    db.from('instituicoes').select('*', { count: 'exact', head: true }).eq('pendente_aprovacao', true).eq('ativo', true),
    db.from('objetivos_visita').select('*', { count: 'exact', head: true }).eq('pendente_aprovacao', true),
  ]);
  const pendInst = instPendRes.count || 0;
  const pendObj = objPendRes.count || 0;
  const pendTotal = pendInst + pendObj;

  // Qualidade GPS
  const comGps = v.filter(x => !x.checkin_manual).length;
  const divergentes = v.filter(x => x.flag_gps_divergente === true).length;
  const manuais = v.filter(x => x.checkin_manual === true).length;
  const gpsValidos = comGps - divergentes;
  const qualidadeGps = total > 0 ? Math.round((gpsValidos / total) * 100) : 0;

  // Atualiza cards KPI
  const set = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
  set('kpiTotalVisitas', total);
  set('kpiTotalHint', `${realizadas} ${realizadas === 1 ? 'realizada' : 'realizadas'} · ${canceladas} ${canceladas === 1 ? 'cancelada' : 'canceladas'}${naoPreenchida > 0 ? ` · ${naoPreenchida} sem status` : ''}`);
  set('kpiTaxaRealiz', total > 0 ? `${taxaRealiz}%` : '—');
  set('kpiTaxaHint', total > 0 ? `${realizadas} de ${total} visitas` : 'sem dados no período');
  set('kpiPendencias', pendTotal);
  set('kpiPendHint', pendTotal === 0 ? 'nada pra revisar' : `${pendInst} inst · ${pendObj} obj`);
  set('kpiQualidadeGps', total > 0 ? `${qualidadeGps}%` : '—');
  set('kpiGpsHint', total > 0 ? `${divergentes} ${divergentes === 1 ? 'divergente' : 'divergentes'} · ${manuais} ${manuais === 1 ? 'manual' : 'manuais'}` : 'sem dados');

  // ===== Gráfico de linha — visitas por dia =====
  renderDashChartLine(v, dataInicio);

  // ===== Rankings =====
  renderDashRanking(v, 'nutricionista_id', 'usuarios', 'dashRankProf', 5);
  renderDashRanking(v, 'instituicao_id', 'instituicoes', 'dashRankInst', 5);

  // ===== Pizzas =====
  renderDashPieStatus(v);
  renderDashPieCheckin(v);
  await renderDashBarsObjetivos(dataInicio);
}

function renderDashChartLine(visitas, dataInicio) {
  const container = document.getElementById('dashChartLine');
  if (!container) return;
  if (visitas.length === 0) {
    container.innerHTML = '<div style="padding:30px;text-align:center;color:var(--neutral-400);font-size:12px;">Sem visitas no período selecionado</div>';
    return;
  }

  // Agrupa por dia (yyyy-mm-dd)
  const porDia = {};
  visitas.forEach(v => {
    if (!v.checkin_timestamp) return;
    const d = new Date(v.checkin_timestamp);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    porDia[key] = (porDia[key] || 0) + 1;
  });

  // Determina range de datas (inicio -> hoje)
  const hoje = new Date(); hoje.setHours(23,59,59,999);
  const inicio = dataInicio ? new Date(dataInicio) : (() => {
    // Se período = 'all', usa a data da visita mais antiga
    const datas = visitas.map(x => new Date(x.checkin_timestamp)).filter(x => !isNaN(x));
    return datas.length > 0 ? new Date(Math.min(...datas)) : hoje;
  })();
  inicio.setHours(0,0,0,0);

  const dias = [];
  const iter = new Date(inicio);
  while (iter <= hoje) {
    const key = `${iter.getFullYear()}-${String(iter.getMonth()+1).padStart(2,'0')}-${String(iter.getDate()).padStart(2,'0')}`;
    dias.push({ key, date: new Date(iter), count: porDia[key] || 0 });
    iter.setDate(iter.getDate() + 1);
  }

  const maxCount = Math.max(...dias.map(d => d.count), 1);
  const W = 600, H = 150, PAD_L = 30, PAD_R = 10, PAD_T = 14, PAD_B = 22;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;

  const x = (i) => PAD_L + (dias.length > 1 ? (i / (dias.length - 1)) * innerW : innerW / 2);
  const y = (n) => PAD_T + innerH - (n / maxCount) * innerH;

  // Path da linha
  const pathPts = dias.map((d, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(1)} ${y(d.count).toFixed(1)}`).join(' ');
  // Path da área (linha + base pra fechar)
  const areaPts = pathPts + ` L ${x(dias.length-1).toFixed(1)} ${(PAD_T + innerH).toFixed(1)} L ${x(0).toFixed(1)} ${(PAD_T + innerH).toFixed(1)} Z`;

  // Ticks horizontais: mostra só 4-5 labels distribuídas
  const labelsIdx = [];
  const nLabels = Math.min(5, dias.length);
  for (let i = 0; i < nLabels; i++) {
    labelsIdx.push(Math.round((i / (nLabels - 1 || 1)) * (dias.length - 1)));
  }
  const labelsHtml = labelsIdx.map(i => {
    const d = dias[i].date;
    const lbl = `${d.getDate()}/${String(d.getMonth()+1).padStart(2,'0')}`;
    return `<text x="${x(i).toFixed(1)}" y="${H - 6}" text-anchor="${i === 0 ? 'start' : i === dias.length - 1 ? 'end' : 'middle'}" fill="var(--neutral-500)" font-size="9" font-family="var(--font-mono)">${lbl}</text>`;
  }).join('');

  // Ticks verticais (eixo Y): 0, meio, máx
  const yTicks = [0, Math.round(maxCount / 2), maxCount];
  const yLabelsHtml = yTicks.map(t => `
    <line x1="${PAD_L}" y1="${y(t)}" x2="${W - PAD_R}" y2="${y(t)}" stroke="var(--neutral-100)" stroke-width="1"/>
    <text x="${PAD_L - 4}" y="${y(t) + 3}" text-anchor="end" fill="var(--neutral-400)" font-size="9" font-family="var(--font-mono)">${t}</text>
  `).join('');

  // Pontos (só se tiver poucos dias, senão fica poluído)
  const pontosHtml = dias.length <= 35 ? dias.map((d, i) => d.count > 0
    ? `<circle cx="${x(i).toFixed(1)}" cy="${y(d.count).toFixed(1)}" r="2.5" fill="var(--status-info)"/>`
    : '').join('') : '';

  container.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;">
      ${yLabelsHtml}
      <path d="${areaPts}" fill="rgba(37,99,235,0.08)" />
      <path d="${pathPts}" stroke="var(--status-info)" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      ${pontosHtml}
      ${labelsHtml}
    </svg>
    <div style="text-align:right;font-size:10.5px;color:var(--neutral-500);margin-top:4px;">
      <strong style="color:var(--brand-navy);">${visitas.length}</strong> visitas · média
      <strong style="color:var(--brand-navy);">${(() => {
        const media = visitas.length / dias.length;
        if (media >= 1) return media.toFixed(1);
        if (media >= 0.1) return media.toFixed(1);
        // menos de 0.1/dia: mostra 1 a cada X dias pra fazer mais sentido
        return `1 a cada ${Math.round(1 / media)}`;
      })()}</strong>${(visitas.length / dias.length) >= 0.1 ? '/dia' : ' dias'} ·
      pico <strong style="color:var(--brand-navy);">${maxCount}</strong>/dia
    </div>
  `;
}

function renderDashRanking(visitas, foreignKey, joinKey, containerId, topN) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const contagem = {};
  const nomes = {};
  visitas.forEach(v => {
    const id = v[foreignKey];
    if (!id) return;
    contagem[id] = (contagem[id] || 0) + 1;
    if (v[joinKey]?.nome) nomes[id] = v[joinKey].nome;
  });
  const ranked = Object.entries(contagem)
    .map(([id, count]) => ({ id, count, nome: nomes[id] || '(sem nome)' }))
    .sort((a, b) => b.count - a.count)
    .slice(0, topN);
  if (ranked.length === 0) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--neutral-400);font-size:12px;">Sem dados</div>';
    return;
  }
  const maxCount = ranked[0].count;
  container.innerHTML = ranked.map((r, i) => `
    <div class="dash-rank-row">
      <span class="dash-rank-row__pos">#${i + 1}</span>
      <div class="dash-rank-row__body">
        <span class="dash-rank-row__name" title="${r.nome.replace(/"/g,'&quot;')}">${r.nome}</span>
        <div class="dash-rank-bar"><div class="dash-rank-bar__fill" style="width:${(r.count / maxCount * 100).toFixed(1)}%"></div></div>
      </div>
      <span class="dash-rank-row__count">${r.count}</span>
    </div>
  `).join('');
}

// SVG pizza genérico. Recebe [{label, count, color}] e um containerId.
// options.large = true → SVG maior (110px), pra cards solos com mais espaço
function renderDashPie(containerId, dados, options = {}) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const total = dados.reduce((s, d) => s + d.count, 0);
  if (total === 0) {
    container.innerHTML = '<div style="padding:15px;text-align:center;color:var(--neutral-400);font-size:11px;">Sem dados</div>';
    return;
  }
  const size = options.large ? 110 : 70, cx = size / 2, cy = size / 2, r = size / 2 - 2;
  let ang = -Math.PI / 2; // começa no topo
  const slices = dados.map(d => {
    const pct = d.count / total;
    const angEnd = ang + pct * Math.PI * 2;
    const x1 = cx + r * Math.cos(ang), y1 = cy + r * Math.sin(ang);
    const x2 = cx + r * Math.cos(angEnd), y2 = cy + r * Math.sin(angEnd);
    const large = pct > 0.5 ? 1 : 0;
    const path = pct >= 1
      ? `M ${cx - r} ${cy} A ${r} ${r} 0 1 1 ${cx + r} ${cy} A ${r} ${r} 0 1 1 ${cx - r} ${cy}` // círculo completo
      : `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`;
    ang = angEnd;
    return `<path d="${path}" fill="${d.color}" stroke="#fff" stroke-width="1"/>`;
  }).join('');
  const legenda = dados.map(d => `
    <div style="display:flex;align-items:center;gap:6px;font-size:${options.large ? '12.5px' : '11px'};color:var(--neutral-600);padding:${options.large ? '3px' : '2px'} 0;">
      <span style="width:${options.large ? '11px' : '10px'};height:${options.large ? '11px' : '10px'};border-radius:2px;background:${d.color};flex-shrink:0;"></span>
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${d.label.replace(/"/g,'&quot;')}">${d.label}</span>
      <strong style="color:var(--brand-navy);font-family:var(--font-mono);font-size:${options.large ? '12px' : '10.5px'};">${Math.round(d.count / total * 100)}%</strong>
    </div>
  `).join('');
  container.innerHTML = `
    <div style="display:flex;gap:${options.large ? '16px' : '10px'};align-items:center;min-width:0;">
      <svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;flex-shrink:0;">${slices}</svg>
      <div style="flex:1;min-width:0;overflow:hidden;">${legenda}</div>
    </div>
  `;
}

function renderDashPieStatus(visitas) {
  const contagem = { completa: 0, rascunho: 0, aprovada: 0, emRev: 0 };
  visitas.forEach(v => {
    if (v.status === 'completa') contagem.completa++;
    else if (v.status === 'aprovada_pos_revisao') contagem.aprovada++;
    else if (v.status === 'em_revisao') contagem.emRev++;
    else contagem.rascunho++;
  });
  const dados = [
    { label: 'Completa', count: contagem.completa, color: 'var(--status-success)' },
    { label: 'Aprovada pós-rev', count: contagem.aprovada, color: '#16A34A' },
    { label: 'Rascunho', count: contagem.rascunho, color: 'var(--neutral-400)' },
    { label: 'Em revisão', count: contagem.emRev, color: 'var(--status-warning)' },
  ].filter(d => d.count > 0);
  renderDashPie('dashPieStatus', dados);
}

function renderDashPieCheckin(visitas) {
  const validos = visitas.filter(v => !v.checkin_manual && !v.flag_gps_divergente).length;
  const divergente = visitas.filter(v => v.flag_gps_divergente === true).length;
  const manual = visitas.filter(v => v.checkin_manual === true).length;
  const dados = [
    { label: 'GPS válido', count: validos, color: 'var(--status-success)' },
    { label: 'GPS divergente', count: divergente, color: 'var(--status-warning)' },
    { label: 'Manual', count: manual, color: 'var(--neutral-400)' },
  ].filter(d => d.count > 0);
  renderDashPie('dashPieCheckin', dados);
}

// Cria uma instituição minimamente cadastrada pelo nutri — marcada como pendente
async function criarInstituicaoSugerida(dados) {
  if (!db) throw new Error('Banco não conectado');
  const user = getCurrentUser();
  if (!user) throw new Error('Usuário não logado');
  // Aceita tanto string (backward-compat do fluxo de objetivo) quanto objeto
  const payload = (typeof dados === 'string') ? { nome: dados } : dados;
  const { nome, logradouro = null, bairro = null, cidade = null, latitude = null, longitude = null } = payload || {};
  if (!nome || !nome.trim()) throw new Error('Nome da instituição é obrigatório');
  const nomeClean = nome.trim();
  // Verifica duplicidade case-insensitive
  const { data: existente } = await db
    .from('instituicoes')
    .select('id, nome')
    .ilike('nome', nomeClean)
    .maybeSingle();
  if (existente) return existente;
  // Cadastro rápido — nome + endereço do profissional. Admin completa o resto em #/admin/pendentes.
  // Se o profissional tinha GPS ativo, latitude/longitude vêm preenchidos como coords iniciais.
  const { data, error } = await db
    .from('instituicoes')
    .insert({
      nome: nomeClean,
      logradouro: logradouro ? logradouro.trim() : null,
      bairro: bairro ? bairro.trim() : null,
      cidade: cidade ? cidade.trim() : null,
      latitude: latitude,
      longitude: longitude,
      ativo: true,
      pendente_aprovacao: true,
      cadastrada_por: user.id,
    })
    .select()
    .single();
  if (error) throw new Error(error.message);
  return data;
}

// Ordenar instituições por proximidade.
// Instituições sem coordenadas (recém cadastradas pelo profissional,
// aguardando admin completar) NÃO podem ser comparadas — vão com distancia=null
// e dentroDoRaio=false. Vão pro final da lista.
function ordenarPorProximidade(instituicoes, userLat, userLng, raio = 500) {
  return instituicoes.map(inst => {
    const temCoords = inst.latitude !== null && inst.latitude !== undefined
                   && inst.longitude !== null && inst.longitude !== undefined
                   && !(inst.latitude === 0 && inst.longitude === 0); // (0,0) = placeholder inválido
    if (!temCoords) {
      return {
        ...inst,
        distancia: null,
        distanciaFmt: 'Sem coords',
        dentroDoRaio: false,
        semCoords: true,
      };
    }
    const dist = calcularDistanciaMetros(userLat, userLng, inst.latitude, inst.longitude);
    return {
      ...inst,
      distancia: dist,
      distanciaFmt: formatarDistancia(dist),
      dentroDoRaio: dist <= raio,
      semCoords: false,
    };
  }).sort((a, b) => {
    // instituições sem coords vão pro final
    if (a.distancia === null && b.distancia === null) return 0;
    if (a.distancia === null) return 1;
    if (b.distancia === null) return -1;
    return a.distancia - b.distancia;
  });
}

// CRUD de visitas
async function criarCheckin({ institucaoId, userPos, objetivoId, observacoes, checkinManual }) {
  console.log('[criarCheckin] INICIO - versão com flags, institucao:', institucaoId, 'manual:', checkinManual, 'temGPS:', !!userPos);
  if (!db) throw new Error('Banco não conectado');
  const user = getCurrentUser();
  if (!user) throw new Error('Usuário não logado');

  const d = new Date();
  const agoraISO = d.toISOString(); // timestamp global correto (UTC)
  // Data e horário locais (corrige bug de UTC deslocando 3h em SP)
  const dataLocal = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const horaLocal = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;

  // Calcula flag_gps_divergente: se temos coords do usuário e da instituição, mede distância;
  // se > raio configurado, marca divergente. Sem coords (check-in manual ou instituição nova), deixa false.
  let flagGpsDivergente = false;
  if (userPos && !checkinManual) {
    try {
      const { data: inst } = await db
        .from('instituicoes')
        .select('latitude, longitude')
        .eq('id', institucaoId)
        .single();
      if (inst && inst.latitude && inst.longitude) {
        const dist = calcularDistanciaMetros(userPos.lat, userPos.lng, inst.latitude, inst.longitude);
        flagGpsDivergente = dist > (CONFIG.GPS_RADIUS_METERS || 500);
      }
    } catch (e) {
      // se falhar, deixa false (não bloqueia o check-in)
    }
  }

  // Tentativa 1: insert completo com flags (funciona se PostgREST tiver schema atualizado)
  const novaVisita = {
    nutricionista_id: user.id,
    instituicao_id: institucaoId,
    data_visita: dataLocal,
    horario_inicio: horaLocal,
    checkin_timestamp: agoraISO,
    checkin_latitude: userPos ? userPos.lat : null,
    checkin_longitude: userPos ? userPos.lng : null,
    checkin_precisao_metros: userPos ? Math.round(userPos.accuracy) : null,
    checkin_manual: Boolean(checkinManual),
    flag_gps_divergente: Boolean(flagGpsDivergente),
    flag_horario_fora_margem: false,
    flag_sem_checkin: false,
    flag_sem_checkout: false,
    status: 'rascunho',
    resumo: observacoes || null,
  };

  console.log('[criarCheckin] payload:', novaVisita);

  let { data, error } = await db
    .from('visitas')
    .insert(novaVisita)
    .select()
    .single();

  // Tentativa 2: se falhou por flag NOT NULL, manda via SQL direto (ignora cache do PostgREST)
  if (error && error.message && error.message.includes('flag_') && error.message.includes('not-null')) {
    console.warn('[criarCheckin] Fallback: usando RPC direto por cache do PostgREST');
    // Faz insert mínimo que CERTAMENTE funciona, depois atualiza
    const minimoPayload = {
      nutricionista_id: user.id,
      instituicao_id: institucaoId,
      data_visita: dataLocal,
      horario_inicio: horaLocal,
      checkin_timestamp: agoraISO,
      status: 'rascunho',
    };
    const r2 = await db.from('visitas').insert(minimoPayload).select().single();
    if (r2.error) {
      console.error('[criarCheckin] Fallback também falhou:', r2.error);
      throw new Error(r2.error.message);
    }
    // Atualiza os demais campos via update
    const updatePayload = {
      checkin_latitude: userPos ? userPos.lat : null,

// Cria objetivo direto como ativo (sem passar por aprovação — admin já é autoridade)
async function criarObjetivoAdmin(nome) {
  if (!db) throw new Error('Banco não conectado');
  const user = getCurrentUser();
  if (!user || user.perfil !== 'admin') throw new Error('Apenas admin pode adicionar objetivos diretamente');
  if (!nome || !nome.trim()) throw new Error('Nome do objetivo é obrigatório');
  const nomeClean = nome.trim();
  // Dedup case-insensitive
  const { data: existente } = await db
    .from('objetivos_visita')
    .select('id, nome, ativo, pendente_aprovacao')
    .ilike('nome', nomeClean)
    .maybeSingle();
  if (existente) {
    // Se existe mas arquivado, reativa. Se existe pendente, aprova.
    if (!existente.ativo || existente.pendente_aprovacao) {
      await updateOrThrow('objetivos_visita', { ativo: true, pendente_aprovacao: false }, existente.id);
      return { ...existente, ativo: true, pendente_aprovacao: false, reativado: true };
    }
    throw new Error(`Objetivo "${existente.nome}" já existe e está ativo.`);
  }
  // Próxima ordem
  const { data: max } = await db
    .from('objetivos_visita')
    .select('ordem')
    .order('ordem', { ascending: false })
    .limit(1)
    .maybeSingle();
  const novaOrdem = (max?.ordem || 0) + 1;
  const { data, error } = await db
    .from('objetivos_visita')
    .insert({
      nome: nomeClean,
      ativo: true,
      ordem: novaOrdem,
      pendente_aprovacao: false,
      sugerido_por: null,
    })
    .select()
    .single();
  if (error) throw new Error(error.message);
  return data;
}

// Lista objetivos por filtro: 'ativos' | 'pendentes' | 'arquivados'
// Usa join manual com usuarios (em vez de relationship PostgREST) pra evitar
// problemas de FK não-registrado ou usuário deletado.
async function listarObjetivosPorFiltro(filtro) {
  if (!db) return [];
  let q = db.from('objetivos_visita').select('*');
  if (filtro === 'ativos') {
    q = q.eq('ativo', true).eq('pendente_aprovacao', false);
  } else if (filtro === 'pendentes') {
    q = q.eq('pendente_aprovacao', true);
  } else if (filtro === 'arquivados') {
    q = q.eq('ativo', false);
  }
  q = filtro === 'ativos'
    ? q.order('ordem', { ascending: true, nullsFirst: false })
    : q.order('id', { ascending: false });
  const { data, error } = await q;
  if (error) { console.warn('[obj listar]', error.message); return []; }
  const lista = data || [];

  // Join manual com usuarios pra pegar nome de quem sugeriu
  const userIds = [...new Set(lista.map(o => o.sugerido_por).filter(Boolean))];
  let users = {};
  if (userIds.length > 0) {
    const { data: usrs, error: errUsr } = await db.from('usuarios').select('id, nome').in('id', userIds);
    if (errUsr) console.warn('[obj join users]', errUsr.message);
    users = Object.fromEntries((usrs || []).map(u => [u.id, u]));
  }
  return lista.map(o => ({
    ...o,
    sugerido_por_user: o.sugerido_por ? (users[o.sugerido_por] || null) : null,
  }));
}

// Reordena trocando o valor de `ordem` entre o objetivo atual e o vizinho (cima/baixo)
async function reordenarObjetivo(id, direcao /* 'cima' | 'baixo' */) {
  if (!db) throw new Error('Banco não conectado');
  // Pega a lista atual de ativos ordenada
  const lista = await listarObjetivosPorFiltro('ativos');
  const idx = lista.findIndex(o => String(o.id) === String(id));
  if (idx < 0) throw new Error('Objetivo não encontrado na lista ativa');
  const vizinhoIdx = direcao === 'cima' ? idx - 1 : idx + 1;
  if (vizinhoIdx < 0 || vizinhoIdx >= lista.length) return false; // já está na borda
  const atual = lista[idx];
  const vizinho = lista[vizinhoIdx];
  // Swap dos valores de `ordem`
  await updateOrThrow('objetivos_visita', { ordem: vizinho.ordem }, atual.id);
  await updateOrThrow('objetivos_visita', { ordem: atual.ordem },   vizinho.id);
  return true;
}

// Data formatada pt-BR
function formatarDataPtBr(date) {
  const d = date instanceof Date ? date : new Date(date);
  const diasSemana = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${diasSemana[d.getDay()]}, ${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;
}

function formatarDataCurta(date) {
  const d = date instanceof Date ? date : new Date(date);
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${d.getDate()} ${meses[d.getMonth()]} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// Formatar tempo relativo (hoje, ontem, etc)
function formatarTempoRelativo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const agora = new Date();
  const hoje = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
  const dataD = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffDias = Math.round((hoje - dataD) / (1000 * 60 * 60 * 24));
  const hora = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

  if (diffDias === 0) return `Hoje · ${hora}`;
  if (diffDias === 1) return `Ontem · ${hora}`;
  if (diffDias < 7) return `${diffDias}d atrás · ${hora}`;
  return formatarDataCurta(d);
}

// Iniciais do nome (pra avatar)

  if (!nome) return 'N';
  const partes = nome.trim().split(/\s+/);
  if (partes.length === 1) return partes[0].slice(0, 2).toUpperCase();
  return (partes[0][0] + partes[partes.length - 1][0]).toUpperCase();
}

// Estado do timer (visita ativa)
const TimerState = {
  interval: null,
  startTime: null,
};

function startTimer(startTime) {
  TimerState.startTime = new Date(startTime);
  if (TimerState.interval) clearInterval(TimerState.interval);
  const tick = () => {
    const el = document.getElementById('timerValue');
    if (!el) {
      clearInterval(TimerState.interval);
      return;
    }
    const diff = Math.floor((Date.now() - TimerState.startTime) / 1000);
    const h = String(Math.floor(diff / 3600)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
    const s = String(diff % 60).padStart(2, '0');
    el.textContent = `${h}:${m}:${s}`;
  };
  tick();
  TimerState.interval = setInterval(tick, 1000);
}

function stopTimer() {
  if (TimerState.interval) {
    clearInterval(TimerState.interval);
    TimerState.interval = null;
  }
}
