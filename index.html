function renderCheckin() {
  const user = requireAuth();
  if (!user) return '<div class="splash"><div class="splash__spinner"></div></div>';

  // Reseta fluxo
  CheckinFlow.instituicaoSelecionada = null;
  CheckinFlow.manual = false;

  // Async: pega GPS + lista instituições + ordena
  setTimeout(async () => {
    const listEl = document.getElementById('instList');
    const gpsEl = document.getElementById('gpsStatus');

    try {
      // Pega instituições primeiro (essa operação não depende de GPS)
      const instituicoes = await listarInstituicoes();

      if (instituicoes.length === 0) {
        if (listEl) {
          listEl.innerHTML = `
            <div class="empty-state" style="margin:0;">
              <div class="empty-state__icon">
                <span class="material-symbols-rounded">local_hospital</span>
              </div>
              <div class="empty-state__title">Nenhuma instituição cadastrada</div>
              <div class="empty-state__desc">O administrador precisa cadastrar instituições antes de você fazer check-in.</div>
              ${user.perfil === 'admin' ? '<a href="#/admin/instituicoes" class="btn-auth btn-auth--secondary" style="display:inline-flex;text-decoration:none;width:auto;padding:10px 20px;min-height:auto;">Cadastrar agora</a>' : ''}
            </div>
          `;
        }
        if (gpsEl) {
          gpsEl.outerHTML = `
            <div class="gps-status gps-status--warning" id="gpsStatus">
              <span class="gps-status__icon"><span class="material-symbols-rounded">info</span></span>
              <div class="gps-status__body">
                <div class="gps-status__label">Sem instituições</div>
                <div class="gps-status__detail">Cadastre instituições primeiro</div>
              </div>
            </div>
          `;
        }
        return;
      }

      // Tenta pegar GPS
      let userPos = null;
      try {
        userPos = await getGeolocation();
        CheckinFlow.userPos = userPos;
        if (gpsEl) {
          gpsEl.className = 'gps-status';
          gpsEl.innerHTML = `
            <span class="gps-status__icon"><span class="material-symbols-rounded">gps_fixed</span></span>
            <div class="gps-status__body">
              <div class="gps-status__label">GPS ativo</div>
              <div class="gps-status__detail">precisão ±${Math.round(userPos.accuracy)}m · atualizado agora</div>
            </div>
          `;
        }
      } catch (gpsErr) {
        if (gpsEl) {
          gpsEl.className = 'gps-status gps-status--warning';
          gpsEl.innerHTML = `
            <span class="gps-status__icon"><span class="material-symbols-rounded">gps_off</span></span>
            <div class="gps-status__body">
              <div class="gps-status__label">GPS indisponível</div>
              <div class="gps-status__detail">${gpsErr.message}</div>
            </div>
          `;
        }
      }

      // Ordena
      const instComDist = userPos
        ? ordenarPorProximidade(instituicoes, userPos.lat, userPos.lng, CONFIG.GPS_RADIUS_METERS)
        : instituicoes.map(i => ({ ...i, distancia: null, distanciaFmt: '—', dentroDoRaio: false }));

      CheckinFlow.instituicoes = instComDist;

      // Renderiza lista
      if (listEl) {
        listEl.innerHTML = instComDist.map((inst, i) => {
          const isClosest = i === 0 && userPos;
          const zone = inst.dentroDoRaio ? 'in' : 'out';
          const enderecoCurto = `${inst.logradouro}${inst.bairro ? ' · ' + inst.bairro : ''}`;
          return `
            <a href="#" onclick="selectInstitution('${inst.id}'); return false;" class="inst-item${isClosest ? ' inst-item--closest' : ''}">
              <div class="inst-item__pin inst-item__pin--${zone}">
                <span class="material-symbols-rounded">location_on</span>
              </div>
              <div class="inst-item__info">
                <div class="inst-item__name">${inst.nome.replace(/"/g,'&quot;')}</div>
                <div class="inst-item__addr">${enderecoCurto.replace(/"/g,'&quot;')}</div>
              </div>
              <div class="inst-item__right">
                <div class="inst-item__dist inst-item__dist--${zone}">${inst.distanciaFmt}</div>
                ${!inst.dentroDoRaio && userPos ? '<div class="inst-item__zone-tag">fora do raio</div>' : ''}
              </div>
            </a>
          `;
        }).join('');
      }
    } catch (err) {
      console.error('[Checkin] Erro:', err);
      if (listEl) {
        listEl.innerHTML = `
          <div class="empty-state" style="margin:0;">
            <div class="empty-state__icon" style="background:var(--status-danger-bg);color:var(--status-danger);">
              <span class="material-symbols-rounded">error</span>
            </div>
            <div class="empty-state__title">Erro ao carregar</div>
            <div class="empty-state__desc">${err.message}</div>
          </div>
        `;
      }
    }
  }, 0);

  return `
    <div class="mobile-app">
      ${mobileTopBar({ title: 'Check-in', showBack: true })}
      <main class="mcontent">
        <div class="gps-status gps-status--warning" id="gpsStatus">
          <span class="gps-status__icon"><span class="material-symbols-rounded">gps_not_fixed</span></span>
          <div class="gps-status__body">
            <div class="gps-status__label">Obtendo localização...</div>
            <div class="gps-status__detail">aguarde um momento</div>
          </div>
        </div>

        <div class="search-bar">
          <span class="material-symbols-rounded search-bar__icon">search</span>
          <input type="text" placeholder="Buscar instituição..." oninput="filterInstitutions(this.value)" />
        </div>

        <div class="list-label">
          <span class="list-label__title">Instituições cadastradas</span>
          <span class="list-label__meta">raio ${CONFIG.GPS_RADIUS_METERS}m</span>
        </div>

        <div class="inst-list" id="instList">
          <div style="padding:20px;text-align:center;color:var(--neutral-500);font-size:13px;">Carregando...</div>
        </div>

        <button class="btn-auth btn-auth--secondary" onclick="startManualCheckin()">
          <span class="material-symbols-rounded" style="font-size:20px">edit_location_alt</span>
          Check-in manual (sem GPS)
        </button>
      </main>
      ${bottomNav('checkin')}
    </div>
  `;
}

window.filterInstitutions = function(query) {
  const q = query.toLowerCase().trim();
  const listEl = document.getElementById('instList');
  if (!listEl) return;

  const filtered = q
    ? CheckinFlow.instituicoes.filter(i => i.nome.toLowerCase().includes(q) || (i.bairro || '').toLowerCase().includes(q))
    : CheckinFlow.instituicoes;

  if (filtered.length === 0) {
    listEl.innerHTML = `
      <div style="padding:30px 20px;text-align:center;color:var(--neutral-500);">
        <span class="material-symbols-rounded" style="font-size:32px;color:var(--neutral-400);">search_off</span>
        <div style="margin-top:8px;font-size:13px;">Nenhuma instituição encontrada</div>
      </div>
    `;
    return;
  }

  listEl.innerHTML = filtered.map((inst, i) => {
    const zone = inst.dentroDoRaio ? 'in' : 'out';
    const enderecoCurto = `${inst.logradouro}${inst.bairro ? ' · ' + inst.bairro : ''}`;
    return `
      <a href="#" onclick="selectInstitution('${inst.id}'); return false;" class="inst-item">
        <div class="inst-item__pin inst-item__pin--${zone}">
          <span class="material-symbols-rounded">location_on</span>
        </div>
        <div class="inst-item__info">
          <div class="inst-item__name">${inst.nome.replace(/"/g,'&quot;')}</div>
          <div class="inst-item__addr">${enderecoCurto.replace(/"/g,'&quot;')}</div>
        </div>
        <div class="inst-item__right">
          <div class="inst-item__dist inst-item__dist--${zone}">${inst.distanciaFmt}</div>
          ${!inst.dentroDoRaio && inst.distancia !== null ? '<div class="inst-item__zone-tag">fora do raio</div>' : ''}
        </div>
      </a>
    `;
  }).join('');
};

window.selectInstitution = function(id) {
  const inst = CheckinFlow.instituicoes.find(i => i.id === id);
  if (!inst) return;
  CheckinFlow.instituicaoSelecionada = inst;
  CheckinFlow.manual = false;
  window.location.hash = '#/checkin/confirmar';
};

window.startManualCheckin = function() {
  // Fluxo manual: seleciona sem GPS
  if (!CheckinFlow.instituicoes || CheckinFlow.instituicoes.length === 0) {
    alert('Ainda não há instituições cadastradas.');
    return;
  }
  CheckinFlow.manual = true;
  // Se só tem uma, já seleciona
  if (CheckinFlow.instituicoes.length === 1) {
    CheckinFlow.instituicaoSelecionada = CheckinFlow.instituicoes[0];
    window.location.hash = '#/checkin/confirmar';
  } else {
    // Mostra modal simples pra escolher (pra MVP vamos só fazer alert)
    const nome = prompt('Qual instituição? (digite parte do nome)');
    if (!nome) return;
    const inst = CheckinFlow.instituicoes.find(i => i.nome.toLowerCase().includes(nome.toLowerCase()));
    if (!inst) {
      alert('Nenhuma instituição encontrada com esse nome.');
      return;
    }
    CheckinFlow.instituicaoSelecionada = inst;
    window.location.hash = '#/checkin/confirmar';
  }
};

  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:24px">hourglass_empty</span> Registrando...';

  try {
    const visita = await criarCheckin({
      institucaoId: CheckinFlow.instituicaoSelecionada.id,
      userPos: CheckinFlow.userPos,
      objetivoId: objId || null,
      observacoes: obs,
      checkinManual: CheckinFlow.manual,
    });

    setFlash('success', 'Check-in registrado!');
    window.location.hash = '#/checkin/ativo';
  } catch (err) {
    alert('Erro ao registrar check-in: ' + err.message);
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:24px">check_circle</span> Confirmar check-in';
  }
};

function renderCheckinAtivo() {
  const user = requireAuth();
  if (!user) return '<div class="splash"><div class="splash__spinner"></div></div>';

  setTimeout(async () => {
    const visita = await getVisitaAtiva();
    if (!visita) {
      window.location.hash = '#/inicio';
      return;
    }

    // Atualiza dados do card

    const startEl = document.getElementById('activeInstStart');

    if (startEl) {

      startEl.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

  return `

window.abrirRelatorioDaVisitaAtiva = function() {
  const visitaId = window._activeVisitaId;
  if (!visitaId) return;
  window.location.hash = `#/visitas/relatorio?id=${visitaId}`;
};

window.handleCheckoutAtivo = async function() {
  const visitaId = window._activeVisitaId;
  if (!visitaId) {
    alert('Erro: não encontrei a visita ativa');
    return;
  }

  // Modal de confirmação de checkout
  const confirmou = await showConfirmCheckoutModal();
  if (!confirmou) return;

  try {
    // Pega posição de checkout (opcional)
    let checkoutPos = null;
    try {
      checkoutPos = await getGeolocation({ timeout: 5000 });
    } catch (e) {
      // continua sem GPS de checkout
    }

    await finalizarCheckin(visitaId, checkoutPos);
    stopTimer();

    // Calcula duração pra mostrar no modal
    const visita = await getVisitaCompleta(visitaId);
    const duracao = calcularDuracaoMin(visita.checkin_timestamp, visita.checkout_timestamp);
    const instName = visita.instituicoes?.nome || 'Instituição';

    // Modal: "Preencher agora ou depois?"
    const escolha = await showPostCheckoutModal({
      instName,
      duracao: formatarDuracao(duracao),
    });

    if (escolha === 'agora') {
      window.location.hash = `#/visitas/relatorio?id=${visitaId}`;
    } else {
      setFlash('success', 'Visita finalizada. Você pode preencher o relatório quando quiser (até 24h).');
      window.location.hash = '#/visitas';
    }
  } catch (err) {
    alert('Erro ao fazer check-out: ' + err.message);
  }
};

function renderRelatorio() {
  const user = requireAuth();
  if (!user) return '<div class="splash"><div class="splash__spinner"></div></div>';

  const visitaId = window._routeParams?.id;
  if (!visitaId) {
    setTimeout(() => { window.location.hash = '#/visitas'; }, 0);
    return '<div class="splash"><div class="splash__spinner"></div></div>';
  }

  // Limpa estado
  ReportState.visitaId = visitaId;
  ReportState.visita = null;
  ReportState.profissionaisInstituicao = [];
  ReportState.profissionaisSelecionados = [];
  ReportState.objetivos = [];
  ReportState.objetivosSelecionados = new Set();
  if (ReportState.autoSaveTimer) clearTimeout(ReportState.autoSaveTimer);
  ReportState.pendingChanges = {};

  // Carrega dados async
  setTimeout(async () => {
    try {
      const [visita, objetivos] = await Promise.all([
        getVisitaCompleta(visitaId),
        listarObjetivos(),
      ]);

      ReportState.visita = visita;
      ReportState.objetivos = objetivos;
      ReportState.objetivosSelecionados = new Set(visita.objetivos_selecionados || []);
      ReportState.profissionaisSelecionados = visita.profissionais_selecionados || [];

      // Carrega profissionais da instituição
      const profs = await listarProfissionaisDaInstituicao(visita.instituicao_id);
      ReportState.profissionaisInstituicao = profs;

      hydrateReportForm();
    } catch (err) {
      document.getElementById('reportBody').innerHTML = `
        <div class="empty-state" style="margin:0;">
          <div class="empty-state__icon" style="background:var(--status-danger-bg);color:var(--status-danger);">
            <span class="material-symbols-rounded">error</span>
          </div>
          <div class="empty-state__title">Erro ao carregar</div>
          <div class="empty-state__desc">${err.message}</div>
        </div>
      `;
    }
  }, 0);

  return `
    <div class="mobile-app">
      <header class="mbar">
        <div class="mbar__row">
          <button class="mbar__back" onclick="history.back()">
            <span class="material-symbols-rounded" style="font-size:18px">arrow_back_ios_new</span>
          </button>
          <div class="mbar__title">Relatório</div>
          <span class="save-indicator" id="saveIndicator">
            <span class="material-symbols-rounded">cloud_done</span>
            <span id="saveIndicatorText">Pronto</span>
          </span>
        </div>
      </header>
      <main class="mcontent" id="reportBody">
        <div style="padding:40px 20px;text-align:center;color:var(--neutral-500);font-size:13px;">
          <span class="material-symbols-rounded" style="font-size:32px;color:var(--neutral-400);">hourglass_empty</span>
          <div style="margin-top:8px;">Carregando relatório...</div>
        </div>
      </main>
    </div>
  `;
}

function renderProfSelected() {

  if (ReportState.profissionaisSelecionados.length === 0) {
    el.innerHTML = '<span style="font-size:12px;color:var(--neutral-500);">Nenhum profissional selecionado ainda.</span>';
    return;

    <span class="prof-chip">
      ${p.nome.replace(/"/g,'&quot;')}
      <span class="prof-chip__role">· ${p.profissao === 'Outro' ? (p.profissao_outro || 'Outro') : p.profissao}</span>

        <span class="material-symbols-rounded">close</span>

}

window.handleProfSearch = function(query) {
  const q = query.toLowerCase().trim();
  const dropdown = document.getElementById('profDropdown');
  if (!dropdown) return;

  dropdown.style.display = 'block';

  const selectedIds = new Set(ReportState.profissionaisSelecionados.map(p => p.id));
  const available = ReportState.profissionaisInstituicao.filter(p => !selectedIds.has(p.id));
  const filtered = q
    ? available.filter(p => p.nome.toLowerCase().includes(q) || (p.profissao || '').toLowerCase().includes(q))
    : available;

  if (filtered.length === 0 && !q) {
    dropdown.innerHTML = `
      <div class="prof-dropdown__empty">Nenhum profissional cadastrado neste hospital.</div>
      <div class="prof-dropdown__add-new" onclick="handleAddNewProf('')">
        <span class="material-symbols-rounded">person_add</span>
        Cadastrar novo profissional
      </div>
    `;
    return;
  }

  let html = filtered.slice(0, 8).map(p => {
    const profText = p.profissao === 'Outro' ? (p.profissao_outro || 'Outro') : p.profissao;
    return `
      <div class="prof-dropdown-item" onclick="addProfissional('${p.id}')">
        <div class="prof-dropdown-item__avatar">${iniciais(p.nome)}</div>
        <div class="prof-dropdown-item__info">
          <div class="prof-dropdown-item__name">${p.nome.replace(/"/g,'&quot;')}</div>
          <div class="prof-dropdown-item__role">${profText}</div>
        </div>
      </div>
    `;
  }).join('');

  if (q && !ReportState.profissionaisInstituicao.some(p => p.nome.toLowerCase() === q)) {
    html += `
      <div class="prof-dropdown__add-new" onclick="handleAddNewProf('${q.replace(/'/g, '')}')">
        <span class="material-symbols-rounded">person_add</span>
        Cadastrar "${q}" como novo profissional
      </div>
    `;
  }

  dropdown.innerHTML = html || `
    <div class="prof-dropdown__empty">Nenhum resultado encontrado.</div>
    <div class="prof-dropdown__add-new" onclick="handleAddNewProf('${q.replace(/'/g, '')}')">
      <span class="material-symbols-rounded">person_add</span>
      Cadastrar "${q}" como novo profissional
    </div>
  `;
};

window.showProfDropdown = function() {
  const inp = document.getElementById('profSearchInput');
  if (inp) window.handleProfSearch(inp.value || '');
};

window.hideProfDropdown = function() {
  const dropdown = document.getElementById('profDropdown');
  if (dropdown) dropdown.style.display = 'none';
};

window.addProfissional = function(id) {
  const p = ReportState.profissionaisInstituicao.find(x => x.id === id);
  if (!p) return;
  if (ReportState.profissionaisSelecionados.some(x => x.id === id)) return;
  ReportState.profissionaisSelecionados.push(p);
  renderProfSelected();
  const inp = document.getElementById('profSearchInput');
  if (inp) inp.value = '';
  window.hideProfDropdown();
  scheduleSyncProfissionais();
};

window.removeProfissional = function(id) {
  ReportState.profissionaisSelecionados = ReportState.profissionaisSelecionados.filter(p => p.id !== id);
  renderProfSelected();
  scheduleSyncProfissionais();
};

window.handleAddNewProf = async function(nomeInicial) {
  try {
    const dados = await showNewProfissionalModal(nomeInicial);
    if (!dados) return; // cancelado

    const novo = await criarProfissional({
      institucaoId: ReportState.visita.instituicao_id,
      nome: dados.nome,
      profissao: dados.profissao,
      telefone: dados.telefone,
      email: dados.email,
    });
    ReportState.profissionaisInstituicao.push(novo);
    ReportState.profissionaisSelecionados.push(novo);
    renderProfSelected();
    const inp = document.getElementById('profSearchInput');
    if (inp) inp.value = '';
    window.hideProfDropdown();
    scheduleSyncProfissionais();
    setFlash('success', `Profissional "${novo.nome}" cadastrado!`);
  } catch (err) {
    alert('Erro ao cadastrar profissional: ' + err.message);
  }

function showNewProfissionalModal(nomeInicial) {

    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `

          <div class="report-field" style="margin-bottom:12px;">
            <label for="mnpNome">Nome completo <span class="report-section__required">*</span></label>
            <input type="text" id="mnpNome" placeholder="Ex: Dra. Ana Silva" value="${(nomeInicial || '').replace(/"/g,'&quot;')}" autocomplete="off" />
          </div>
          <div class="report-field" style="margin-bottom:12px;">
            <label for="mnpProfissao">Profissão <span class="report-section__required">*</span></label>
            <select id="mnpProfissao">
              <option value="Nutricionista">Nutricionista</option>
              <option value="Medico">Médico(a)</option>
              <option value="Farmaceutico">Farmacêutico(a)</option>
              <option value="Enfermeiro">Enfermeiro(a)</option>
              <option value="Comprador">Comprador(a)</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
          <div class="report-row-2" style="margin-bottom:4px;">
            <div class="report-field">
              <label for="mnpTelefone">Telefone</label>
              <input type="text" id="mnpTelefone" placeholder="(11) 99999-9999" autocomplete="off" />
            </div>
            <div class="report-field">
              <label for="mnpEmail">E-mail</label>
              <input type="text" id="mnpEmail" placeholder="nome@email.com" autocomplete="off" />
            </div>
          </div>
          <div style="font-size:11px;color:var(--neutral-500);margin-top:4px;">
            Telefone e e-mail são opcionais.
          </div>
        </div>
        <div class="modal-card__footer">
          <button class="modal-btn modal-btn--primary" id="mnpConfirm">
            <span class="material-symbols-rounded">check_circle</span>Cadastrar profissional
          </button>
          <button class="modal-btn modal-btn--secondary" id="mnpCancel">
            Cancelar
          </button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);

    // Foca no nome se vazio, ou na profissão se nome já preenchido
    setTimeout(() => {
      const nomeInput = backdrop.querySelector('#mnpNome');
      const profInput = backdrop.querySelector('#mnpProfissao');
      if (nomeInput && !nomeInput.value.trim()) {
        nomeInput.focus();
      } else if (profInput) {
        profInput.focus();
      }
    }, 150);

    // Máscara simples pra telefone
    const telInput = backdrop.querySelector('#mnpTelefone');
    telInput.addEventListener('input', (e) => {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length > 10) {
        v = v.replace(/^(\d{2})(\d{5})(\d{0,4}).*/, '($1) $2-$3');
      } else if (v.length > 6) {
        v = v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
      } else if (v.length > 2) {
        v = v.replace(/^(\d{2})(\d{0,5}).*/, '($1) $2');
      } else if (v.length > 0) {
        v = v.replace(/^(\d{0,2}).*/, '($1');
      }
      e.target.value = v;
    });

    const cleanup = () => backdrop.remove();

    backdrop.querySelector('#mnpConfirm').onclick = () => {
      const nome = backdrop.querySelector('#mnpNome').value.trim();
      const profissao = backdrop.querySelector('#mnpProfissao').value;
      const telefone = backdrop.querySelector('#mnpTelefone').value.trim();
      const email = backdrop.querySelector('#mnpEmail').value.trim();

      if (!nome) {
        alert('Nome é obrigatório.');
        backdrop.querySelector('#mnpNome').focus();
        return;
      }
      if (email && !/\S+@\S+\.\S+/.test(email)) {
        alert('E-mail inválido.');
        backdrop.querySelector('#mnpEmail').focus();
        return;
      }

      cleanup();
      resolve({ nome, profissao, telefone: telefone || null, email: email || null });
    };

    backdrop.querySelector('#mnpCancel').onclick = () => {
      cleanup();
      resolve(null);
    };

    // Enter no nome/telefone/email confirma
    backdrop.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
        e.preventDefault();
        backdrop.querySelector('#mnpConfirm').click();
      }
      if (e.key === 'Escape') {
        cleanup();
        resolve(null);
      }
    });

    // Clicar fora do card fecha
    backdrop.onclick = (e) => {
      if (e.target === backdrop) {
        cleanup();
        resolve(null);
      }
    };
  });
}

window.handleReportChange = function(campo, valor) {
  ReportState.pendingChanges[campo] = valor;
  if (ReportState.visita) ReportState.visita[campo] = valor;

  // Atualiza aviso de margem se for horário
  if (campo === 'horario_inicio' || campo === 'horario_termino') {
    updateTimeWarning();
  }

  scheduleAutoSave();
};

function updateTimeWarning() {
  const v = ReportState.visita;
  if (!v || !v.checkin_timestamp) return;

  const warnEl = document.getElementById('timeWarning');
  const textEl = document.getElementById('timeWarningText');
  if (!warnEl || !textEl) return;

  const hi = v.horario_inicio;
  if (!hi) {
    warnEl.style.display = 'none';
    return;
  }

  const checkinTs = new Date(v.checkin_timestamp);
  const [h, m] = hi.split(':');
  const declaradoInicio = new Date(checkinTs);
  declaradoInicio.setHours(parseInt(h), parseInt(m), 0, 0);
  const diffMin = Math.abs((declaradoInicio - checkinTs) / 60000);

  const margemMin = getConfigSync('margem_horario_minutos', 90);
  if (diffMin > margemMin) {
    warnEl.style.display = 'flex';
    textEl.textContent = `Horário declarado está ${Math.round(diffMin)}min fora do check-in (>${margemMin}min). Vai ser marcado com flag pra revisão.`;
  } else {
    warnEl.style.display = 'none';
  }
}

// Auto-save com debounce de 2s
function scheduleAutoSave() {
  if (ReportState.autoSaveTimer) clearTimeout(ReportState.autoSaveTimer);
  setSaveIndicator('saving', 'Digitando...');
  ReportState.autoSaveTimer = setTimeout(() => {
    executeAutoSave();
  }, 2000);
}

async function executeAutoSave() {
  if (Object.keys(ReportState.pendingChanges).length === 0) {
    setSaveIndicator('saved', 'Pronto');
    return;
  }
  setSaveIndicator('saving', 'Salvando...');
  try {
    const changes = { ...ReportState.pendingChanges };
    ReportState.pendingChanges = {};
    await atualizarRelatorio(ReportState.visitaId, changes);
    ReportState.lastSavedAt = new Date();
    ReportState.saveCounter++;
    setSaveIndicator('saved', 'Salvo');
  } catch (err) {
    console.error('[AutoSave] Erro:', err);
    // Recoloca mudanças em pending pra retry
    Object.assign(ReportState.pendingChanges, { _failedOnce: true });
    setSaveIndicator('error', 'Erro');
  }
}

// Sync profissionais (timer separado pro N:N)
function scheduleSyncProfissionais() {
  if (ReportState._profTimer) clearTimeout(ReportState._profTimer);
  setSaveIndicator('saving', 'Atualizando...');
  ReportState._profTimer = setTimeout(async () => {
    try {
      await syncProfissionaisVisita(
        ReportState.visitaId,
        ReportState.profissionaisSelecionados.map(p => p.id)
      );
      setSaveIndicator('saved', 'Salvo');
    } catch (err) {
      setSaveIndicator('error', 'Erro');
    }
  }, 800);
}

function scheduleSyncObjetivos() {
  if (ReportState._objTimer) clearTimeout(ReportState._objTimer);
  setSaveIndicator('saving', 'Atualizando...');
  ReportState._objTimer = setTimeout(async () => {
    try {
      await syncObjetivosVisita(
        ReportState.visitaId,
        Array.from(ReportState.objetivosSelecionados)
      );
      setSaveIndicator('saved', 'Salvo');
    } catch (err) {
      setSaveIndicator('error', 'Erro');
    }
  }, 500);
}

function setSaveIndicator(state, text) {
  const el = document.getElementById('saveIndicator');
  if (!el) return;
  el.classList.remove('save-indicator--saving', 'save-indicator--saved', 'save-indicator--error');
  if (state === 'saving') el.classList.add('save-indicator--saving');
  else if (state === 'saved') el.classList.add('save-indicator--saved');
  else if (state === 'error') el.classList.add('save-indicator--error');

  const icon = state === 'saving' ? 'sync' : state === 'error' ? 'cloud_off' : 'cloud_done';
  el.innerHTML = `
    <span class="material-symbols-rounded">${icon}</span>
    <span id="saveIndicatorText">${text}</span>
  `;
}

window.handleFinalizarRelatorio = async function() {
  const btn = document.getElementById('btnFinalizar');

  // Força o auto-save antes de finalizar
  if (ReportState.autoSaveTimer) {
    clearTimeout(ReportState.autoSaveTimer);
    await executeAutoSave();
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:24px">hourglass_empty</span> Finalizando...';

  const v = ReportState.visita;
  const dados = {
    horario_inicio: document.getElementById('fHoraInicio')?.value || v.horario_inicio,
    horario_termino: document.getElementById('fHoraTermino')?.value || v.horario_termino,
    visita_realizada: v.visita_realizada,
    motivo_nao_realizada: document.getElementById('fMotivo')?.value,
    resumo: document.getElementById('fResumo')?.value,
    proximos_passos: document.getElementById('fProximos')?.value,
    proxima_visita_programada: document.getElementById('fProxData')?.value || null,
    profissionais_ids: ReportState.profissionaisSelecionados.map(p => p.id),
    objetivos_ids: Array.from(ReportState.objetivosSelecionados),
    checkin_timestamp: v.checkin_timestamp,
  };

  const eraCompleta = v.status === 'completa';

  try {
    await finalizarRelatorio(ReportState.visitaId, dados);
    setFlash('success', eraCompleta ? 'Alterações salvas!' : 'Relatório finalizado com sucesso!');
    window.location.hash = '#/visitas';
  } catch (err) {
    alert(err.message);
    btn.disabled = false;
    btn.innerHTML = eraCompleta
      ? '<span class="material-symbols-rounded" style="font-size:24px">save</span> Salvar alterações'
      : '<span class="material-symbols-rounded" style="font-size:24px">check_circle</span> Finalizar relatório';
  }
};

  }
};

          <div style="margin-bottom:16px;">

              ${instName.replace(/"/g,'&quot;')} · ${profsPorInst[instName].length}

              <div class="visits-list__item" style="padding:10px 12px;">

function renderAdminConfig() {
  const user = requireAdmin();
  if (!user) return '<div class="splash"><div class="splash__spinner"></div></div>';

  setTimeout(async () => {
    const bodyEl = document.getElementById('configBody');
    if (!bodyEl) return;

    try {
      const configs = await carregarConfigs(true);

      // Agrupa configs por categoria
      const grupos = {};
      Object.keys(ConfigMeta).forEach(chave => {
        const meta = ConfigMeta[chave];
        const cat = meta.categoria;
        if (!grupos[cat]) grupos[cat] = [];
        grupos[cat].push({ chave, meta, atual: configs[chave] });
      });

      // Renderiza grupos na ordem definida em ConfigCategorias
      let html = `
        <div class="config-warning">
          <span class="material-symbols-rounded">info</span>
          <div>Alterações aqui afetam <strong>todo o sistema</strong>. Mudanças nos limites (raio GPS, margem de horário) passam a valer imediatamente para novas visitas.</div>
        </div>
      `;

      Object.keys(ConfigCategorias).forEach(catKey => {
        const cat = ConfigCategorias[catKey];
        const items = grupos[catKey];
        if (!items || items.length === 0) return;

        const iconClass = {
          'brand-lime': 'config-group__icon',
          'navy': 'config-group__icon config-group__icon--navy',
          'warning': 'config-group__icon config-group__icon--warning',
          'info': 'config-group__icon config-group__icon--info',
        }[cat.cor] || 'config-group__icon';

        html += `
          <div class="config-group">
            <div class="config-group__header">
              <div class="${iconClass}">
                <span class="material-symbols-rounded">${cat.icone}</span>
              </div>
              <div class="config-group__title">${cat.titulo}</div>
            </div>
            <div class="config-group__list">
              ${items.map(item => renderConfigItem(item)).join('')}
            </div>
          </div>
        `;
      });

      bodyEl.innerHTML = html;
    } catch (err) {
      bodyEl.innerHTML = `
        <div class="empty-state" style="margin:0;">
          <div class="empty-state__icon" style="background:var(--status-danger-bg);color:var(--status-danger);">
            <span class="material-symbols-rounded">error</span>
          </div>
          <div class="empty-state__title">Erro ao carregar configurações</div>
          <div class="empty-state__desc">${err.message}</div>
        </div>
      `;
    }
  }, 0);

  return `
    <div class="mobile-app">
      ${mobileTopBar({ title: 'Configurações', showBack: true })}
      <main class="mcontent">
        <div id="configBody">
          <div style="padding:40px 20px;text-align:center;color:var(--neutral-500);font-size:13px;">
            <span class="material-symbols-rounded" style="font-size:32px;color:var(--neutral-400);">settings</span>
            <div style="margin-top:8px;">Carregando configurações...</div>
          </div>
        </div>
      </main>
    </div>
  `;
}

function renderConfigItem({ chave, meta, atual }) {
  const valor = atual ? atual.valor : null;
  const metaInfo = atual?.atualizado_em
    ? `<span class="material-symbols-rounded" style="font-size:12px">history</span> atualizado ${formatarTempoRelativo(atual.atualizado_em)}`
    : '<span class="material-symbols-rounded" style="font-size:12px">fiber_new</span> valor original';

  let controlHtml = '';

  if (meta.tipo === 'number') {
    controlHtml = `
      <div class="config-number-group">
        <input
          type="number"
          class="config-number"
          id="cfg_${chave}"
          value="${valor !== null && valor !== undefined ? valor : ''}"
          min="${meta.min || 0}"
          max="${meta.max || 999999}"
          step="${meta.step || 1}"
          onchange="handleConfigChange('${chave}', this.value, 'number')"
        />
        ${meta.sufixo ? `<span class="config-number-suffix">${meta.sufixo}</span>` : ''}
      </div>
      <span class="config-saved-badge" id="cfgSaved_${chave}">
        <span class="material-symbols-rounded">check</span>Salvo
      </span>
    `;
  } else if (meta.tipo === 'boolean') {
    const isOn = valor === true || valor === 'true';
    controlHtml = `
      <span class="config-saved-badge" id="cfgSaved_${chave}">
        <span class="material-symbols-rounded">check</span>Salvo
      </span>
      <button
        type="button"
        class="config-toggle ${isOn ? 'is-on' : ''}"
        id="cfg_${chave}"
        onclick="handleConfigToggle('${chave}', this)"
        aria-label="${isOn ? 'Desativar' : 'Ativar'} ${meta.titulo}"
      ></button>
    `;
  } else if (meta.tipo === 'select') {
    const opcoesHtml = (meta.opcoes || []).map(o => {
      const selected = valor === o.valor ? 'selected' : '';
      return `<option value="${o.valor}" ${selected}>${o.label}</option>`;
    }).join('');
    controlHtml = `
      <select class="config-select" id="cfg_${chave}" onchange="handleConfigChange('${chave}', this.value, 'string')">
        ${opcoesHtml}
      </select>
      <span class="config-saved-badge" id="cfgSaved_${chave}">
        <span class="material-symbols-rounded">check</span>Salvo
      </span>
    `;
  }

  return `
    <div class="config-item">
      <div class="config-item__text">
        <div class="config-item__title">${meta.titulo}</div>
        <div class="config-item__desc">${meta.descricao}</div>
        <div class="config-item__meta">${metaInfo}</div>
      </div>
      <div class="config-item__control">${controlHtml}</div>
    </div>
  `;
}

window.handleConfigChange = async function(chave, valor, tipo) {
  let valorConvertido = valor;
  if (tipo === 'number') {
    valorConvertido = Number(valor);
    const meta = ConfigMeta[chave];
    if (meta) {
      if (meta.min !== undefined && valorConvertido < meta.min) {
        valorConvertido = meta.min;
        document.getElementById(`cfg_${chave}`).value = meta.min;
      }
      if (meta.max !== undefined && valorConvertido > meta.max) {
        valorConvertido = meta.max;
        document.getElementById(`cfg_${chave}`).value = meta.max;
      }
    }
  }

  try {
    await atualizarConfig(chave, valorConvertido);
    // Sincroniza CONFIG global se for uma das chaves cacheadas
    if (chave === 'raio_gps_metros') CONFIG.GPS_RADIUS_METERS = valorConvertido;
    if (chave === 'margem_horario_minutos') CONFIG.MARGIN_TIME_MINUTES = valorConvertido;
    showSavedBadge(chave);
  } catch (err) {
    alert('Erro ao salvar: ' + err.message);
  }
};

window.handleConfigToggle = async function(chave, btn) {
  const isOn = btn.classList.contains('is-on');
  const novoValor = !isOn;
  btn.classList.toggle('is-on');

  try {
    await atualizarConfig(chave, novoValor);
    showSavedBadge(chave);
  } catch (err) {
    // Reverte visualmente em caso de erro
    btn.classList.toggle('is-on');
    alert('Erro ao salvar: ' + err.message);
  }
};

function showSavedBadge(chave) {
  const badge = document.getElementById(`cfgSaved_${chave}`);
  if (!badge) return;
  badge.classList.add('is-visible');
  setTimeout(() => badge.classList.remove('is-visible'), 2000);
}

/* ==========================================================================
   BOOT
   ========================================================================== */
async function boot() {
  initSupabase();

  if (db) {
    await testConnection();
    // Pré-carrega configurações do sistema e sincroniza com CONFIG global
    try {
      await carregarConfigs(true);
      const raio = getConfigSync('raio_gps_metros', 500);
      const margem = getConfigSync('margem_horario_minutos', 90);
      if (typeof raio === 'number') CONFIG.GPS_RADIUS_METERS = raio;
      if (typeof margem === 'number') CONFIG.MARGIN_TIME_MINUTES = margem;
    } catch (e) {
      console.warn('[Boot] Não foi possível carregar configs, usando defaults.', e);
    }
  }

  window.addEventListener('hashchange', router);
  router();

  setTimeout(() => {
    document.getElementById('splash').classList.add('splash--hidden');
    document.getElementById('app').classList.remove('hidden');
  }, 800);
}

document.addEventListener('DOMContentLoaded', boot);
